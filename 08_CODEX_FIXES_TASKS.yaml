version: 1
kind: orchestrate-plan
repo_root: /home/graham/workspace/experiments/pi-mono
metadata:
  title: "SPARTA data fixes — ESA descriptions, ESA QRAs, hybrid rescoring, quality scores"
  goal: "Fix 4 specific bugs using /embedding service + existing daemon endpoints"

capability_overlap:
  decision_matrix: |
    All tasks use EXISTING endpoints: /list, /upsert, /embed, /scillm. No new skills or endpoints.
    /embedding service (port 8602) for ALL vectors. /scillm for LLM generation. /upsert for storage.

execution:
  max_concurrency: 2
  backend: codex

lanes:
  - id: "fix"
    label: "Bug Fixes"

tasks:
  - id: T1
    title: "Fix ESA HTML descriptions — extract text content"
    lane: "fix"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: []
    implementation:
      - "BUG: 137 ESA controls in sparta_controls have raw HTML in the description field"
      - "  Example: '<div class=\"card-header collapsed\" id=\"subtechniques-card-header\"...'"
      - "  These should be prose text descriptions, not HTML markup"
      - ""
      - "FIX:"
      - "1. GET all ESA controls: POST http://localhost:3001/api/memory/list"
      - "   body: {collection: 'sparta_controls', limit: 200, filters: {source_framework: 'ESA'}, return_fields: ['control_id', 'name', 'description']}"
      - ""
      - "2. For each control where description starts with '<' (HTML):"
      - "   a. Strip HTML tags to extract text content (use Python html.parser or BeautifulSoup)"
      - "   b. If extracted text is too short (<20 chars), search Brave instead:"
      - "      Use WebSearch for 'ESA SPACE-SHIELD {control_name} space security technique description'"
      - "   c. Prefix with '[INFERRED from Brave Search]' if web-sourced"
      - ""
      - "3. Update via POST http://localhost:3001/api/memory/upsert"
      - "   body: {collection: 'sparta_controls', documents: [{_key: doc._key, description: cleaned_text}]}"
      - ""
      - "IMPORTANT: The /upsert endpoint re-embeds using the embedding service at http://127.0.0.1:8602/embed (384-dim)."
      - "Embeddings are plain arrays stored in the 'embedding' field. There are NO ArangoDB vector indexes."
    definition_of_done:
      command: "curl -s -X POST http://localhost:3001/api/memory/list -H 'Content-Type: application/json' -d '{\"collection\":\"sparta_controls\",\"limit\":5,\"filters\":{\"source_framework\":\"ESA\"},\"return_fields\":[\"description\"]}' | python3 -c \"import json,sys; d=json.load(sys.stdin); bad=sum(1 for doc in d['documents'] if doc.get('description','').startswith('<')); print(f'HTML descriptions: {bad}/5'); assert bad==0; print('PASS')\""
      assertion: "Zero ESA descriptions start with HTML tags"
    tests:
      - "No ESA description starts with '<'"

  - id: T2
    title: "Generate ESA QRAs (137 controls × 3 = ~411 QRAs)"
    lane: "fix"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: [T1]
    implementation:
      - "After T1 fixes ESA descriptions, generate QRAs for all 137 ESA controls"
      - ""
      - "For each ESA control with a non-empty description:"
      - "1. Call POST http://localhost:4001/v1/chat/completions (scillm)"
      - "   Headers: {Content-Type: application/json, Authorization: 'Bearer sk-dev-proxy-123'}"
      - "   body: {model: 'text', messages: [{role: 'system', content: 'Generate exactly 3 Q-R-A triples...'}, {role: 'user', content: 'Control: {id} - {name}\\nDescription: {desc}'}], temperature: 0.7, max_tokens: 1500}"
      - ""
      - "2. Parse JSON array from response"
      - ""
      - "3. For each QRA, get embedding from POST http://127.0.0.1:8602/embed"
      - "   body: {text: '{question} {reasoning} {answer}'}"
      - "   Returns: {embedding: [...384 floats...]}"
      - ""
      - "4. Store via POST http://localhost:3001/api/memory/upsert"
      - "   body: {collection: 'sparta_qra', documents: [{_key: deterministic_from_run_id_and_control, control_id, question, reasoning, answer, source_framework: 'ESA', run_id: 'esa-qra-20260326', qra_id: '{control_id}__{index}', embedding: [from step 3]}]}"
      - ""
      - "CRITICAL: _key MUST be deterministic (e.g. sha1 of run_id + control_id + index). The sparta_qra collection has a unique index on (run_id, qra_id). Both fields MUST be populated."
      - "CRITICAL: embedding MUST come from http://127.0.0.1:8602/embed — 384-dim all-MiniLM-L6-v2. Do NOT use any other model."
      - ""
      - "Rate limit: 0.5s between scillm calls"
    definition_of_done:
      command: "curl -s -X POST http://localhost:3001/api/memory/list -H 'Content-Type: application/json' -d '{\"collection\":\"sparta_qra\",\"limit\":1,\"filters\":{\"control_id\":\"ESA-T1489.001\"}}' | python3 -c \"import json,sys; d=json.load(sys.stdin); print(f'ESA QRAs: {d[\"total\"]}'); assert d['total']>=1; print('PASS')\""
      assertion: "ESA controls have QRAs"
    tests:
      - "ESA QRA count > 100"

  - id: T3
    title: "Complete hybrid relationship rescoring (131K relationships)"
    lane: "fix"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: []
    implementation:
      - "Recompute combined_score on sparta_relationships using hybrid method:"
      - ""
      - "For CURATED relationships (method starts with 'curated:'):"
      - "  → PRESERVE original score. Do NOT overwrite."
      - "  → Exception: if score is 0 and method is 'curated:CAPEC→ATT&CK', restore to 0.9"
      - ""
      - "For technique_reference relationships:"
      - "  score = 0.6 * cosine_similarity(source_embedding, target_embedding)"
      - "        + 0.3 * jaccard(source_mind_tags, target_mind_tags)"
      - "        + 0.1 * (1.0 if same_framework else 0.0)"
      - ""
      - "Steps per relationship:"
      - "1. GET relationship: POST http://localhost:3001/api/memory/list"
      - "   {collection: 'sparta_relationships', limit: 200, offset: N, return_fields: ['_key', 'source_control_id', 'target_control_id', 'combined_score', 'method']}"
      - ""
      - "2. For each control, GET mind tags + embedding:"
      - "   POST http://localhost:3001/api/memory/list"
      - "   {collection: 'sparta_controls', limit: 1, filters: {control_id: ID}, return_fields: ['mind', 'embedding']}"
      - "   CACHE results — same control appears in many relationships"
      - ""
      - "3. If either control has no embedding, get one from the embedding service:"
      - "   POST http://127.0.0.1:8602/embed {text: control_description}"
      - "   Do NOT store it back — just use for cosine computation"
      - ""
      - "4. Compute cosine similarity in Python (dot product / norms)"
      - "5. Compute Jaccard of mind tag sets (intersection / union)"
      - "6. Update via POST http://localhost:3001/api/memory/upsert"
      - "   {collection: 'sparta_relationships', documents: [{_key, combined_score: new_score}]}"
      - ""
      - "Process 200 relationships per batch. 131K total = ~650 batches."
      - "Cache control lookups aggressively."
    definition_of_done:
      command: "curl -s -X POST http://localhost:3001/api/memory/list -H 'Content-Type: application/json' -d '{\"collection\":\"sparta_relationships\",\"limit\":5,\"return_fields\":[\"combined_score\",\"method\"]}' | python3 -c \"import json,sys; d=json.load(sys.stdin); scores=[doc['combined_score'] for doc in d['documents']]; print(scores); assert max(scores)>0.3; print('PASS')\""
      assertion: "Relationship scores vary meaningfully (not all 0.2)"
    tests:
      - "Score distribution spans 0-1 range"

  - id: T4
    title: "Compute per-control quality scores"
    lane: "fix"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: [T2, T3]
    implementation:
      - "Compute nrs_score (0.0-1.0) for all 11,620 controls in sparta_controls:"
      - ""
      - "score = weighted average of:"
      - "  0.2 * has_description (1 if description exists and >20 chars, else 0)"
      - "  0.2 * has_mind_tags (1 if mind array is non-empty, else 0)"
      - "  0.3 * min(qra_count / 5, 1.0)"
      - "  0.3 * avg_relationship_score (avg combined_score of relationships involving this control)"
      - ""
      - "For qra_count: POST http://localhost:3001/api/memory/list"
      - "  {collection: 'sparta_qra', limit: 1, filters: {control_id: ID}}"
      - "  Use the 'total' field from response"
      - ""
      - "For avg_relationship_score: POST http://localhost:3001/api/memory/recall"
      - "  {q: control_id, collections: ['sparta_relationships'], k: 20, entities: [control_id]}"
      - "  Average the combined_score values from results"
      - ""
      - "Store via POST http://localhost:3001/api/memory/upsert"
      - "  {collection: 'sparta_controls', documents: [{_key, nrs_score: computed_score}]}"
      - ""
      - "Process 100 controls per batch. 11,620 total = ~116 batches."
      - ""
      - "After completion, the UI status badges will show:"
      - "  >= 0.80 → Compliant (green)"
      - "  >= 0.60 → Medium (amber)"
      - "  < 0.60 → High Risk (red)"
    definition_of_done:
      command: "curl -s -X POST http://localhost:3001/api/memory/list -H 'Content-Type: application/json' -d '{\"collection\":\"sparta_controls\",\"limit\":10,\"return_fields\":[\"control_id\",\"nrs_score\"]}' | python3 -c \"import json,sys; d=json.load(sys.stdin); has=sum(1 for doc in d['documents'] if doc.get('nrs_score') is not None); print(f'{has}/10 have scores'); assert has>=8; print('PASS')\""
      assertion: "80%+ controls have quality scores"
    tests:
      - "nrs_score values between 0.0 and 1.0"
