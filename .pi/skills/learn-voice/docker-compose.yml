# RVC Voice Training — GPU container for voice model training
#
# Uses external image: cherrymint/rvc_webui:rvc_boss
# Requires NVIDIA GPU (--gpus all)
#
#   docker compose up -d
#   docker compose logs -f
#
# Also used by learn-artist (same image, same volumes)

services:
  rvc-training:
    image: cherrymint/rvc_webui:rvc_boss
    container_name: rvc-training
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    shm_size: 8g

    ports:
      - "7865:7865"

    volumes:
      - ${RVC_LOGS_DIR:-/home/graham/workspace/experiments/pi-mono/.pi/skills/create-music/rvc/logs}:/app/logs
      - ${TRAINING_DATA_ROOT:-/mnt/storage12tb/media/music/rvc-training}:/app/datasets
