name: "QuerySpec Pipeline"

# Layout: Main flow centered in col 1. Branches fork LEFT (shortcuts) and RIGHT (errors).
# Decision nodes use ◇ prefix. Each branch forks at its decision row.
# Pattern: "Railroad with sidings" — main track center, exits left/right.
# Canvas: 1300x700. 10 rows × 3 cols.

components:
  # === MAIN FLOW (col 1 — centered) ===
  - id: omnibar
    label: "User → Omnibar"
    tech: "React input"
    latency: "0ms"
    color: purple
    row: 0
    col: 1
    description: "User types natural language query in Binary Explorer omnibar"
    files:
      - packages/ux-lab/src/components/binary-explorer/BinaryExplorerView.tsx

  - id: self_correct
    label: "Self-Correction"
    tech: "ThreadTracker"
    latency: "<5ms"
    color: blue
    row: 1
    col: 1
    description: "Did user reject previous result? If yes, adjust confidence and avoid repeating same answer"
    files:
      - src/graph_memory/intent/_mapper.py

  - id: recall_ground
    label: "◇ Recall Grounding"
    tech: "/recall learned intents"
    latency: "~50ms"
    color: amber
    row: 2
    col: 1
    description: "Check if query matches a previously learned intent via /recall. If hit → skip to /execute-queryspec immediately"
    files:
      - src/graph_memory/intent/_grounding.py

  # === BRANCH: Recall Hit (col 0, row 2) — early exit LEFT ===
  - id: recall_hit
    label: "→ Execute (cached)"
    tech: "/recall hit"
    latency: "<5ms"
    color: green
    row: 2
    col: 0
    description: "Recall hit: skip all classification, go directly to /execute-queryspec with cached intent"

  - id: entity_prescan
    label: "◇ Entity Pre-Scan"
    tech: "FlashText + AQL"
    latency: "<100ms"
    color: amber
    row: 3
    col: 1
    description: "Extract domain entities, validate against sparta_controls. ALL fabricated → NO_MATCH. Determines strongly_anchored vs weakly_anchored"
    files:
      - src/graph_memory/entity_extraction.py
      - src/graph_memory/entity_acronyms.py

  # === BRANCH: All Fabricated (col 2, row 3) — error RIGHT ===
  - id: fabricated
    label: "NO_MATCH (fabricated)"
    tech: "Hard block"
    latency: "<1ms"
    color: red
    row: 3
    col: 2
    description: "All extracted IDs are fabricated — hard-blocked immediately, no further processing"
    files:
      - src/graph_memory/intent/_responses.py

  - id: ambiguity_gate
    label: "◇ Ambiguity Gate"
    tech: "Confidence + anchoring"
    latency: "<10ms"
    color: amber
    row: 4
    col: 1
    description: "Decision: strongly_anchored → pass. weakly_anchored + ambiguous → CLARIFY. No anchoring + off-topic → NO_MATCH"

  # === BRANCH: CLARIFY (col 0, row 4) — clarify LEFT ===
  - id: clarify_response
    label: "CLARIFY"
    tech: "/memory clarify"
    latency: "<100ms"
    color: red
    row: 4
    col: 0
    description: "Returns suggested questions + persona guidance. User refines query → re-enters omnibar"
    files:
      - src/graph_memory/intent/_responses.py

  # === BRANCH: NO_MATCH (col 2, row 4) — error RIGHT ===
  - id: no_match_ambiguity
    label: "NO_MATCH (off-topic)"
    tech: "Error + suggestions"
    latency: "<10ms"
    color: red
    row: 4
    col: 2
    description: "Off-topic or no anchoring. Returns closest valid entity suggestions via rapidfuzz"
    files:
      - src/graph_memory/intent/_responses.py

  - id: t05_classifier
    label: "◇ T0.5 Classifier"
    tech: "SetFit 0.5B gate"
    latency: "<10ms"
    color: amber
    row: 5
    col: 1
    description: "Binary gate: QUERY vs NO_MATCH. 93.7% accuracy. NO_MATCH → return early, skip LLM"
    files:
      - src/graph_memory/intent/_t05.py

  # === BRANCH: T0.5 Reject (col 2, row 5) — error RIGHT ===
  - id: t05_reject
    label: "NO_MATCH (T0.5)"
    tech: "Classifier reject"
    latency: "<1ms"
    color: red
    row: 5
    col: 2
    description: "T0.5 classified as NO_MATCH with no domain entities — return early, skip LLM entirely"

  - id: llm_enrich
    label: "LLM Enrichment"
    tech: "/scillm QuerySpec"
    latency: "1-5s"
    color: amber
    row: 6
    col: 1
    description: "LLM enriches with full QuerySpec JSON: ui_action, scene_action_id, entities, lanes, keywords"
    files:
      - src/graph_memory/intent/_mapper.py

  - id: sft_model
    label: "QuerySpec SFT"
    tech: "Qwen2.5-Coder-7B"
    latency: "~500ms"
    color: amber
    row: 7
    col: 1
    description: "Fine-tuned model: 92.2% enum accuracy, 100% parse rate. Input: request + action + entities"
    files:
      - scripts/training/sft_queryspec_v3.py

  - id: execute
    label: "/execute-queryspec"
    tech: "Deterministic Python"
    latency: "<50ms"
    color: green
    row: 8
    col: 1
    description: "QuerySpec JSON → ArangoDB AQL + UI commands. No LLM. Zero hallucination"
    files:
      - src/graph_memory/intent/_spec.py

  - id: ui_render
    label: "Binary Explorer UI"
    tech: "React scene update"
    latency: "<16ms"
    color: purple
    row: 9
    col: 1
    description: "Applies QuerySpec to scene: select nodes, zoom, set perspective, trace execution"
    files:
      - packages/ux-lab/src/components/binary-explorer/BinaryExplorerView.tsx

connections:
  # Main happy path (straight down col 1)
  - from: omnibar
    to: self_correct
  - from: self_correct
    to: recall_ground
  - from: recall_ground
    to: entity_prescan
  - from: entity_prescan
    to: ambiguity_gate
  - from: ambiguity_gate
    to: t05_classifier
  - from: t05_classifier
    to: llm_enrich
  - from: llm_enrich
    to: sft_model
  - from: sft_model
    to: execute
  - from: execute
    to: ui_render

  # Branch: recall hit → early exit LEFT (skip to execute)
  - from: recall_ground
    to: recall_hit
  - from: recall_hit
    to: execute

  # Branch: all fabricated entities → NO_MATCH RIGHT
  - from: entity_prescan
    to: fabricated

  # Branch: ambiguity → CLARIFY LEFT
  - from: ambiguity_gate
    to: clarify_response

  # Branch: ambiguity → NO_MATCH RIGHT
  - from: ambiguity_gate
    to: no_match_ambiguity

  # Branch: T0.5 → NO_MATCH RIGHT
  - from: t05_classifier
    to: t05_reject
