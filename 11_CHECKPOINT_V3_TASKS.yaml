version: 1
kind: orchestrate-plan

repo_root: "/home/graham/workspace/experiments/pi-mono"

metadata:
  title: "Checkpoint v3: Comprehensive Session Learning System"
  goal: >
    Make /checkpoint a comprehensive session grading and recommendation engine.
    Checkpoints must be findable via httpx /recall (BM25 + semantic + multi-hop graph),
    grade sessions for quality, store proven skill chains, link to episodic archives,
    and ingest Claude Code ~/.claude/ memory files as enrichment. The flywheel:
    checkpoint grades session → proven chains stored → /recommend-skill-chain serves
    them → agents solve similar problems faster.
  plan_type: code
  created: "2026-03-25"
  primary_persona:
    name: "Graham Anderson"
    role: "Architect"
    source: ".pi/agents/graham-anderson/AGENTS.md"

execution:
  max_concurrency: 2

capability_overlap:
  - "/memory recall 'checkpoint taxonomy httpx' returned 1 match: prior checkpoint about /intent endpoint, confirms checkpoints land in lessons collection but have no taxonomy tags"
  - "/mine-transcripts already mines ~/.claude/projects/, ~/.codex/, ~/.pi/ for training data — CALL it for transcript extraction, do NOT reimplement"
  - "/episodic-archiver stores full conversation transcripts with taxonomy + failure episodes — checkpoint should LINK to episodes, not duplicate them"
  - "/taxonomy/batch-tag endpoint exists on memory daemon — CALL it after /learn, do NOT reimplement tagging"
  - "/recommend-skill-chain consumes skill-chain tagged lessons — checkpoint stores these, chain is the consumer"
  - "Memory daemon /learn, /recall, /taxonomy/batch-tag all exist on Unix socket — replace subprocess CLI calls with httpx"

questions_blockers: []

lanes:
  - id: "0"
    label: "Wave 0: httpx transport layer"
  - id: "1"
    label: "Wave 1: Structured problem text + taxonomy"
  - id: "2"
    label: "Wave 2: Session grading + skill chain storage"
  - id: "3"
    label: "Wave 3: ~/.claude/ memory + /mine-transcripts integration"
  - id: "4"
    label: "Wave 4: Episodic archiver linkage"
  - id: "5"
    label: "Wave 5: Validation + skills-ci"

tasks:
  # =========================================================================
  # Wave 0: Replace subprocess with httpx Unix socket
  # =========================================================================
  - id: "1"
    title: "Replace memory-agent CLI subprocess with httpx Unix socket client"
    lane: "0"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    agent: "general-purpose"
    depends_on: []
    implementation:
      - "In checkpoint.py, replace _memory_agent() subprocess calls with httpx POST to Unix socket /run/user/1000/embry/memory.sock"
      - "Use httpx.AsyncClient with transport=httpx.HTTPTransport(uds='/run/user/1000/embry/memory.sock') — or sync client"
      - "Replace _memory_agent('learn', [...]) with POST /learn {problem, solution, scope, tags}"
      - "Replace _memory_agent('recall', [...]) with POST /recall {q, scope, k, tags, collections, threshold}"
      - "Remove MEMORY_PROJECT constant and all PYTHONPATH/env manipulation"
      - "Remove _memory_agent() function entirely"
      - "Keep timeout at 30s, add connect timeout of 5s"
      - "Handle connection refused gracefully — if daemon is down, print error and exit 1"
      - "ALL code changes in checkpoint.py only (skill dir: .pi/skills/checkpoint/)"
    tests:
      - "test-lab/run.sh verify-task 1 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "cd .pi/skills/checkpoint && uv run python checkpoint.py save --topic 'httpx-test' --summary 'Testing httpx transport' --json 2>&1 | python3 -c \"import sys,json; d=json.load(sys.stdin); assert d['status']=='saved', f'Expected saved, got {d}'\""
      assertion: "Checkpoint saved via httpx to daemon, no subprocess calls to memory-agent"

  - id: "2"
    title: "Add httpx to checkpoint pyproject.toml dependencies"
    lane: "0"
    runner: "local"
    backend: "sonnet"
    mode: "one_shot"
    depends_on: []
    command: "cd .pi/skills/checkpoint && grep -q httpx pyproject.toml || sed -i 's/loguru>=0.7/loguru>=0.7, httpx>=0.27/' pyproject.toml"
    tests:
      - "cd .pi/skills/checkpoint && uv run python -c 'import httpx; print(httpx.__version__)'"
    definition_of_done:
      command: "grep httpx .pi/skills/checkpoint/pyproject.toml"
      assertion: "httpx listed as dependency and importable"

  # =========================================================================
  # Wave 1: Structured problem text + taxonomy tagging
  # =========================================================================
  - id: "3"
    title: "Restructure problem field for BM25 findability"
    lane: "1"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    implementation:
      - "Change problem_text format from 'CHECKPOINT: {topic}\\n\\n{summary}' to:"
      - "'CHECKPOINT: {date} [{scope}] {topic}\\n\\nOutcome: {outcome}\\nBranch: {branch}\\n\\n{summary}'"
      - "Example: 'CHECKPOINT: 2026-03-25 [pi-mono] SPARTA grounding threshold fix\\nOutcome: success\\nBranch: main\\n\\nFixed the 0.85 threshold bug causing false negatives in QRA validation'"
      - "This makes BM25 match on date, project name, topic, outcome, AND summary simultaneously"
      - "Update _parse_checkpoint_items() to handle both v2 (old) and v3 (new) problem format"
      - "Bump checkpoint_version to 3 in solution_doc"
    tests:
      - "test-lab/run.sh verify-task 3 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "cd .pi/skills/checkpoint && uv run python checkpoint.py save --topic 'bm25-test' --summary 'Testing structured problem text' --json 2>&1 | python3 -c \"import sys,json; d=json.load(sys.stdin); assert 'bm25-test' in d.get('topic','')\""
      assertion: "Problem field contains date, scope, topic, outcome, branch in BM25-searchable format"

  - id: "4"
    title: "Add structured tags: project, date, branch"
    lane: "1"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    implementation:
      - "In save(), add faceted tags to the /learn POST: 'project:{scope}', 'date:{YYYY-MM-DD}', 'branch:{branch}'"
      - "Keep existing tags: checkpoint, session-state, outcome:{outcome}"
      - "Full tag list becomes: [checkpoint, session-state, outcome:{outcome}, project:{scope}, date:{YYYY-MM-DD}, branch:{branch}]"
      - "These enable daemon-side filtering via /recall tags parameter without parsing solution JSON"
    tests:
      - "test-lab/run.sh verify-task 4 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "cd .pi/skills/checkpoint && uv run python checkpoint.py save --topic 'tag-test' --summary 'Testing structured tags' --json 2>&1"
      assertion: "Tags include project:*, date:2026-*, branch:* in addition to checkpoint and session-state"

  - id: "5"
    title: "POST to /taxonomy/batch-tag after storing checkpoint"
    lane: "1"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1", "3"]
    implementation:
      - "After successful /learn POST, extract the stored document _key from the response"
      - "POST to /taxonomy/batch-tag on the daemon Unix socket with the checkpoint's _key and collection='lessons'"
      - "This assigns Mind tags (Detect/Evade/Exploit/Harden/Isolate/Model/Persist/Restore) and bridge attributes (Precision/Resilience/Fragility/Corruption/Loyalty/Stealth)"
      - "Best-effort: if taxonomy tagging fails, log warning but don't fail the checkpoint"
      - "The taxonomy tags make the checkpoint visible to multi-hop graph traversal via /trace"
    tests:
      - "test-lab/run.sh verify-task 5 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "cd .pi/skills/checkpoint && uv run python checkpoint.py save --topic 'taxonomy-test' --summary 'Fixed Detect+Harden grounding threshold in SPARTA QRA validation' --json 2>&1"
      assertion: "Checkpoint stored AND taxonomy/batch-tag POST succeeds (or logs warning gracefully)"

  # =========================================================================
  # Wave 2: Session grading + first-class skill chains
  # =========================================================================
  - id: "6"
    title: "Add --skills CLI option for explicit skill chain declaration"
    lane: "2"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    implementation:
      - "Add --skills option (repeatable) to save command: typer.Option(None, '--skills', help='Skills used this session (repeatable, e.g. /assess /dogpile /plan)')"
      - "Store as first-class 'skills_used' field in solution_doc (not regex-scraped)"
      - "Keep the existing regex extraction as FALLBACK only — if --skills not provided, fall back to current behavior"
      - "When --skills IS provided, store the explicit chain with confidence=1.0 (agent-declared) vs 0.8 (regex-scraped)"
      - "Store skill chain for ALL outcomes, not just success — partial/failed chains are negative training signal for /recommend-skill-chain"
      - "Add 'skills_used' to solution_doc at top level alongside topic, summary, etc."
    tests:
      - "test-lab/run.sh verify-task 6 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "cd .pi/skills/checkpoint && uv run python checkpoint.py save --topic 'chain-test' --summary 'Test explicit chains' --skills assess --skills dogpile --skills plan --json 2>&1"
      assertion: "solution_doc contains skills_used=[assess, dogpile, plan] as first-class field"

  - id: "7"
    title: "Store skill chains with outcome polarity for recommendation"
    lane: "2"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1", "6"]
    implementation:
      - "Refactor _store_successful_chains() to _store_skill_chain() that handles all outcomes"
      - "For outcome=success: store with tag 'proven-success', confidence=1.0 (if --skills) or 0.8 (if regex)"
      - "For outcome=partial: store with tag 'partial-success', confidence=0.5"
      - "For outcome=failed: store with tag 'proven-failure', confidence=1.0 — this is NEGATIVE signal"
      - "Problem field for chain lesson: 'SKILL-CHAIN: {outcome} for {problem_class}: {topic}'"
      - "Solution: JSON with chain, task, outcome, confidence, scope, timestamp"
      - "Scope for chain lessons: 'skill-chains' (unchanged)"
      - "This gives /recommend-skill-chain both positive AND negative examples"
    tests:
      - "test-lab/run.sh verify-task 7 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "cd .pi/skills/checkpoint && uv run python checkpoint.py save --topic 'negative-chain-test' --summary 'This approach failed' --outcome failed --skills assess --skills hack --json 2>&1"
      assertion: "Skill chain stored with proven-failure tag and outcome=failed"

  - id: "8"
    title: "Add --grade CLI option with 5-level rubric (graph-traversable)"
    lane: "2"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    implementation:
      - "Add --grade option (str, choices) to save command: typer.Option(None, '--grade', help='Session grade: unresolved|workaround|solved|clean|reusable')"
      - "Valid grades: unresolved (problem not solved), workaround (hack/bypass), solved (with rework), clean (first try), reusable (generalizable solution)"
      - "Store as 'grade' field in solution_doc (the label string, not a number)"
      - "Store 'rubric_version: 1' in solution_doc for drift detection"
      - "Include grade in tag list as 'grade:{label}' — e.g. grade:clean, grade:unresolved"
      - "For auto-grading by the session-end hook, implement the decision tree from RUBRIC.md:"
      - "  Has unresolved blockers or user said stop? → unresolved"
      - "  User said 'good enough' or 'for now'? → workaround"
      - "  Agent received corrections? → solved"
      - "  Tests passed first run, no rework? → clean"
      - "  New skill created or solution stored for reuse? → reusable"
      - "Add --auto-grade flag (bool) that runs the decision tree on the session signals instead of requiring manual grade"
      - "Each grade level becomes a filterable tag for /recall and a traversable node for /trace"
      - "Read RUBRIC.md in the checkpoint skill dir for the full specification"
    tests:
      - "test-lab/run.sh verify-task 8 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "cd .pi/skills/checkpoint && uv run python checkpoint.py save --topic 'graded-test' --summary 'Test grading' --grade clean --json 2>&1"
      assertion: "solution_doc contains grade=clean and rubric_version=1"

  # =========================================================================
  # Wave 3: ~/.claude/ memory + /mine-transcripts integration
  # =========================================================================
  - id: "9"
    title: "Ingest ~/.claude/ project memory files on checkpoint save"
    lane: "3"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1", "3"]
    implementation:
      - "Add --ingest-claude-memory flag (bool, default False) to save command"
      - "When set, scan ~/.claude/projects/ for the MEMORY.md matching the current project scope"
      - "Map scope to Claude project dir: scope 'pi-mono' → ~/.claude/projects/-home-graham-workspace-experiments-pi-mono/memory/"
      - "Read MEMORY.md index, find any feedback_*.md or project_*.md files modified since last checkpoint"
      - "For each new/modified memory file, extract the key insight and append to checkpoint's evidence field"
      - "Do NOT duplicate the full content — store only the filename and one-line summary as cross-reference"
      - "Add tag 'has-claude-memory' so recall can filter for enriched checkpoints"
      - "This bridges Claude Code's session memory with ArangoDB graph memory"
    tests:
      - "test-lab/run.sh verify-task 9 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "cd .pi/skills/checkpoint && uv run python checkpoint.py save --topic 'claude-mem-test' --summary 'Testing Claude memory ingest' --ingest-claude-memory --json 2>&1"
      assertion: "Evidence field contains references to ~/.claude/ memory files for current project"

  - id: "10"
    title: "Add --mine-session flag to extract skill chains from conversation transcript"
    lane: "3"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1", "6"]
    implementation:
      - "Add --mine-session flag (bool, default False) to save command"
      - "When set, call /mine-transcripts to extract the most recent conversation from ~/.claude/projects/ for the current scope"
      - "Parse the mined output for: skill chains used, emotional signals (satisfied/frustrated), bridge labels"
      - "Use extracted skill chains as FALLBACK if --skills not provided (higher quality than regex)"
      - "Store emotional signal as 'user_satisfaction' field in solution_doc (bridges to Heart taxonomy)"
      - "This is the connection between /mine-transcripts and /checkpoint — transcripts enrich checkpoints"
      - "CALL /mine-transcripts via its run.sh (it handles the parsing), do NOT reimplement transcript parsing"
    tests:
      - "test-lab/run.sh verify-task 10 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "cd .pi/skills/checkpoint && uv run python checkpoint.py save --help 2>&1 | grep -q mine-session"
      assertion: "--mine-session flag exists and documented in help output"

  # =========================================================================
  # Wave 2.5: Git commit BOTH project AND skills (NON-NEGOTIABLE)
  # =========================================================================
  - id: "8.5"
    title: "Git commit+push BOTH project AND skills, capture diff in solution_doc"
    lane: "2"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    implementation:
      - "Refactor _git_commit_and_push() to commit TWO repos on every checkpoint save:"
      - "1. The current project (project_root) — existing behavior, keep it"
      - "2. The skills directory (.pi/skills/ or the canonical skills dir) — NEW"
      - "Skills change during sessions (new skills, updated SKILL.md, fixed run.sh) and are NEVER committed"
      - "The skills dir may be a separate git repo or a subdirectory — detect via 'git -C .pi/skills/ rev-parse --show-toplevel'"
      - "If skills dir is same repo as project, one commit covers both — just ensure skills files are staged"
      - "If skills dir is a separate repo, run git add -u && git commit && git push in BOTH repos"
      - "Commit message format: 'checkpoint: {topic} ({file_count} files)' — same for both"
      - "Push is best-effort for both (don't fail checkpoint if push fails)"
      - ""
      - "CRITICAL: Store commit hash and diff_stat in solution_doc so the diff is recoverable:"
      - "  After committing, capture the commit hash via 'git rev-parse HEAD'"
      - "  Store as 'commit_hash' field in solution_doc"
      - "  Also store 'diff_stat' from 'git diff --stat HEAD~1' (compact: files changed, insertions, deletions)"
      - "  Do NOT store the raw diff — it's already in git. Any agent can run 'git show {commit_hash}' to get the full diff on demand"
      - "  This keeps ArangoDB lean while making the code changes recoverable"
      - "  An agent recalling a checkpoint sees diff_stat (what changed) and commit_hash (how to get the full diff)"
    tests:
      - "test-lab/run.sh verify-task 8.5 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "grep -c 'diff' .pi/skills/checkpoint/checkpoint.py | python3 -c \"import sys; assert int(sys.stdin.read().strip()) > 3, 'Diff capture logic not found'\""
      assertion: "checkpoint.py captures git diff before commit, stores in solution_doc, commits both project root AND skills directory"

  # =========================================================================
  # Wave 4: Episodic archiver linkage
  # =========================================================================
  - id: "11"
    title: "Add --session-id and --episode-key for episodic archiver linkage"
    lane: "4"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    implementation:
      - "Add --session-id option (str) to save: the conversation session identifier"
      - "Add --episode-key option (str) to save: the ArangoDB _key of the episodic archive document"
      - "Store both in solution_doc as 'session_id' and 'episode_key'"
      - "If episode_key provided, POST /add-edge to daemon linking checkpoint lesson to episode document"
      - "Edge type: 'checkpoint_of' from checkpoint → episode"
      - "This creates a graph edge so /trace can traverse from checkpoint → full conversation transcript"
      - "Add tag 'has-episode' when episode_key is provided for filtering"
    tests:
      - "test-lab/run.sh verify-task 11 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "cd .pi/skills/checkpoint && uv run python checkpoint.py save --topic 'episode-link-test' --summary 'Testing episode linkage' --session-id 'test-sess-123' --episode-key 'ep_abc' --json 2>&1"
      assertion: "solution_doc contains session_id and episode_key, add-edge POST attempted"

  # =========================================================================
  # Wave 4.5: Automatic checkpoint generation (closes the automation gap)
  # =========================================================================
  - id: "11.5"
    title: "Auto-checkpoint via session-end hook using /subagent-service background call"
    lane: "4"
    runner: "subagent-service"
    backend: "opus"
    mode: "iterative"
    depends_on: ["1", "5", "6", "7", "8", "10", "11"]
    implementation:
      - "TWO triggers — the agent calls checkpoint at session end, AND episodic-archiver enriches it nightly:"
      - ""
      - "TRIGGER 1: Agent session-end hook (real-time, every session)"
      - "  Create a Claude Code hook (settings.json or .claude/hooks/) that fires on session end"
      - "  The hook spawns /subagent-service in background to run /checkpoint save"
      - "  This MUST be background / fire-and-forget — never block the agent's final response"
      - "  The subagent calls checkpoint.py save with:"
      - "    --topic: extracted from conversation (first user message or LLM-summarized)"
      - "    --summary: LLM-generated 1-sentence summary of what happened"
      - "    --outcome: inferred (did tests pass? did user say 'thanks'? → success. user said 'stop' → partial)"
      - "    --skills: extracted by /mine-transcripts from the just-finished conversation"
      - "    --ingest-claude-memory: true"
      - "    --grade: omitted (background — no human present to grade)"
      - "  The subagent runs checkpoint in Docker via /subagent-service so it doesn't depend on the dying session"
      - "  Guard: skip if session has <3 human messages (trivial sessions)"
      - ""
      - "TRIGGER 2: Episodic archiver nightly enrichment"
      - "  In /episodic-archiver archive_episode.py, after archiving a session:"
      - "  Check if a checkpoint already exists for this session_id (via /recall)"
      - "  If YES: update the existing checkpoint with episode_key and add-edge linkage"
      - "  If NO: create a checkpoint from the archived episode (fallback for sessions where trigger 1 failed)"
      - "  This is the safety net — if the real-time hook fails, nightly catches it"
      - ""
      - "This means: real-time checkpoint on every session end (trigger 1) + nightly enrichment with episode linkage (trigger 2)"
      - "The flywheel is self-sustaining with redundant triggers"
    tests:
      - "test-lab/run.sh verify-task 11.5 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "grep -qr 'checkpoint' ~/.claude/settings.json 2>/dev/null || grep -qr 'checkpoint' .claude/ 2>/dev/null && echo 'hook found' || echo 'checking episodic-archiver' && grep -c 'checkpoint' .pi/skills/episodic-archiver/archive_episode.py"
      assertion: "Session-end hook configured to spawn /subagent-service background checkpoint, AND episodic-archiver has nightly enrichment fallback"

  # =========================================================================
  # Wave 5: Validation
  # =========================================================================
  - id: "12"
    title: "Update recall/list/last commands to use httpx"
    lane: "0"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    implementation:
      - "Update _recall_with_scope_fallback() to use httpx POST /recall instead of _memory_agent subprocess"
      - "Update _query_checkpoints_by_time() to use httpx POST /recall or /list with sort/filter"
      - "Ensure all recall paths use the same httpx client as save"
      - "Remove _memory_agent() function entirely after all callers migrated"
    tests:
      - "test-lab/run.sh verify-task 12 .pi/skills/checkpoint/ --domain python"
    definition_of_done:
      command: "cd .pi/skills/checkpoint && uv run python checkpoint.py last --json 2>&1 && grep -c 'subprocess' checkpoint.py | python3 -c \"import sys; n=int(sys.stdin.read().strip()); assert n<=2, f'Still {n} subprocess refs (only git allowed)'\""
      assertion: "All recall commands use httpx. Only subprocess refs are for git operations."

  - id: "13"
    title: "Run /skills-ci scan and fix violations"
    lane: "5"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "one_shot"
    depends_on: ["1", "3", "4", "5", "6", "7", "8", "8.5", "9", "10", "11", "11.5", "12"]
    implementation:
      - "Run skills-ci scan against the full skill estate"
      - "Compare checkpoint violations to baseline (77 errors, 953 warnings)"
      - "Fix any NEW violations introduced by v3 changes"
      - "Common issues: subprocess.service_bypass (should be gone now), deps.undeclared_import (httpx must be in pyproject.toml)"
    command: "cd .pi/skills/skills-ci && uv run python skills_ci.py --mode scan 2>&1 | grep -E '(checkpoint|Violations:)'"
    tests:
      - "cd .pi/skills/skills-ci && uv run python skills_ci.py --mode scan 2>&1 | grep 'checkpoint' | grep -c 'ERR' | python3 -c \"import sys; n=int(sys.stdin.read().strip()); assert n==0, f'{n} errors in checkpoint'\""
    definition_of_done:
      command: "cd .pi/skills/skills-ci && uv run python skills_ci.py --mode scan 2>&1 | grep 'Violations:'"
      assertion: "Checkpoint skill has zero new violations compared to baseline (77 errors, 953 warnings total)"

  - id: "14"
    title: "End-to-end validation: save, recall by BM25, recall by semantic, verify taxonomy tags"
    lane: "5"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "one_shot"
    depends_on: ["12", "13"]
    implementation:
      - "Run a full save → recall → verify cycle to prove the v3 pipeline works end-to-end"
      - "Save a checkpoint with all v3 fields: topic, summary, outcome, skills, grade, structured tags"
      - "Recall by BM25 (topic search), verify it returns the saved checkpoint"
      - "Recall by temporal ordering (last), verify it returns the most recent"
      - "Verify taxonomy tags were assigned by checking the stored document"
    command: |
      cd .pi/skills/checkpoint && \
      uv run python checkpoint.py save \
        --topic "E2E validation: SPARTA grounding threshold fix" \
        --summary "Fixed false negative rate from 0.85 threshold in QRA validation pipeline. Detect+Harden problem class." \
        --outcome success \
        --skills assess --skills dogpile --skills plan \
        --grade clean \
        --json 2>&1 && \
      echo "--- BM25 recall by project ---" && \
      uv run python checkpoint.py recall --topic "SPARTA grounding" --json 2>&1 && \
      echo "--- Temporal recall ---" && \
      uv run python checkpoint.py last --json 2>&1
    tests:
      - "cd .pi/skills/checkpoint && uv run python checkpoint.py recall --topic 'E2E validation SPARTA' --json 2>&1 | python3 -c \"import sys,json; d=json.load(sys.stdin); assert len(d)>0, 'Recall returned no results'\""
    definition_of_done:
      command: "cd .pi/skills/checkpoint && uv run python checkpoint.py recall --topic 'E2E validation SPARTA grounding' --json 2>&1 | python3 -c \"import sys,json; d=json.load(sys.stdin); assert len(d)>0, 'No results found'\""
      assertion: "Checkpoint findable via BM25 search on topic, project, and date. Taxonomy tags assigned. Skill chain stored."

  - id: "15"
    title: "Update SKILL.md to document v3 schema and new options"
    lane: "5"
    runner: "subagent-service"
