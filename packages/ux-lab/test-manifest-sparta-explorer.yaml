      return text.includes('connected') || text.includes('top') || text.includes('most') ? 'visible' : 'missing';
    tags: [relationships]

  - name: "Click relationship row opens edge detail"
    id: rels_edge_detail
    action: evaluate
    expression: |
      const rows = document.querySelectorAll('tr[style*="cursor"], tr');
      if (rows.length > 2) {
        rows[2].click();
        await new Promise(r => setTimeout(r, 1500));
        return 'clicked';
