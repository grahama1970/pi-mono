  - name: "sparta_url_knowledge semantic search"
    id: data_knowledge_recall
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/recall"
    body:
      q: "satellite communication jamming"
      collections: ["sparta_url_knowledge"]
      k: 5
    assert:
      status: 200
    tags: [data]

  # ── 1.6 Cross-collection joins (enrichment queries) ───────────────────────
  - name: "Control → QRA join: QRAs exist for a SPARTA control"
    id: data_join_control_qra
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/recall"
    body:
      q: "reconnaissance"
      collections: ["sparta_qra"]
      entities: ["SPARTA"]
      k: 5
    assert:
      status: 200
      body.results_length_gt: 0
    tags: [data, cross-collection]

  - name: "Control → Relationships join: relationships reference valid controls"
    id: data_join_control_rels
    action: evaluate
    expression: |
      const res = await fetch('http://localhost:3001/api/memory/list', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ collection: 'sparta_relationships', limit: 5, offset: 0,
          return_fields: ['source_control_id', 'target_control_id'] })
      });
      const data = await res.json();
      if (!data.results || data.results.length === 0) return 'no_relationships';
      const sourceId = data.results[0].source_control_id;
      // Verify the source control actually exists
      const check = await fetch('http://localhost:3001/api/memory/recall', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ q: sourceId, collections: ['sparta_controls'], k: 1 })
      });
      const checkData = await check.json();
      return checkData.results && checkData.results.length > 0 ? 'valid' : 'orphaned';
    assert:
      result: "valid"
    tags: [data, cross-collection]


# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 2: SPARTA EXPLORER SHELL — Navigation, Tabs, Status Bar
# ═══════════════════════════════════════════════════════════════════════════════

  # ── 2.1 Initial Load ───────────────────────────────────────────────────────
  - name: "Navigate to SPARTA Explorer"
    id: shell_navigate
    action: navigate
    url: "http://localhost:3001/#sparta-explorer"
    wait: 3000
    tags: [shell, blocking]

  - name: "Screenshot initial state"
    id: shell_screenshot_initial
    action: screenshot
    filename: "sparta-explorer-01-initial.png"
    tags: [shell]

  - name: "SPARTA brand text visible in navbar"
    id: shell_brand
    action: assert
    type: text_visible
    text: "SPARTA"
    tags: [shell]

  - name: "Explorer subtitle visible"
    id: shell_subtitle
    action: assert
    type: text_visible
    text: "Explorer"
    tags: [shell]

  # ── 2.2 Tab Bar ────────────────────────────────────────────────────────────
  - name: "Exactly 8 tabs visible"
    id: shell_tab_count
    action: evaluate
    expression: |
      const buttons = document.querySelectorAll('nav button');
      const tabTexts = [...buttons].map(b => b.textContent?.trim()).filter(t => t);
      return tabTexts.length;
    assert:
      result: 8
    tags: [shell]

  - name: "Tab 1 is Overview"
    id: shell_tab1_overview
    action: assert
    type: text_visible
    text: "1Overview"
    tags: [shell]

  - name: "Tab 2 is Sources"
    id: shell_tab2_sources
    action: assert
    type: text_visible
    text: "2Sources"
    tags: [shell]

  - name: "Tab 3 is Controls"
    id: shell_tab3_controls
    action: assert
    type: text_visible
    text: "3Controls"
    tags: [shell]

  - name: "Tab 4 is URLs"
    id: shell_tab4_urls
    action: assert
    type: text_visible
    text: "4URLs"
    tags: [shell]

  - name: "Tab 5 is QRAs"
    id: shell_tab5_qras
    action: assert
    type: text_visible
    text: "5QRAs"
    tags: [shell]

  - name: "Tab 6 is Relationships"
    id: shell_tab6_rels
    action: assert
    type: text_visible
    text: "6Relationships"
    tags: [shell]

  - name: "Tab 7 is Threat Matrix"
    id: shell_tab7_threat
    action: assert
    type: text_visible
    text: "7Threat Matrix"
    tags: [shell]

  - name: "Tab 8 is Pipeline"
    id: shell_tab8_pipeline
    action: assert
    type: text_visible
    text: "8Pipeline"
    tags: [shell]

  - name: "No extraneous tabs (Prompt Lab, Music Lab, Binary Explorer, etc.)"
    id: shell_no_extraneous_tabs
    action: evaluate
    expression: |
      const buttons = [...document.querySelectorAll('nav button')];
      const texts = buttons.map(b => b.textContent?.trim() || '');
      const forbidden = ['Prompt Lab', 'LLM Eval Lab', 'Music Lab', 'Stem Viewer', 'Binary Explorer'];
      const found = forbidden.filter(f => texts.some(t => t.includes(f)));
      return found.length === 0 ? 'clean' : `found: ${found.join(', ')}`;
    assert:
      result: "clean"
    tags: [shell, regression]

  # ── 2.3 Tab Switching via Click ────────────────────────────────────────────
  - name: "Click Sources tab"
    id: shell_click_sources
    action: click
    selector: "nav button"
    textContent: "Sources"
    wait: 1000
    tags: [shell, navigation]

  - name: "Sources tab is active (highlighted)"
    id: shell_sources_active
    action: evaluate
    expression: |
      const btn = [...document.querySelectorAll('nav button')].find(b => b.textContent?.includes('Sources'));
      const style = btn?.style;
      return style?.borderBottom?.includes('solid') ? 'active' : 'inactive';
    assert:
      result: "active"
    tags: [shell, navigation]

  - name: "URL hash updated to #sources"
    id: shell_sources_hash
    action: evaluate
    expression: "return window.location.hash;"
    assert:
      result: "#sources"
    tags: [shell, navigation]

  - name: "Click Controls tab"
    id: shell_click_controls
    action: click
    selector: "nav button"
    textContent: "Controls"
    wait: 1000
    tags: [shell, navigation]

  - name: "Click URLs tab"
    id: shell_click_urls
    action: click
    selector: "nav button"
    textContent: "URLs"
    wait: 1000
    tags: [shell, navigation]

  - name: "Click QRAs tab"
    id: shell_click_qras
    action: click
    selector: "nav button"
    textContent: "QRAs"
    wait: 1000
    tags: [shell, navigation]

  - name: "Click Relationships tab"
    id: shell_click_rels
    action: click
    selector: "nav button"
    textContent: "Relationships"
    wait: 1000
    tags: [shell, navigation]

  - name: "Click Threat Matrix tab"
    id: shell_click_threat
    action: click
    selector: "nav button"
    textContent: "Threat Matrix"
    wait: 1000
    tags: [shell, navigation]

  - name: "Click Pipeline tab"
    id: shell_click_pipeline
    action: click
    selector: "nav button"
    textContent: "Pipeline"
    wait: 1000
    tags: [shell, navigation]

  - name: "Click Overview tab (return home)"
    id: shell_click_overview
    action: click
    selector: "nav button"
    textContent: "Overview"
    wait: 1000
    tags: [shell, navigation]

  # ── 2.4 Keyboard Tab Switching ─────────────────────────────────────────────
  - name: "Press 2 → Sources tab"
    id: shell_key_2
    action: keypress
    key: "2"
    wait: 500
    tags: [shell, keyboard]

  - name: "Hash is #sources after key 2"
    id: shell_key_2_hash
    action: evaluate
    expression: "return window.location.hash;"
    assert:
      result: "#sources"
    tags: [shell, keyboard]

  - name: "Press 3 → Controls tab"
    id: shell_key_3
    action: keypress
    key: "3"
    wait: 500
    tags: [shell, keyboard]

  - name: "Press 4 → URLs tab"
    id: shell_key_4
    action: keypress
    key: "4"
    wait: 500
    tags: [shell, keyboard]

  - name: "Press 5 → QRAs tab"
    id: shell_key_5
    action: keypress
    key: "5"
    wait: 500
    tags: [shell, keyboard]

  - name: "Press 6 → Relationships tab"
    id: shell_key_6
    action: keypress
    key: "6"
    wait: 500
    tags: [shell, keyboard]

  - name: "Press 7 → Threat Matrix tab"
    id: shell_key_7
    action: keypress
    key: "7"
    wait: 500
    tags: [shell, keyboard]

  - name: "Press 8 → Pipeline tab"
    id: shell_key_8
    action: keypress
    key: "8"
    wait: 500
    tags: [shell, keyboard]

  - name: "Press 9 does NOT switch (only 8 tabs)"
    id: shell_key_9_noop
    action: keypress
    key: "9"
    wait: 300
    tags: [shell, keyboard]

  - name: "Hash is still #pipeline after key 9"
    id: shell_key_9_hash
    action: evaluate
    expression: "return window.location.hash;"
    assert:
      result: "#pipeline"
    tags: [shell, keyboard]

  - name: "Press 1 → back to Overview"
    id: shell_key_1
    action: keypress
    key: "1"
    wait: 500
    tags: [shell, keyboard]

  - name: "Keyboard ignored when typing in input"
    id: shell_key_in_input
    action: evaluate
    expression: |
      // Focus a text input if one exists, press 2 — tab should NOT change
      const input = document.querySelector('input[type="text"], input:not([type])');
      if (!input) return 'no_input_found';
      input.focus();
      input.dispatchEvent(new KeyboardEvent('keydown', { key: '2', bubbles: true }));
      await new Promise(r => setTimeout(r, 300));
      return window.location.hash;
    assert:
      result: "#overview"
    tags: [shell, keyboard]

  # ── 2.5 Hash-Based Deep Linking ────────────────────────────────────────────
  - name: "Navigate directly to #controls"
    id: shell_deeplink_controls
    action: navigate
    url: "http://localhost:3001/#controls"
    wait: 2000
    tags: [shell, deeplink]

  - name: "Controls tab is active after deep link"
    id: shell_deeplink_controls_active
    action: evaluate
    expression: |
      const btn = [...document.querySelectorAll('nav button')].find(b => b.textContent?.includes('Controls'));
      return btn?.style?.borderBottom?.includes('solid') ? 'active' : 'inactive';
    assert:
      result: "active"
    tags: [shell, deeplink]

  - name: "Navigate directly to #qras"
    id: shell_deeplink_qras
    action: navigate
    url: "http://localhost:3001/#qras"
    wait: 2000
    tags: [shell, deeplink]

  - name: "Navigate directly to #threat matrix (space in hash)"
    id: shell_deeplink_threat
    action: navigate
    url: "http://localhost:3001/#threat%20matrix"
    wait: 2000
    tags: [shell, deeplink]

  - name: "Navigate to invalid hash defaults to Overview"
    id: shell_deeplink_invalid
    action: navigate
    url: "http://localhost:3001/#nonexistent-tab"
    wait: 1500
    tags: [shell, deeplink]

  - name: "Overview is active after invalid hash"
    id: shell_deeplink_invalid_active
    action: evaluate
    expression: |
      const btn = [...document.querySelectorAll('nav button')].find(b => b.textContent?.includes('Overview'));
      return btn?.style?.borderBottom?.includes('solid') ? 'active' : 'inactive';
    assert:
      result: "active"
    tags: [shell, deeplink]

  - name: "Browser back navigates to previous tab"
    id: shell_back_navigation
    action: evaluate
    expression: |
      // Go to controls, then sources, then back
      window.location.hash = 'controls';
      await new Promise(r => setTimeout(r, 500));
      window.location.hash = 'sources';
      await new Promise(r => setTimeout(r, 500));
      history.back();
      await new Promise(r => setTimeout(r, 500));
      return window.location.hash;
    assert:
      result: "#controls"
    tags: [shell, deeplink]

  # ── 2.6 Status Bar ────────────────────────────────────────────────────────
  - name: "Status bar shows daemon health indicator"
    id: shell_statusbar_health
    action: assert
    type: text_visible
    text: "Memory daemon"
    tags: [shell, statusbar]

  - name: "Status bar shows keyboard hint"
    id: shell_statusbar_hint
    action: assert
    type: text_visible
    text: "Press 1-8 to switch tabs"
    tags: [shell, statusbar]

  - name: "Status bar shows active tab name"
    id: shell_statusbar_tab
    action: evaluate
    expression: |
      // Navigate to Overview and check status bar
      window.location.hash = 'overview';
      await new Promise(r => setTimeout(r, 500));
      const bar = document.querySelector('[style*="height: 28px"]');
      return bar?.textContent?.includes('Overview') ? 'shows_tab' : 'missing_tab';
    assert:
      result: "shows_tab"
    tags: [shell, statusbar]

  # ── 2.7 AgentControl ──────────────────────────────────────────────────────
  - name: "AgentControl component renders in navbar"
    id: shell_agent_control_visible
    action: evaluate
    expression: |
      // AgentControl polls /api/agent-control/status — check it rendered
      const nav = document.querySelector('nav');
      // AgentControl renders a small dot/indicator
      return nav?.children?.length >= 3 ? 'rendered' : 'missing';
    assert:
      result: "rendered"
    tags: [shell, shared-component]

  # ── 2.8 ChatFab ───────────────────────────────────────────────────────────
  - name: "ChatFab button visible"
    id: shell_chatfab_visible
    action: evaluate
    expression: |
      // ChatFab renders a floating button (typically bottom-right)
      const fab = document.querySelector('[style*="position: fixed"], [style*="position: absolute"]');
      return fab ? 'visible' : 'not_found';
    assert:
      result: "visible"
    tags: [shell, shared-component]

  - name: "ChatFab opens on click"
    id: shell_chatfab_open
    action: evaluate
    expression: |
      const fabs = document.querySelectorAll('[style*="position: fixed"] button, [style*="cursor: pointer"][style*="border-radius"]');
      for (const el of fabs) {
        if (el.closest('[style*="position: fixed"]')) {
          el.click();
          await new Promise(r => setTimeout(r, 500));
          // Check if a larger panel appeared
          const panels = document.querySelectorAll('[style*="position: fixed"]');
          for (const p of panels) {
            if (p.offsetHeight > 200) return 'opened';
          }
        }
      }
      return 'not_opened';
    assert:
      result: "opened"
    tags: [shell, shared-component]

  - name: "Screenshot ChatFab open state"
    id: shell_chatfab_screenshot
    action: screenshot
    filename: "sparta-explorer-02-chatfab.png"
    tags: [shell, shared-component]


