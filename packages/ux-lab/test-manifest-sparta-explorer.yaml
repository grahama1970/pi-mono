      status: 200
      body.total_gt: 100
    tags: [data]

  - name: "sparta_controls has CWE entries"
    id: data_controls_cwe_fw
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_controls"
      limit: 1
      offset: 0
      filters:
        source_framework: "CWE"
