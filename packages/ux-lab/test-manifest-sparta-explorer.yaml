  - name: "sparta_relationships have NRS scores"
    id: data_rels_nrs
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_relationships"
      limit: 20
      offset: 0
      return_fields: ["combined_score"]
    assert:
