# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 7: QRAs TAB — Review Interface, Keyboard Shortcuts, Grading
# ═══════════════════════════════════════════════════════════════════════════════

  - name: "Navigate to QRAs"
    id: qras_navigate
    action: navigate
    url: "http://localhost:3001/#qras"
    wait: 3000
    tags: [qras]

  - name: "Screenshot QRAs tab"
    id: qras_screenshot
    action: screenshot
    filename: "sparta-explorer-11-qras.png"
    tags: [qras]

  - name: "QRA card renders with question text"
    id: qras_card_question
    action: evaluate
    expression: |
      await new Promise(r => setTimeout(r, 2000));
      const text = document.body.innerText;
      // QRA cards show question text — should be more than stub
      return text.length > 200 && /\?/.test(text) ? 'has_question' : 'no_question';
    assert:
      result: "has_question"
    tags: [qras]

  - name: "QRA shows reasoning section"
    id: qras_reasoning
    action: evaluate
    expression: |
      const text = document.body.innerText.toLowerCase();
      return text.includes('reasoning') || text.includes('rationale') ? 'has_reasoning' : 'missing';
    assert:
      result: "has_reasoning"
    tags: [qras]

  - name: "QRA shows answer section"
    id: qras_answer
    action: evaluate
    expression: |
      const text = document.body.innerText.toLowerCase();
      return text.includes('answer') ? 'has_answer' : 'missing';
    assert:
      result: "has_answer"
    tags: [qras]

  - name: "QRA shows control_id"
    id: qras_control_id
    action: evaluate
    expression: |
      const text = document.body.innerText;
      return /[A-Z]{2,5}-\d{2,5}|T\d{4}|CWE-\d+/.test(text) ? 'has_control_id' : 'missing';
    assert:
      result: "has_control_id"
    tags: [qras]

  - name: "QRA shows grounding score"
    id: qras_grounding_score
    action: evaluate
    expression: |
      const text = document.body.innerText;
      return /grounding|score|0\.\d{1,3}/i.test(text) ? 'has_score' : 'missing';
    tags: [qras]

  - name: "QRA shows tier badges (tier0, tier1.5, tier2)"
    id: qras_tier_badges
    action: evaluate
    expression: |
      const text = document.body.innerText.toLowerCase();
      const hasTiers = text.includes('tier') || text.includes('t0') || text.includes('t1') || text.includes('t2');
      return hasTiers ? 'has_tiers' : 'missing';
    tags: [qras]

  - name: "Accept button/shortcut exists"
    id: qras_accept_button
    action: evaluate
    expression: |
      const buttons = [...document.querySelectorAll('button')];
      const accept = buttons.find(b => /accept|approve/i.test(b.textContent || ''));
      const text = document.body.innerText;
      const hasHint = /\bA\b.*accept|\[A\]/i.test(text);
      return accept || hasHint ? 'found' : 'missing';
    tags: [qras, keyboard]

  - name: "Reject button/shortcut exists"
    id: qras_reject_button
    action: evaluate
    expression: |
      const buttons = [...document.querySelectorAll('button')];
      const reject = buttons.find(b => /reject|decline/i.test(b.textContent || ''));
      const text = document.body.innerText;
      const hasHint = /\bR\b.*reject|\[R\]/i.test(text);
      return reject || hasHint ? 'found' : 'missing';
    tags: [qras, keyboard]

  - name: "Arrow key navigation between QRAs"
    id: qras_arrow_nav
    action: evaluate
    expression: |
      // Get current QRA text, press right arrow, check if it changed
      const before = document.body.innerText.substring(0, 200);
      document.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowRight', bubbles: true }));
      await new Promise(r => setTimeout(r, 1000));
      const after = document.body.innerText.substring(0, 200);
      return before !== after ? 'navigated' : 'same_content';
    tags: [qras, keyboard]

  - name: "Screenshot QRA after navigation"
    id: qras_nav_screenshot
    action: screenshot
    filename: "sparta-explorer-12-qras-navigated.png"
    tags: [qras]

  - name: "Arrow left goes back"
    id: qras_arrow_back
    action: evaluate
    expression: |
      document.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowLeft', bubbles: true }));
      await new Promise(r => setTimeout(r, 1000));
      return 'navigated_back';
    tags: [qras, keyboard]

  - name: "Press A to accept QRA (verify undo timer appears)"
    id: qras_accept_key
    action: evaluate
    expression: |
      document.dispatchEvent(new KeyboardEvent('keydown', { key: 'a', bubbles: true }));
      await new Promise(r => setTimeout(r, 500));
      const text = document.body.innerText.toLowerCase();
      return text.includes('undo') || text.includes('accepted') ? 'accepted_with_undo' : 'no_feedback';
    tags: [qras, keyboard, grading]

  - name: "Screenshot QRA accepted state"
    id: qras_accept_screenshot
    action: screenshot
    filename: "sparta-explorer-13-qras-accepted.png"
    tags: [qras, grading]


