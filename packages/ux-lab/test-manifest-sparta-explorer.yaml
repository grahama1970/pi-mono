  # ── 1.4 sparta_urls ────────────────────────────────────────────────────────
  - name: "sparta_urls collection exists and has data"
    id: data_urls_exist
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_urls"
      limit: 1
      offset: 0
    assert:
      status: 200
      body.total_gt: 0
    tags: [data, blocking]

  - name: "sparta_urls has >100 documents"
    id: data_urls_count
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_urls"
      limit: 1
      offset: 0
    assert:
      status: 200
      body.total_gt: 100
    tags: [data]

  - name: "sparta_urls documents have required fields"
    id: data_urls_shape
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_urls"
      limit: 5
      offset: 0
      return_fields: ["url_id", "url", "domain"]
    assert:
      status: 200
      body.results[0].url: exists
    tags: [data]

  # ── 1.5 sparta_url_knowledge ───────────────────────────────────────────────
  - name: "sparta_url_knowledge collection exists and has data"
    id: data_knowledge_exist
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_url_knowledge"
      limit: 1
      offset: 0
    assert:
      status: 200
      body.total_gt: 0
    tags: [data, blocking]

  - name: "sparta_url_knowledge has >100 documents"
    id: data_knowledge_count
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_url_knowledge"
      limit: 1
      offset: 0
    assert:
      status: 200
      body.total_gt: 100
    tags: [data]

  - name: "sparta_url_knowledge documents have required fields"
    id: data_knowledge_shape
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_url_knowledge"
      limit: 5
      offset: 0
