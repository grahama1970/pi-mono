  - name: "sparta_qra semantic search returns results"
    id: data_qra_recall
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/recall"
    body:
      q: "What countermeasures protect against supply chain attacks?"
      collections: ["sparta_qra"]
      k: 5
    assert:
      status: 200
      body.results_length_gt: 0
    tags: [data]

  - name: "sparta_qra recall with entity filter"
    id: data_qra_recall_entity
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/recall"
    body:
      q: "countermeasure"
      collections: ["sparta_qra"]
      k: 10
      entities: ["SPARTA"]
    assert:
      status: 200
    tags: [data]

  # ── 1.3 sparta_relationships ───────────────────────────────────────────────
  - name: "sparta_relationships collection exists and has data"
    id: data_rels_exist
