    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_relationships"
      limit: 1
      offset: 0
    assert:
      status: 200
      body.total_gt: 0
    tags: [data, blocking]

  - name: "sparta_relationships has >100 documents"
    id: data_rels_count
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_relationships"
      limit: 1
