# PHASE 3: OVERVIEW TAB — Coverage Funnel & Framework Breakdown
# ═══════════════════════════════════════════════════════════════════════════════

  - name: "Navigate to Overview"
    id: overview_navigate
    action: navigate
    url: "http://localhost:3001/#overview"
    wait: 3000
    tags: [overview]

  - name: "Screenshot Overview tab"
    id: overview_screenshot
    action: screenshot
    filename: "sparta-explorer-03-overview.png"
    tags: [overview]

  - name: "Coverage funnel visible (Controls → URLs → Knowledge → QRAs)"
    id: overview_funnel_visible
    action: assert
    type: text_visible
    text: "Controls"
    tags: [overview]

  - name: "Overview shows control count > 0"
    id: overview_control_count
    action: evaluate
    expression: |
      // Look for a number near "Controls" text
      const body = document.body.innerText;
      const match = body.match(/Controls[\s\S]{0,50}?(\d{1,6})/);
      return match ? parseInt(match[1]) > 0 ? 'has_data' : 'zero' : 'not_found';
    assert:
      result: "has_data"
    tags: [overview]

  - name: "Overview shows QRA count > 0"
    id: overview_qra_count
    action: evaluate
    expression: |
      const body = document.body.innerText;
      const match = body.match(/QRA[\s\S]{0,50}?(\d{1,6})/);
      return match ? parseInt(match[1]) > 0 ? 'has_data' : 'zero' : 'not_found';
    assert:
      result: "has_data"
    tags: [overview]

  - name: "Framework coverage bars visible"
    id: overview_fw_bars
    action: evaluate
    expression: |
      const text = document.body.innerText;
      const frameworks = ['SPARTA', 'NIST', 'CWE', 'ATT'];
      const found = frameworks.filter(f => text.includes(f));
      return found.length >= 3 ? 'visible' : `only: ${found.join(', ')}`;
    assert:
      result: "visible"
    tags: [overview]

  - name: "Overview does not show loading spinner after 3s"
    id: overview_no_spinner
    action: evaluate
    expression: |
      await new Promise(r => setTimeout(r, 3000));
      const spinners = document.querySelectorAll('[style*="animation"]');
      // Filter for actual loading spinners (not tab dot indicators)
      const loading = [...spinners].filter(s => s.offsetWidth > 10);
      return loading.length === 0 ? 'loaded' : 'still_loading';
    assert:
      result: "loaded"
    tags: [overview]


