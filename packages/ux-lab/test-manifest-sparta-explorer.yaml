# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 11: CROSS-TAB INTERACTIONS & STATE PRESERVATION
# ═══════════════════════════════════════════════════════════════════════════════

  - name: "Tab state preserved: visit Controls, switch to QRAs, switch back"
    id: cross_state_preserved
    action: evaluate
    expression: |
      // Go to Controls, wait for data
      window.location.hash = 'controls';
      await new Promise(r => setTimeout(r, 3000));
      const controlsText = document.body.innerText.substring(0, 100);

      // Switch to QRAs
      window.location.hash = 'qras';
      await new Promise(r => setTimeout(r, 2000));

      // Switch back to Controls — should not re-fetch
      window.location.hash = 'controls';
      await new Promise(r => setTimeout(r, 500));
      const controlsAgain = document.body.innerText.substring(0, 100);

      // Content should be immediately available (preserved via display:none)
      return controlsAgain.length > 50 ? 'preserved' : 'lost';
    assert:
      result: "preserved"
    tags: [cross-tab]

  - name: "All 8 tabs mount simultaneously (display:none pattern)"
    id: cross_all_mounted
    action: evaluate
    expression: |
      window.location.hash = 'overview';
      await new Promise(r => setTimeout(r, 1000));
      // Count all tab content containers (should be 8, most hidden)
      const contentArea = document.querySelector('[style*="flex: 1"][style*="overflow: hidden"][style*="background"]');
      if (!contentArea) return 'no_content_area';
      const tabDivs = contentArea.children;
      const visible = [...tabDivs].filter(d => d.style.display !== 'none').length;
      const hidden = [...tabDivs].filter(d => d.style.display === 'none').length;
      return `visible:${visible} hidden:${hidden} total:${tabDivs.length}`;
    assert:
      result_contains: "total:8"
    tags: [cross-tab]


# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 12: ERROR HANDLING & EDGE CASES
# ═══════════════════════════════════════════════════════════════════════════════

  - name: "Empty search returns gracefully (no crash)"
    id: error_empty_search
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/recall"
    body:
      q: ""
      collections: ["sparta_controls"]
      k: 5
    assert:
      status_not: 500
    tags: [error]

  - name: "Invalid collection name returns error (not crash)"
    id: error_invalid_collection
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "nonexistent_collection"
      limit: 1
    assert:
      status_not: 500
    tags: [error]

  - name: "Very large offset returns empty (not crash)"
    id: error_large_offset
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_controls"
      limit: 10
      offset: 999999
    assert:
      status: 200
    tags: [error]

  - name: "Rapid tab switching does not cause render errors"
    id: error_rapid_tabs
    action: evaluate
    expression: |
      const hashes = ['overview', 'sources', 'controls', 'urls', 'qras', 'relationships', 'threat%20matrix', 'pipeline'];
      for (const h of hashes) {
        window.location.hash = h;
        await new Promise(r => setTimeout(r, 100));
      }
      await new Promise(r => setTimeout(r, 1000));
      // Check no error boundary triggered
      const text = document.body.innerText;
      return text.includes('Error') && text.includes('boundary') ? 'error_boundary' : 'stable';
    assert:
      result: "stable"
    tags: [error, stress]

  - name: "Concurrent API calls do not deadlock"
    id: error_concurrent_api
    action: evaluate
    expression: |
      const calls = [
        fetch('http://localhost:3001/api/memory/list', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({collection:'sparta_controls',limit:1}) }),
        fetch('http://localhost:3001/api/memory/list', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({collection:'sparta_qra',limit:1}) }),
        fetch('http://localhost:3001/api/memory/list', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({collection:'sparta_relationships',limit:1}) }),
        fetch('http://localhost:3001/api/memory/list', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({collection:'sparta_urls',limit:1}) }),
        fetch('http://localhost:3001/api/memory/list', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({collection:'sparta_url_knowledge',limit:1}) }),
      ];
      const results = await Promise.allSettled(calls);
      const fulfilled = results.filter(r => r.status === 'fulfilled').length;
      return `${fulfilled}/5 succeeded`;
    assert:
      result: "5/5 succeeded"
    tags: [error, stress]


