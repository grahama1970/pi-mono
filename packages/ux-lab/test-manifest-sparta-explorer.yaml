## SPARTA Explorer — Comprehensive Test Manifest
## Covers: Infrastructure → Data Integrity → API Layer → Every View → Navigation → Shared Components
## Run via: POST /api/test-runner/run { manifest: "test-manifest-sparta-explorer.yaml" }
## Tests must run via CDP (Chrome DevTools Protocol) — NOT mouse hijacking

name: "SPARTA Explorer E2E"
description: "Full coverage of the SPARTA Explorer: 8 tabs, 5 collections, memory daemon, pipeline state"
timeout: 600000  # 10 minutes — large manifest

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 0: INFRASTRUCTURE HEALTH
# Every downstream test depends on these services being up.
# ═══════════════════════════════════════════════════════════════════════════════

steps:

  # ── 0.1 Memory Daemon ──────────────────────────────────────────────────────
  - name: "Memory daemon reachable via proxy"
    id: infra_memory_health
    action: api
    method: GET
    url: "http://localhost:3001/api/memory/health"
    assert:
      status: 200
    tags: [infra, blocking]

  - name: "Memory daemon returns connected status"
    id: infra_memory_connected
    action: api
    method: GET
    url: "http://localhost:3001/api/memory/health"
    assert:
      status: 200
      body.status: "ok"
    tags: [infra, blocking]

  # ── 0.2 scillm LLM Proxy ──────────────────────────────────────────────────
  - name: "scillm proxy reachable"
    id: infra_scillm_health
    action: api
    method: POST
    url: "http://localhost:3001/api/scillm"
    body:
      model: "text"
      messages:
        - role: "user"
          content: "Reply with just the word PONG"
      max_tokens: 10
    assert:
      status: 200
    tags: [infra]

  # ── 0.3 WebSocket ──────────────────────────────────────────────────────────
  - name: "WebSocket endpoint accepts connection"
    id: infra_ws_connect
    action: evaluate
    expression: |
      return new Promise((resolve, reject) => {
        const ws = new WebSocket('ws://localhost:3001/ws');
        ws.onopen = () => { ws.close(); resolve('connected'); };
        ws.onerror = () => reject('ws_error');
        setTimeout(() => reject('ws_timeout'), 5000);
      });
    assert:
      result: "connected"
    tags: [infra]

  # ── 0.4 Agent Control ─────────────────────────────────────────────────────
  - name: "Agent control status endpoint responds"
    id: infra_agent_control
    action: api
    method: GET
    url: "http://localhost:3001/api/agent-control/status?project=sparta-explorer"
    assert:
      status: 200
    tags: [infra]

  # ── 0.5 Express server itself ──────────────────────────────────────────────
  - name: "Express server serves Vite app"
    id: infra_vite_serves
    action: navigate
    url: "http://localhost:3001/"
    wait: 3000
    assert:
      title_contains: "UX Lab"
    tags: [infra, blocking]


# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 1: DATA INTEGRITY — COLLECTION POPULATION
# Verify every SPARTA collection has data and the right shape.
# ═══════════════════════════════════════════════════════════════════════════════

  # ── 1.1 sparta_controls ────────────────────────────────────────────────────
  - name: "sparta_controls collection exists and has data"
    id: data_controls_exist
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_controls"
      limit: 1
      offset: 0
    assert:
      status: 200
      body.total_gt: 0
    tags: [data, blocking]

  - name: "sparta_controls has >1000 documents"
    id: data_controls_count
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_controls"
      limit: 1
      offset: 0
    assert:
      status: 200
      body.total_gt: 1000
    tags: [data]

  - name: "sparta_controls documents have required fields"
    id: data_controls_shape
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_controls"
      limit: 5
      offset: 0
      return_fields: ["control_id", "name", "description", "source_framework", "control_type"]
    assert:
      status: 200
      body.results[0].control_id: exists
      body.results[0].name: exists
      body.results[0].source_framework: exists
    tags: [data]

  - name: "sparta_controls has SPARTA framework entries"
