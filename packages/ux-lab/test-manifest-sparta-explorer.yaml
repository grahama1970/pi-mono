# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 5: CONTROLS TAB — Framework Filtering, Pagination, Detail Pane
# ═══════════════════════════════════════════════════════════════════════════════

  - name: "Navigate to Controls"
    id: controls_navigate
    action: navigate
    url: "http://localhost:3001/#controls"
    wait: 3000
    tags: [controls]

  - name: "Screenshot Controls tab"
    id: controls_screenshot
    action: screenshot
    filename: "sparta-explorer-06-controls.png"
    tags: [controls]

  - name: "Controls table renders rows"
    id: controls_table_rows
    action: evaluate
    expression: |
      await new Promise(r => setTimeout(r, 2000));
      const rows = document.querySelectorAll('tr, [role="row"]');
      // Subtract header row
      return rows.length > 5 ? 'has_rows' : `only ${rows.length} rows`;
    assert:
      result: "has_rows"
    tags: [controls]

  - name: "Controls shows control_id column"
    id: controls_id_column
    action: evaluate
    expression: |
      const text = document.body.innerText;
      // SPARTA controls have IDs like REC-0001, T1234, CWE-79
      const hasIds = /[A-Z]{2,5}-\d{2,5}/.test(text) || /T\d{4}/.test(text);
      return hasIds ? 'has_ids' : 'no_ids';
    assert:
      result: "has_ids"
    tags: [controls]

  - name: "Framework filter dropdown exists"
    id: controls_fw_filter
    action: evaluate
    expression: |
      const selects = document.querySelectorAll('select, [role="combobox"], [role="listbox"]');
      const buttons = [...document.querySelectorAll('button')].filter(b =>
        b.textContent?.includes('ALL') || b.textContent?.includes('SPARTA') || b.textContent?.includes('Framework'));
      return selects.length > 0 || buttons.length > 0 ? 'found' : 'not_found';
    assert:
      result: "found"
    tags: [controls]

  - name: "Pagination controls visible"
    id: controls_pagination
    action: evaluate
    expression: |
      const text = document.body.innerText;
      // Look for pagination indicators like "1-100 of 5044" or "Page 1"
      const hasPagination = /\d+-\d+ of \d+/.test(text) || /Page \d+/.test(text) || /page/i.test(text);
      return hasPagination ? 'visible' : 'not_found';
    assert:
      result: "visible"
    tags: [controls]

  - name: "Click next page"
    id: controls_next_page
    action: evaluate
    expression: |
      const nextBtn = [...document.querySelectorAll('button')].find(b =>
        b.textContent?.includes('Next') || b.textContent?.includes('→') || b.textContent?.includes('>'));
      if (nextBtn && !nextBtn.disabled) {
        nextBtn.click();
        await new Promise(r => setTimeout(r, 2000));
        return 'clicked';
      }
      return 'no_next_button';
    tags: [controls, pagination]

  - name: "Click previous page"
    id: controls_prev_page
    action: evaluate
    expression: |
      const prevBtn = [...document.querySelectorAll('button')].find(b =>
        b.textContent?.includes('Prev') || b.textContent?.includes('←') || b.textContent?.includes('<'));
      if (prevBtn && !prevBtn.disabled) {
        prevBtn.click();
        await new Promise(r => setTimeout(r, 2000));
        return 'clicked';
      }
      return 'no_prev_button';
    tags: [controls, pagination]

  - name: "Click a control row opens detail pane"
    id: controls_detail_pane
    action: evaluate
    expression: |
      const rows = document.querySelectorAll('tr[style*="cursor"], div[style*="cursor: pointer"]');
      if (rows.length > 1) {
        rows[1].click();  // skip header
        await new Promise(r => setTimeout(r, 1500));
        // Check if a detail pane appeared (right side, typically >300px wide)
        return 'clicked';
      }
      return 'no_rows';
    tags: [controls]

  - name: "Screenshot Controls detail pane"
    id: controls_detail_screenshot
    action: screenshot
    filename: "sparta-explorer-07-controls-detail.png"
    tags: [controls]

  - name: "Detail pane shows control name"
    id: controls_detail_name
    action: evaluate
    expression: |
      // After clicking a row, detail pane should show control name/description
      const text = document.body.innerText;
      return text.length > 200 ? 'has_content' : 'sparse';
    assert:
      result: "has_content"
    tags: [controls]

  - name: "Detail pane shows related QRAs section"
    id: controls_detail_qras
    action: evaluate
    expression: |
      const text = document.body.innerText;
      return /QRA|Question|question/i.test(text) ? 'has_qra_section' : 'missing';
    tags: [controls]

  - name: "Detail pane shows relationships section"
    id: controls_detail_rels
    action: evaluate
    expression: |
      const text = document.body.innerText;
      return /Relationship|Related|relationship/i.test(text) ? 'has_rel_section' : 'missing';
    tags: [controls]

  - name: "Filter to SPARTA framework only"
    id: controls_filter_sparta
    action: evaluate
    expression: |
      const select = document.querySelector('select');
      if (select) {
        select.value = 'SPARTA';
        select.dispatchEvent(new Event('change', { bubbles: true }));
        await new Promise(r => setTimeout(r, 2000));
        return 'filtered';
      }
      // Try button-based filter
      const btn = [...document.querySelectorAll('button')].find(b => b.textContent?.trim() === 'SPARTA');
      if (btn) { btn.click(); await new Promise(r => setTimeout(r, 2000)); return 'filtered'; }
      return 'no_filter';
    tags: [controls, filter]

  - name: "Screenshot filtered Controls"
    id: controls_filter_screenshot
    action: screenshot
    filename: "sparta-explorer-08-controls-filtered.png"
    tags: [controls, filter]

  - name: "Filter to CWE framework"
    id: controls_filter_cwe
    action: evaluate
    expression: |
      const select = document.querySelector('select');
      if (select) {
        select.value = 'CWE';
        select.dispatchEvent(new Event('change', { bubbles: true }));
        await new Promise(r => setTimeout(r, 2000));
        return 'filtered';
      }
      const btn = [...document.querySelectorAll('button')].find(b => b.textContent?.trim() === 'CWE');
      if (btn) { btn.click(); await new Promise(r => setTimeout(r, 2000)); return 'filtered'; }
      return 'no_filter';
    tags: [controls, filter]

  - name: "Reset filter to ALL"
    id: controls_filter_all
    action: evaluate
    expression: |
      const select = document.querySelector('select');
      if (select) {
        select.value = 'ALL';
        select.dispatchEvent(new Event('change', { bubbles: true }));
        await new Promise(r => setTimeout(r, 2000));
        return 'reset';
      }
      const btn = [...document.querySelectorAll('button')].find(b => b.textContent?.trim() === 'ALL');
      if (btn) { btn.click(); await new Promise(r => setTimeout(r, 2000)); return 'reset'; }
      return 'no_filter';
    tags: [controls, filter]


