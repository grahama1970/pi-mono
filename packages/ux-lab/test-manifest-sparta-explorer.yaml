      return text.includes('mind') || text.includes('detect') || text.includes('harden') || text.includes('exploit') ? 'has_mind' : 'missing';
    tags: [relationships]

  - name: "Pagination: navigate to page 2"
    id: rels_page2
    action: evaluate
    expression: |
