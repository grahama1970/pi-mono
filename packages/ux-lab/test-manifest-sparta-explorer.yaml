  - name: "sparta_controls semantic search returns results"
    id: data_controls_recall
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/recall"
    body:
      q: "remote code execution"
      collections: ["sparta_controls"]
      k: 10
    assert:
      status: 200
      body.results_length_gt: 0
    tags: [data]

  # ── 1.2 sparta_qra ────────────────────────────────────────────────────────
  - name: "sparta_qra collection exists and has data"
    id: data_qra_exist
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
      collection: "sparta_qra"
      limit: 1
      offset: 0
    assert:
      status: 200
      body.total_gt: 0
    tags: [data, blocking]

  - name: "sparta_qra has >500 documents"
    id: data_qra_count
    action: api
    method: POST
    url: "http://localhost:3001/api/memory/list"
    body:
