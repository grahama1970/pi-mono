version: 1
kind: orchestrate-plan
repo_root: /home/graham/workspace/experiments/pi-mono

metadata:
  title: "SPARTA Chat: evidence-run observability and workspace adoption"
  created: "2026-04-30"
  plan_type: hybrid
  goal: >
    Adopt the most useful Gemma Chat mechanics in Sparta Chat: observable
    tool runs, a persistent evidence workspace, diagnostics, and reviewer
    controls, while keeping SPARTA evidence gates and human review as the
    source of authority.
  primary_surface: "http://localhost:3002/#sparta-explorer/"
  primary_persona:
    name: Brandon Bailey
    role: compliance and cyber assessment reviewer
    concern: >
      Needs a fast, inspectable evidence case workflow for CMMC Level 3
      control prioritization without treating model prose as signoff.

questions_blockers:
  - none

compliance_governance:
  principle: "Analyst workbench, not truth engine"
  verdict_authority: >
    Evidence-case gates, source references, spans, proof status, and reviewer
    decisions are authoritative. LLM text may summarize but may not override
    deterministic gate state.
  default_review_state: "NEEDS_VERIFICATION until a reviewer explicitly approves, edits, defers, or rejects"
  prohibited_claims:
    - "Do not claim certified, compliant, approved, or audit-ready status from chat output alone."
    - "Do not persist a QRA/evidence-case promotion without a reviewer checkpoint."
    - "Do not hide pre-signoff warnings behind friendly assistant copy."
  reviewer_checkpoints:
    - "Before status changes from NEEDS_VERIFICATION."
    - "Before candidate persistence to QRA review queues."
    - "Before OSCAL/SACM export is marked ready."

capability_overlap:
  - >
    /memory recall was attempted before plan creation for prior SPARTA Chat and
    Gemma adoption work, but the local recall command stalled and was killed.
    The plan therefore relies on local source inspection and the stale but
    available pi-mono skill manifest as capability evidence.
  - >
    CALL /create-evidence-case for evidence case generation and gate semantics.
    Do not reimplement its gates in ChatWell or SpartaExplorer.
  - >
    CALL /extract-entities for spans and unresolved terms. Do not use regex
    entity extraction as evidence authority.
  - >
    CALL /memory recall and /memory clarify through existing memory APIs for
    component-specific context and term clarification.
  - >
    CALL /lean4-prove only when the evidence case has a formalizable claim;
    skipped proof attempts must be explicit timeline events.
  - >
    CALL /export-oscal for OSCAL/SACM preview. The UI displays preview state,
    not compliance approval.
  - >
    EXTEND packages/pi-chat-adapter/src/hook.ts and message-assembler.ts for
    typed evidence-run events instead of creating a second chat stream client.
  - >
    EXTEND packages/ux-lab/src/components/shared-chat/ChatWell.tsx and
    BuildingEvidenceCase cards for evidence-run tool rendering instead of
    replacing shared chat.
  - >
    EXTEND packages/ux-lab/src/components/sparta/shared/EvidenceCaseTrace.tsx
    and packages/ux-lab/src/components/sparta/explorer/EvidenceView.tsx for
    trace, gates, proof, spans, SACM, edit, rerun, and refine affordances.
  - >
    EXTEND packages/ux-lab/server/index.ts: /api/evidence-case/run already
    invokes the evidence case pipeline but is non-streaming; add a streaming
    endpoint rather than creating a parallel daemon bridge.
  - >
    GLUE the active route target in SpartaExplorer.tsx. ChatTab.tsx exists but
    is not the active #sparta-explorer surface.
  - >
    REFERENCE Gemma Chat files for mechanics only: src/main/index.ts,
    src/main/tools.ts, src/main/workspace.ts, Canvas.tsx, and Message.tsx.
    Do not copy Gemma's generic code-generation identity or runtime setup UI.

execution:
  max_concurrency: 1
  scheduling_policy: dependency_only
  wave_barrier: false
  notes:
    - "Run /review-plan before /orchestrate."
    - "Do not run /orchestrate until the plan review passes."
    - "Start the ux-lab dev server before UI implementation or visual checks."

lanes:
  - id: discovery
    label: "Contract and baseline verification"
  - id: backend
    label: "Evidence run stream and persistence"
  - id: adapter
    label: "Shared chat event model"
  - id: ui
    label: "Sparta Chat workspace UX"
  - id: qa
    label: "Design review and interaction verification"

test_manifest:
  surface: "Sparta Explorer"
  url: "http://localhost:3002/#sparta-explorer/"
  entries:
    - id: chat-open
      view: "Ask Embry drawer"
      expected_data:
        collection: "sparta evidence case fixtures or live memory-backed evidence case response"
        min_rows: 1
      interactions:
        - "open Ask Embry drawer"
        - "submit '$create-evidence-case Given third-party FPGA vendors, which SPARTA supply-chain controls should we prioritize for CMMC Level 3?'"
      visual: "User question displays span highlights; live evidence-run step cards appear in order."
    - id: evidence-workspace-tabs
      view: "Right-side Evidence Workspace"
      expected_data:
        collection: "evidence case trace, sources, entities, proof, export preview"
        min_rows: 1
      interactions:
        - "switch Trace, Sources, Entities, Proof, Export tabs"
        - "inspect unresolved terms and proof status"
      visual: "Tabs stay readable, panels do not overlap, each tab shows real or clearly marked pending/skipped state."
    - id: reviewer-controls
      view: "Final verdict card"
      expected_data:
        collection: "evidence case verdict and reviewer actions"
        min_rows: 1
      interactions:
        - "click defer"
        - "click edit"
        - "click rerun step"
      visual: "Verdict remains NEEDS_VERIFICATION before reviewer approval; reviewer controls are visible and deterministic."
    - id: diagnostics
      view: "Evidence diagnostics"
      expected_data:
        collection: "raw tool inputs, raw outputs, prompt metadata, parser errors"
        min_rows: 1
      interactions:
        - "open diagnostics details"
        - "copy or expand a raw event"
      visual: "Diagnostics are inspectable without crowding the main verdict."

