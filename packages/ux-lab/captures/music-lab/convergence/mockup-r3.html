<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convergence Chart - R3</title>
    <style>
        :root {
            --bg-deep: #0b1220;
            --card: #1a1a1a;
            --nvis-green: #00ff88;
            --nvis-red: #ff4444;
            --nvis-amber: #ffaa00;
            --nvis-blue: #4a9eff;
            --nvis-accent: #7c3aed;
            --text-white: #e2e8f0;
            --text-dim: #64748b;
            --border-color: rgba(255, 255, 255, 0.13);
            --border-radius: 12px;
            --tooltip-bg: #2a2a2e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-white);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .chart-container {
            width: 640px;
            height: 400px;
            background-color: var(--card);
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            padding: 24px;
            box-sizing: border-box;
        }
        .chart-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }
        .chart-title { font-size: 16px; font-weight: 500; fill: var(--text-white); }
        .axis-label, .legend-text { font-size: 12px; fill: var(--text-dim); }
        .grid-line { stroke: var(--border-color); stroke-width: 1; stroke-dasharray: 2, 3; }
        
        .line-tempo { stroke: var(--nvis-green); }
        .line-key { stroke: var(--nvis-blue); }
        .line-chord { stroke: var(--nvis-amber); stroke-dasharray: 5, 4; }
        .line-dynamics { stroke: var(--nvis-red); }
        .line-timing { stroke: var(--nvis-accent); stroke-dasharray: 2, 3; }
        .line-aggregate { stroke: var(--text-white); stroke-width: 3; }

        .converged { stroke-opacity: 0.5; }
        .data-dot { stroke-width: 2px; fill: var(--bg-deep); }
    </style>
</head>
<body>
    <div class="chart-container">
        <svg class="chart-svg" viewBox="0 0 592 352">
            <text x="0" y="16" class="chart-title">Convergence Delta</text>

            <!-- Y-Axis -->
            <g transform="translate(30, 0)">
                <g class="axis-label" text-anchor="end">
                    <text x="-8" y="52">1.0</text><line class="grid-line" x1="0" y1="52" x2="562" y2="52"></line>
                    <text x="-8" y="202">0.3</text>
                    <text x="-8" y="277">0.0</text><line class="grid-line" x1="0" y1="277" x2="562" y2="277"></line>
                </g>
            </g>

            <!-- Threshold -->
            <g transform="translate(30, 0)">
                <line x1="0" y1="202" x2="562" y2="202" stroke="var(--text-dim)" stroke-width="1" stroke-dasharray="3, 4"></line>
                <text class="axis-label" x="558" y="196" text-anchor="end">Threshold 0.3</text>
            </g>
            
            <!-- X-Axis -->
            <g transform="translate(30, 0)" class="axis-label" text-anchor="middle">
                <text x="56.2" y="297">1</text>
                <text x="281" y="297">2</text>
                <text x="505.8" y="297">3</text>
            </g>
            <text class="axis-label" x="311" y="320" text-anchor="middle">Round</text>

            <!-- Data Lines -->
            <g transform="translate(30, 0)" fill="none" stroke-width="2">
                <!-- Converged sections have .converged class -->
                <polyline class="line-tempo" points="56.2,84.4 281,202" />
                <polyline class="line-tempo converged" points="281,202 505.8,254.8" />
                
                <polyline class="line-key converged" points="56.2,277 281,277 505.8,277" />
                
                <polyline class="line-chord" points="56.2,134 281,179.6" />
                <polyline class="line-chord converged" points="281,179.6 505.8,232.4" />

                <polyline class="line-dynamics" points="56.2,109.2 281,157.2" />
                <polyline class="line-dynamics converged" points="281,157.2 505.8,202" />

                <polyline class="line-timing" points="56.2,172.6 281,202" />
                <polyline class="line-timing converged" points="281,202 505.8,243.6" />

                <polyline class="line-aggregate" points="56.2,120.3 281,186.64" />
                <polyline class="line-aggregate converged" points="281,186.64 505.8,228.04" />
            </g>
            
            <!-- Data Dots (restored) -->
            <g transform="translate(30, 0)">
                <circle class="data-dot line-tempo" cx="56.2" cy="84.4" r="3"></circle><circle class="data-dot line-tempo" cx="281" cy="202" r="3"></circle><circle class="data-dot line-tempo converged" cx="505.8" cy="254.8" r="3"></circle>
                <circle class="data-dot line-key converged" cx="56.2" cy="277" r="3"></circle><circle class="data-dot line-key converged" cx="281" cy="277" r="3"></circle><circle class="data-dot line-key converged" cx="505.8" cy="277" r="3"></circle>
                <circle class="data-dot line-chord" cx="56.2" cy="134" r="3"></circle><circle class="data-dot line-chord" cx="281" cy="179.6" r="3"></circle><circle class="data-dot line-chord converged" cx="505.8" cy="232.4" r="3"></circle>
                <circle class="data-dot line-dynamics" cx="56.2" cy="109.2" r="3"></circle><circle class="data-dot line-dynamics" cx="281" cy="157.2" r="3"></circle><circle class="data-dot line-dynamics converged" cx="505.8" cy="202" r="3"></circle>
                <circle class="data-dot line-timing" cx="56.2" cy="172.6" r="3"></circle><circle class="data-dot line-timing" cx="281" cy="202" r="3"></circle><circle class="data-dot line-timing converged" cx="505.8" cy="243.6" r="3"></circle>
                <circle class="data-dot line-aggregate" cx="56.2" cy="120.3" r="4"></circle><circle class="data-dot line-aggregate" cx="281" cy="186.64" r="4"></circle><circle class="data-dot line-aggregate converged" cx="505.8" cy="228.04" r="4"></circle>
            </g>

            <!-- Legend with line styles -->
            <g class="legend-text" transform="translate(390, 5)">
                 <line x1="0" y1="5" x2="30" y2="5" class="line-tempo" stroke-width="2"/><text x="38" y="9">tempo_delta</text>
                 <line x1="0" y1="20" x2="30" y2="20" class="line-key" stroke-width="2"/><text x="38" y="24">key_match</text>
                 <line x1="0" y1="35" x2="30" y2="35" class="line-chord" stroke-width="2"/><text x="38" y="39">chord_accuracy</text>
                 <line x1="165" y1="5" x2="195" y2="5" class="line-dynamics" stroke-width="2"/><text x="203" y="9">dynamics_rmse</text>
                 <line x1="165" y1="20" x2="195" y2="20" class="line-timing" stroke-width="2"/><text x="203" y="24">timing_drift_ms</text>
            </g>

            <!-- Tooltip Mockup (unchanged) -->
            <g transform="translate(311, 52)" style="visibility: hidden">
                <line x1="0" y1="0" x2="0" y2="225" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
                <rect transform="translate(-135, -20)" width="125" height="145" rx="8" ry="8" fill="var(--tooltip-bg)" stroke="var(--border-color)" />
                <text fill="var(--text-white)" font-size="13" font-weight="bold" x="-123" y="2">Round 2</text>
            </g>
        </svg>
    </div>
</body>
</html>
