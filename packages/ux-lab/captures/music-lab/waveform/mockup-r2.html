<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaveformView Mockup R2</title>
<style>
  :root {
    --bg-deep: #0b1220;
    --card: #1a1a1a;
    --nvis-green: #00ff88;
    --red: #ff4444;
    --amber: #ffaa00;
    --blue: #4a9eff;
    --accent: #7c3aed;
    --text-white: #e2e8f0;
    --text-dim: #64748b;
    --border-color: rgba(255, 255, 255, 0.13);
    --border-radius: 12px;
  }
  body {
    background-color: var(--bg-deep);
    color: var(--text-white);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .waveform-container {
    width: 1280px;
    height: 400px;
    background-color: var(--card);
    border-radius: var(--border-radius);
    border: 1px solid var(--border-color);
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
  }
  .title {
      font-size: 18px;
      font-weight: 500;
  }
  .stem-toggles {
      display: flex;
      gap: 8px;
  }
  .stem-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background-color 0.2s, border-color 0.2s;
      background-color: transparent;
      color: var(--text-dim);
  }
  .stem-toggle[aria-pressed="true"] {
      background-color: rgba(255, 255, 255, 0.05);
      color: var(--text-white);
  }
  .stem-toggle .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
  }
  .stem-toggle-vocals .dot { background-color: var(--accent); }
  .stem-toggle-vocals[aria-pressed="true"] { border-color: var(--accent); }

  .stem-toggle-bass .dot { background-color: var(--blue); }
  .stem-toggle-bass[aria-pressed="true"] { border-color: var(--blue); }

  .stem-toggle-drums .dot { background-color: var(--red); }
  .stem-toggle-drums[aria-pressed="true"] { border-color: var(--red); }

  .stem-toggle-keys .dot { background-color: var(--nvis-green); }
  .stem-toggle-keys[aria-pressed="true"] { border-color: var(--nvis-green); }

  .stem-toggle-synth .dot { background-color: var(--amber); }
  .stem-toggle-synth[aria-pressed="true"] { border-color: var(--amber); }
  
  .visualization {
    width: 100%;
    height: 100%;
  }

</style>
</head>
<body>

<div class="waveform-container">
  <div class="header">
      <div class="title">Horus "Whisperheads" - Waveform Analysis</div>
      <div class="stem-toggles">
          <button class="stem-toggle stem-toggle-vocals" aria-pressed="true">
              <span class="dot"></span> Vocal
          </button>
          <button class="stem-toggle stem-toggle-bass" aria-pressed="true">
              <span class="dot"></span> Bass
          </button>
          <button class="stem-toggle stem-toggle-drums" aria-pressed="false">
              <span class="dot"></span> Drums
          </button>
          <button class="stem-toggle stem-toggle-keys" aria-pressed="false">
              <span class="dot"></span> Keys
          </button>
           <button class="stem-toggle stem-toggle-synth" aria-pressed="false">
              <span class="dot"></span> Synth
          </button>
      </div>
  </div>
  <svg class="visualization" preserveAspectRatio="none" viewBox="0 0 1240 300">
    <defs>
        <pattern id="hatch" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
          <path d="M -1,2 l 6,0" stroke="var(--red)" stroke-width="1"/>
        </pattern>
    </defs>
    
    <!-- Background & Sections -->
    <g id="section-markers" font-size="12" fill="var(--text-dim)" text-anchor="middle">
        <rect x="0" y="0" width="1240" height="260" fill="#111523"/>
        <rect x="0" y="0" width="310" height="260" fill="rgba(255,255,255,0.02)"/>
        <text x="155" y="20">Intro (1-2)</text>
        <rect x="310" y="0" width="620" height="260" fill="rgba(255,255,255,0)"/>
        <text x="620" y="20">Verse (3-6)</text>
        <rect x="930" y="0" width="310" height="260" fill="rgba(255,255,255,0.02)"/>
        <text x="1085" y="20">Chorus (7-8)</text>
    </g>

    <!-- Drift Highlights (drawn first, in background) -->
    <g id="drift-highlights">
        <!-- Medium Drift (Amber, semi-transparent) -->
        <rect x="460" y="0" width="5" height="260" fill="var(--amber)" opacity="0.15" />
        <!-- High Drift (Red, hatch pattern) -->
        <rect x="775" y="0" width="10" height="260" fill="url(#hatch)" opacity="0.5" />
        <rect x="775" y="0" width="10" height="260" fill="var(--red)" opacity="0.1" />
    </g>

    <!-- Waveforms -->
    <g id="waveforms" transform="translate(0, 130)">
      <!-- Bass Waveform -->
       <polyline
          points="0,-15 50,-10 100,-20 150,-12 200,-18 250,-30 300,-25 350,-20 400,-22 450,-40 500,-30 550,-28 600,-35 650,-25 700,-33 750,-45 800,-40 850,-35 900,-40 950,-30 1000,-32 1050,-25 1100,-28 1150,-20 1200,-22 1240,-18"
          fill="var(--blue)" fill-opacity="0.2" stroke="var(--blue)" stroke-width="1.5"/>
       <!-- Vocal Waveform (Primary) -->
       <polyline 
          points="0,0 50,10 100,20 150,12 200,18 250,50 300,45 350,60 400,52 450,40 500,30 550,28 600,65 650,75 700,63 750,45 800,40 850,35 900,40 950,30 1000,32 1050,45 1100,48 1150,50 1200,42 1240,38 1240,0 0,0"
          fill="var(--accent)" fill-opacity="0.3" stroke="var(--accent)" stroke-width="2"/>
    </g>
    
    <!-- Timing Grid -->
    <g id="timing-grid">
        <!-- Expected Beats (Piano Roll) - Thin white lines at bottom -->
        <g id="expected-beats" stroke="rgba(255,255,255,0.4)" stroke-width="1">
            <line x1="155" y1="240" x2="155" y2="260" />
            <line x1="310" y1="240" x2="310" y2="260" />
            <line x1="465" y1="240" x2="465" y2="260" />
            <line x1="620" y1="240" x2="620" y2="260" />
            <line x1="775" y1="240" x2="775" y2="260" />
            <line x1="930" y1="240" x2="930" y2="260" />
            <line x1="1085" y1="240" x2="1085" y2="260" />
            <line x1="1240" y1="240" x2="1240" y2="260" />
        </g>
        <!-- Actual Beats (Analysis) - NVIS green markers at top -->
        <g id="actual-beats" stroke="var(--nvis-green)" stroke-width="1.5">
            <line x1="158" y1="0" x2="158" y2="20" />
            <line x1="312" y1="0" x2="312" y2="20" />
            <line x1="460" y1="0" x2="460" y2="20" />
            <line x1="625" y1="0" x2="625" y2="20" />
            <line x1="785" y1="0" x2="785" y2="20" />
            <line x1="930" y1="0" x2="930" y2="20" />
            <line x1="1086" y1="0" x2="1086" y2="20" />
            <line x1="1238" y1="0" x2="1238" y2="20" />
        </g>
    </g>

    <!-- Lyrics Track -->
    <g id="lyrics-track" transform="translate(0, 265)">
        <rect x="0" y="0" width="1240" height="35" fill="#111523"/>
        <g fill="var(--text-dim)" font-size="12" font-family="monospace">
            <text x="200" y="20">Whisper-</text>
            <line x1="200" y1="0" x2="200" y2="8" stroke="var(--text-dim)" stroke-width="1"/>
            <text x="350" y="20">heads</text>
            <line x1="350" y1="0" x2="350" y2="8" stroke="var(--text-dim)" stroke-width="1"/>
            <text x="500" y="20">in the</text>
            <line x1="500" y1="0" x2="500" y2="8" stroke="var(--text-dim)" stroke-width="1"/>
            <text x="650" y="20">static</text>
            <line x1="650" y1="0" x2="650" y2="8" stroke="var(--text-dim)" stroke-width="1"/>
        </g>
    </g>

  </svg>
</div>

</body>
</html>
