<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaveformView Mockup R1</title>
<style>
  :root {
    --bg-deep: #0b1220;
    --card: #1a1a1a;
    --nvis-green: #00ff88;
    --red: #ff4444;
    --amber: #ffaa00;
    --blue: #4a9eff;
    --accent: #7c3aed;
    --text-white: #e2e8f0;
    --text-dim: #64748b;
    --border-color: rgba(255, 255, 255, 0.13);
    --border-radius: 12px;
  }
  body {
    background-color: var(--bg-deep);
    color: var(--text-white);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .waveform-container {
    width: 1280px;
    height: 400px;
    background-color: var(--card);
    border-radius: var(--border-radius);
    border: 1px solid var(--border-color);
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
  }
  .title {
      font-size: 18px;
      font-weight: 500;
  }
  .stem-toggles {
      display: flex;
      gap: 8px;
  }
  .stem-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background-color 0.2s, border-color 0.2s;
  }
  .stem-toggle.active {
      background-color: rgba(255, 255, 255, 0.05);
  }
  .stem-toggle .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
  }
  .stem-toggle-vocals .dot { background-color: var(--accent); }
  .stem-toggle-vocals.active { border-color: var(--accent); }

  .stem-toggle-bass .dot { background-color: var(--blue); }
  .stem-toggle-bass.active { border-color: var(--blue); }

  .stem-toggle-drums .dot { background-color: var(--red); }
  .stem-toggle-drums.active { border-color: var(--red); }

  .stem-toggle-keys .dot { background-color: var(--nvis-green); }
  .stem-toggle-keys.active { border-color: var(--nvis-green); }

  .stem-toggle-synth .dot { background-color: var(--amber); }
  .stem-toggle-synth.active { border-color: var(--amber); }
  
  .visualization {
    width: 100%;
    height: 100%;
  }

</style>
</head>
<body>

<div class="waveform-container">
  <div class="header">
      <div class="title">Horus "Whisperheads" - Waveform Analysis</div>
      <div class="stem-toggles">
          <div class="stem-toggle stem-toggle-vocals active">
              <span class="dot"></span> Vocal
          </div>
          <div class="stem-toggle stem-toggle-bass active">
              <span class="dot"></span> Bass
          </div>
          <div class="stem-toggle stem-toggle-drums active">
              <span class="dot"></span> Drums
          </div>
          <div class="stem-toggle stem-toggle-keys active">
              <span class="dot"></span> Keys
          </div>
           <div class="stem-toggle stem-toggle-synth active">
              <span class="dot"></span> Synth
          </div>
      </div>
  </div>
  <svg class="visualization" preserveAspectRatio="none" viewBox="0 0 1240 300">
    <!-- Background -->
    <rect width="1240" height="300" fill="#111523"/>

    <!-- Section Markers -->
    <g id="section-markers" font-size="12" fill="var(--text-dim)" text-anchor="middle">
        <rect x="0" y="0" width="310" height="300" fill="rgba(255,255,255,0.02)"/>
        <text x="155" y="20">Intro (Bars 1-2)</text>
        <rect x="310" y="0" width="620" height="300" fill="rgba(255,255,255,0)"/>
        <text x="620" y="20">Verse (Bars 3-6)</text>
        <rect x="930" y="0" width="310" height="300" fill="rgba(255,255,255,0.02)"/>
        <text x="1085" y="20">Chorus (Bars 7-8)</text>
    </g>

    <!-- Main Waveform (Vocal) -->
    <g id="waveform-vocal" transform="translate(0, 150)">
        <path d="M0,0 C60,15 80,-25 140,-10 S200,40 260,20 S320,-50 380,-20 S440,60 500,30 S560,-60 620,-30 S680,50 740,25 S800,-40 860,-15 S920,30 980,10 S1040,-20 1100,0 S1160,20 1240,10"
              fill="none" stroke="var(--accent)" stroke-width="2"/>
    </g>

    <!-- Timing Grid & Drift -->
    <g id="timing-grid">
        <!-- Expected Beats (Piano Roll) - Thin white lines at bottom -->
        <g id="expected-beats" stroke="rgba(255,255,255,0.4)" stroke-width="1">
            <line x1="155" y1="280" x2="155" y2="300" />
            <line x1="310" y1="280" x2="310" y2="300" />
            <line x1="465" y1="280" x2="465" y2="300" />
            <line x1="620" y1="280" x2="620" y2="300" />
            <line x1="775" y1="280" x2="775" y2="300" />
            <line x1="930" y1="280" x2="930" y2="300" />
            <line x1="1085" y1="280" x2="1085" y2="300" />
            <line x1="1240" y1="280" x2="1240" y2="300" />
        </g>
        <!-- Actual Beats (Analysis) - NVIS green markers at top -->
        <g id="actual-beats" stroke="var(--nvis-green)" stroke-width="1.5">
            <line x1="158" y1="0" x2="158" y2="20" />
            <line x1="312" y1="0" x2="312" y2="20" />
            <line x1="460" y1="0" x2="460" y2="20" />
            <line x1="625" y1="0" x2="625" y2="20" />
            <line x1="785" y1="0" x2="785" y2="20" /> <!-- Significant drift -->
            <line x1="930" y1="0" x2="930" y2="20" />
            <line x1="1086" y1="0" x2="1086" y2="20" />
            <line x1="1238" y1="0" x2="1238" y2="20" />
        </g>

        <!-- Drift Visualization -->
        <g id="drift-highlights">
            <!-- Example 1: Medium Drift (Amber) -->
            <rect x="460" y="0" width="5" height="300" fill="var(--amber)" opacity="0.15" />
            <line x1="460" y1="0" x2="465" y2="290" stroke="var(--amber)" stroke-width="0.5" stroke-dasharray="4 4" />
            <!-- Example 2: High Drift (Red) -->
            <rect x="775" y="0" width="10" height="300" fill="var(--red)" opacity="0.2" />
            <line x1="775" y1="290" x2="785" y2="10" stroke="var(--red)" stroke-width="1" />
        </g>
    </g>

    <!-- Lyrics Alignment -->
    <g id="lyrics" fill="var(--text-dim)" font-size="12" font-family="monospace">
        <text x="200" y="270">Whisper-</text>
        <line x1="200" y1="275" x2="200" y2="285" stroke="var(--text-dim)" stroke-width="1"/>
        <text x="350" y="270">heads</text>
        <line x1="350" y1="275" x2="350" y2="285" stroke="var(--text-dim)" stroke-width="1"/>
        <text x="500" y="270">in the</text>
         <line x1="500" y1="275" x2="500" y2="285" stroke="var(--text-dim)" stroke-width="1"/>
        <text x="650" y="270">static</text>
         <line x1="650" y1="275" x2="650" y2="285" stroke="var(--text-dim)" stroke-width="1"/>
    </g>

  </svg>
</div>

</body>
</html>
