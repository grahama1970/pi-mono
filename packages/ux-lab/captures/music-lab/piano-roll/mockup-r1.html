<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Piano Roll — Horus "Whisperheads"</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b1220;
    font-family: -apple-system, 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: #e2e8f0;
    width: 1280px;
    height: 400px;
    overflow: hidden;
  }
  .container {
    width: 1280px;
    height: 400px;
    background: #0b1220;
    display: flex;
    flex-direction: column;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 4px 16px;
    height: 32px;
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #64748b;
  }
  .badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(122, 58, 237, 0.15);
    color: #7c3aed;
    border: 1px solid rgba(122, 58, 237, 0.3);
  }
  .badge-bpm {
    background: rgba(0, 255, 136, 0.1);
    color: #00ff88;
    border-color: rgba(0, 255, 136, 0.2);
  }
  .song-title {
    font-size: 11px;
    color: #e2e8f0;
    font-weight: 500;
    opacity: 0.7;
  }
  .roll-wrapper {
    flex: 1;
    padding: 0 16px;
    min-height: 0;
  }
  .legend {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 6px 16px 8px 16px;
    height: 28px;
    flex-shrink: 0;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .legend-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .legend-text {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #64748b;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <span class="header-label">Piano Roll</span>
      <span class="badge">D min</span>
      <span class="badge badge-bpm">85 BPM</span>
    </div>
    <span class="song-title">Horus &mdash; Whisperheads</span>
  </div>

  <div class="roll-wrapper">
    <svg id="pianoRoll" width="1248" height="332" viewBox="0 0 1248 332">
      <defs>
        <linearGradient id="introGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#334155" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#334155" stop-opacity="0.05"/>
        </linearGradient>
        <linearGradient id="verseGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#4a9eff" stop-opacity="0.03"/>
        </linearGradient>
        <linearGradient id="chorusGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.04"/>
        </linearGradient>
      </defs>

      <!-- Grid constants: pitch gutter=44px, top header=40px -->
      <!-- Playable area: x=44..1248 (1204px for 8 bars = 150.5px/bar), y=40..320 (280px) -->
      <!-- Pitch range: C3(48) to C5(72) = 24 semitones, lane height ~11.67px -->

      <!-- Section bands -->
      <rect x="44" y="0" width="301" height="332" fill="url(#introGrad)"/>
      <rect x="345" y="0" width="602" height="332" fill="url(#verseGrad)"/>
      <rect x="947" y="0" width="301" height="332" fill="url(#chorusGrad)"/>

      <!-- Section labels -->
      <text x="194" y="12" text-anchor="middle" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#64748b" text-transform="uppercase" style="text-transform:uppercase">INTRO</text>
      <text x="646" y="12" text-anchor="middle" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#64748b" style="text-transform:uppercase">VERSE</text>
      <text x="1098" y="12" text-anchor="middle" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#64748b" style="text-transform:uppercase">CHORUS</text>

      <!-- Chord labels row (y=22) -->

      <text x="270" y="26" text-anchor="middle" font-size="10" fill="#e2e8f0" opacity="0.5" font-weight="500">Am</text>
      <text x="420" y="26" text-anchor="middle" font-size="10" fill="#e2e8f0" opacity="0.5" font-weight="500">Dm</text>
      <text x="571" y="26" text-anchor="middle" font-size="10" fill="#e2e8f0" opacity="0.5" font-weight="500">F</text>
      <text x="721" y="26" text-anchor="middle" font-size="10" fill="#e2e8f0" opacity="0.5" font-weight="500">C</text>
      <text x="872" y="26" text-anchor="middle" font-size="10" fill="#e2e8f0" opacity="0.5" font-weight="500">Am</text>

      <!-- Bar number labels -->

      <!-- C/F reference lines -->

      <line x1="44" y1="250" x2="1248" y2="250" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>

      <!-- Vertical bar lines (solid) — 8 bars, each 150.5px -->
      <line x1="44" y1="40" x2="44" y2="320" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
      <line x1="194.5" y1="40" x2="194.5" y2="320" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
      <line x1="345" y1="40" x2="345" y2="320" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>

      <line x1="1248" y1="40" x2="1248" y2="320" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>

      <!-- Vertical beat lines (dotted) — 4 beats per bar, skip downbeats -->
      <!-- Bar 1: 44 + 37.625, 75.25, 112.875 -->
      <line x1="81.6" y1="40" x2="81.6" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>

      <line x1="269.75" y1="40" x2="269.75" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>
      <line x1="307.4" y1="40" x2="307.4" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>
      <!-- Bar 3 -->
      <line x1="382.6" y1="40" x2="382.6" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>
      <line x1="420.25" y1="40" x2="420.25" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>
      <line x1="457.9" y1="40" x2="457.9" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>
      <!-- Bar 4 -->
      <line x1="533.1" y1="40" x2="533.1" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>
      <line x1="570.75" y1="40" x2="570.75" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>
      <line x1="608.4" y1="40" x2="608.4" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>
      <!-- Bar 5 -->
      <line x1="683.6" y1="40" x2="683.6" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>
      <line x1="721.25" y1="40" x2="721.25" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>
      <line x1="758.9" y1="40" x2="758.9" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>
      <!-- Bar 6 -->
      <line x1="834.1" y1="40" x2="834.1" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>
      <line x1="871.75" y1="40" x2="871.75" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2,4"/>

      <!-- Bar 8 -->

      <!--
        NOTES DATA — Whisperheads arrangement
        Grid math:
          barX(bar, beat) = 44 + (bar-1)*150.5 + (beat-1)*37.625
          pitchY(midi) = 320 - (midi - 48) * 11.667
          noteW(beats) = beats * 37.625
          laneH = 10
        Instruments: vocal=#7c3aed, bass=#4a9eff, drums=#ff4444, keys=#00ff88, synth=#ffaa00, guitar=#ff6b6b
      -->

      <!-- ====== INTRO (Bars 1-2) ====== -->

      <!-- Keys: Dm chord (D3, F3, A3) — bar 1, whole notes -->
      <rect x="44" y="250.0" rx="2" ry="2" width="150.5" height="10" fill="#00ff88" opacity="0.55"/>
      <rect x="44" y="226.7" rx="2" ry="2" width="150.5" height="10" fill="#00ff88" opacity="0.5"/>
      <rect x="44" y="203.3" rx="2" ry="2" width="150.5" height="10" fill="#00ff88" opacity="0.5"/>

      <!-- Keys: Am chord (A3, C4, E4) — bar 2 -->

      <rect x="194.5" y="156.7" rx="2" ry="2" width="150.5" height="10" fill="#00ff88" opacity="0.5"/>

      <!-- Synth: atmospheric pad, D4 sustain bar 1-2 -->
      <rect x="44" y="110.0" rx="2" ry="2" width="301" height="10" fill="#ffaa00" opacity="0.3"/>

      <rect x="119.25" y="86.7" rx="2" ry="2" width="188.1" height="10" fill="#ffaa00" opacity="0.25"/>

      <!-- Bass: D2 (would be below range, use D3=50) — bar 1, half notes -->
      <rect x="44" y="296.7" rx="2" ry="2" width="75.25" height="10" fill="#4a9eff" opacity="0.7"/>
      <rect x="119.25" y="296.7" rx="2" ry="2" width="75.25" height="10" fill="#4a9eff" opacity="0.55"/>
      <!-- Bass: A2 (use A3-12 → A2=57-12=45, clamp to C3=48) bar 2 -->
      <rect x="194.5" y="320.0" rx="2" ry="2" width="75.25" height="10" fill="#4a9eff" opacity="0.65"/>
      <rect x="307.4" y="320.0" rx="2" ry="2" width="37.6" height="10" fill="#4a9eff" opacity="0.5"/>

      <!-- Drums: kick on 1 and 3, snare on 2 and 4 (low range: kick=C3, snare=D3) -->
      <!-- Bar 1 -->
      <rect x="44" y="308.3" rx="2" ry="2" width="15" height="10" fill="#ff4444" opacity="0.9"/>
      <rect x="81.6" y="296.7" rx="2" ry="2" width="12" height="10" fill="#ff4444" opacity="0.7"/>

      <!-- Bar 2 -->
      <rect x="194.5" y="308.3" rx="2" ry="2" width="15" height="10" fill="#ff4444" opacity="0.9"/>
      <rect x="232.1" y="296.7" rx="2" ry="2" width="12" height="10" fill="#ff4444" opacity="0.7"/>

      <rect x="307.4" y="296.7" rx="2" ry="2" width="12" height="10" fill="#ff4444" opacity="0.6"/>

      <!-- Hi-hat: eighth notes across bars 1-2 (E3=52) -->

      <rect x="62.8" y="273.3" rx="1" ry="1" width="8" height="8" fill="#ff4444" opacity="0.35"/>

      <!-- ====== VERSE (Bars 3-6) ====== -->

      <rect x="345" y="250.0" rx="2" ry="2" width="150.5" height="10" fill="#00ff88" opacity="0.6"/>
