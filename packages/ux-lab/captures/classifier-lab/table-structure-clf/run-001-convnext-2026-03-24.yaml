## Classifier Lab — Comprehensive Test Manifest
## End-to-end pipeline test: Research → Data → Train → Benchmark → Evaluate → Promote
## Agent drives via headless CDP (ws://localhost:9222) — NO mouse hijack
## Task: Document table structure classification (lattice/stream/borderless)
## Dataset: HuggingFace (PubTables-1M or TableBank)

# ═══════════════════════════════════════════════════════════════════
# PHASE 0: SETUP & AGENT CONTROL
# ═══════════════════════════════════════════════════════════════════

- id: setup_launch_headless_chrome
  element: "headless Chrome process"
  action: "google-chrome --headless --remote-debugging-port=9222 --disable-gpu --no-sandbox"
  expected: "Chrome listening on ws://localhost:9222, no visible browser window"
  status: UNTESTED

- id: setup_navigate_classifier_lab
  element: "CDP: Page.navigate"
  action: "navigate to http://localhost:3001/#classifier-lab"
  expected: "Classifier Lab view renders with left pane showing 6 projects, Train tab active by default"
  status: UNTESTED

- id: setup_activate_agent_control
  element: "POST /api/agent-control/activate"
  action: "curl -X POST http://localhost:3001/api/agent-control/activate -H 'Content-Type: application/json' -d '{\"project\":\"classifier-lab\"}'"
  expected: "Response: {active: true}. AgentControl button in header shows green pulse glow."
  status: UNTESTED

- id: setup_heartbeat_loop
  element: "POST /api/agent-control/heartbeat"
  action: "Start background loop: POST heartbeat every 5s with {project: 'classifier-lab'}"
  expected: "Agent remains active (no 10s timeout). Green glow persists."
  status: UNTESTED

- id: setup_verify_hf_token
  element: "environment"
  action: "echo $HF_TOKEN | head -c 5"
  expected: "Returns 'hf_kM' — token is set"
  status: UNTESTED

# ═══════════════════════════════════════════════════════════════════
# PHASE 1: RESEARCH TAB — /dogpile for SOTA + find dataset
# ═══════════════════════════════════════════════════════════════════

- id: research_click_tab
  element: "RESEARCH tab button"
  action: "CDP: click button with text 'RESEARCH'"
  expected: "Research tab active (purple underline). Main area shows rendered markdown."
  status: UNTESTED

- id: research_dogpile_sota
  element: "skill: /dogpile"
  action: |
    cd .pi/skills/dogpile && ./run.sh "best vision classifiers for PDF table structure detection 2025 2026 lattice stream borderless PubTables TableBank ConvNeXt EfficientNet"
  expected: |
    Dogpile report with:
    - At least 3 backbone recommendations (ConvNeXt, EfficientNet, FastViT, DiT)
    - arXiv paper references
    - Expected F1 ranges
    - Latency estimates
  status: UNTESTED

- id: research_dogpile_dataset
  element: "skill: /dogpile"
  action: |
    cd .pi/skills/dogpile && ./run.sh "HuggingFace dataset table structure classification lattice stream borderless PDF document images training data"
  expected: |
    Report identifies at least one HuggingFace dataset:
    - microsoft/table-transformer or bsmock/pubtables-1m or similar
    - Reports number of classes and approximate sample counts
    - Confirms >= 200 samples per class available
  status: UNTESTED

- id: research_github_search
  element: "skill: /github-search"
  action: |
    cd .pi/skills/github-search && ./run.sh "table structure classification dataset lattice stream borderless"
  expected: "Found relevant repositories with table classification datasets or pretrained models"
  status: UNTESTED

- id: research_hf_download
  element: "huggingface_hub CLI"
  action: |
    HF_TOKEN=$HF_TOKEN python3 -c "
    from huggingface_hub import snapshot_download
    import os
    snapshot_download(
        repo_id='bsmock/pubtables-1m',
        repo_type='dataset',
        local_dir='/mnt/storage12tb/media/agents/shared/classifier-lab/data/pubtables-1m',
        token=os.environ.get('HF_TOKEN'),
        max_workers=4,
        allow_patterns=['*.jpg', '*.png', '*.json', '*.csv', '*.txt']
    )
    "
  expected: |
    Dataset downloaded to /mnt/storage12tb/media/agents/shared/classifier-lab/data/pubtables-1m
    - Contains image files organized by class
    - At least 3 classes identifiable
    - Total size < 50GB (we're on 12TB drive, not NVMe)
  status: UNTESTED

- id: research_verify_dataset_structure
  element: "filesystem"
  action: "find /mnt/storage12tb/media/agents/shared/classifier-lab/data/pubtables-1m -type f | head -20 && find ... -type d | head -10"
  expected: |
    Directory structure visible with either:
    - Class subdirs (lattice/, stream/, borderless/) containing images, OR
    - JSONL/CSV with image_path + label columns
    - At least 600 total images (200 per class minimum)
  status: UNTESTED

- id: research_update_tab_content
  element: "WebSocket: agent-bus"
  action: "Send {type: 'narrate', payload: {message: 'Research complete. Found 3 backbones and PubTables-1M dataset.'}}"
  expected: "Research tab updates with dogpile report content. Narration text appears in UI."
  status: UNTESTED

- id: research_screenshot
  element: "CDP: Page.captureScreenshot"
  action: "screenshot to captures/classifier-lab/e2e-test/01-research.png"
  expected: "Screenshot shows Research tab with markdown report, left pane with projects, AGENT button green"
  status: UNTESTED

# ═══════════════════════════════════════════════════════════════════
# PHASE 2: DATA TAB — Validate dataset meets quality gates
# ═══════════════════════════════════════════════════════════════════

- id: data_click_tab
  element: "DATA tab button"
  action: "CDP: click button with text 'DATA'"
  expected: "Data tab active. Shows dataset summary cards, class distribution, validation gate."
  status: UNTESTED

- id: data_count_classes
  element: "script"
  action: |
    python3 -c "
    from pathlib import Path
    data_dir = Path('/mnt/storage12tb/media/agents/shared/classifier-lab/data/pubtables-1m')
    for d in sorted(data_dir.iterdir()):
        if d.is_dir():
            count = len(list(d.glob('*.png')) + list(d.glob('*.jpg')))
            print(f'{d.name}: {count} images')
    "
  expected: |
    Output like:
      lattice: 412 images
      stream: 289 images
      borderless: 146 images
    At least 3 classes. Note if any class < 200 (triggers FAILED gate).
  status: UNTESTED

- id: data_check_gate
  element: "Validation gate card in Data tab"
  action: "CDP: visual check"
  expected: |
    If all classes >= 200: green VALIDATION PASSED card with ShieldCheck icon
    If any class < 200: red VALIDATION FAILED card with AlertTriangle + AUGMENT DATASET button
  status: UNTESTED

- id: data_class_distribution_bars
  element: "Class distribution bar chart"
  action: "CDP: visual check"
  expected: "Horizontal bars for each class, proportional to sample count, correct NVIS colors"
  status: UNTESTED

- id: data_screenshot
  element: "CDP: Page.captureScreenshot"
  action: "screenshot to captures/classifier-lab/e2e-test/02-data.png"
  expected: "Screenshot shows Data tab with real dataset stats, class bars, gate status"
  status: UNTESTED

# ═══════════════════════════════════════════════════════════════════
# PHASE 3: TRAIN TAB — Run backbone comparison (the leaderboard)
# ═══════════════════════════════════════════════════════════════════

- id: train_click_tab
  element: "TRAIN tab button"
  action: "CDP: click button with text 'TRAIN'"
  expected: "Train tab active. Shows leaderboard (may be empty initially)."
  status: UNTESTED

- id: train_select_gpu
  element: "GPU picker cards"
  action: "CDP: click 'LOCAL A5000' card"
  expected: "Local A5000 card highlighted with green border. Price shows FREE."
  status: UNTESTED

- id: train_start_benchmark
  element: "classifier-lab CLI"
  action: |
    cd .pi/skills/classifier-lab && ./run.sh benchmark \
      --data-dir /mnt/storage12tb/media/agents/shared/classifier-lab/data/pubtables-1m \
      --backbones "convnextv2_nano.fcmae_ft_in22k_in1k,efficientnet_b0,fastvit_sa12.apple_in1k" \
      --epochs 5 \
      --output-json /tmp/classifier-lab-e2e-benchmark.json \
      --store-memory \
      --require-memory-store
  expected: |
    Training starts for 3 backbones sequentially.
    Output JSON written to /tmp/classifier-lab-e2e-benchmark.json.
    Status: "ok". selected_backbone is not null.
  timeout: 3600
  status: UNTESTED

- id: train_monitor_tb_1
  element: "classifier-lab CLI: tb-summary"
  action: "cd .pi/skills/classifier-lab && ./run.sh tb-summary --json"
  expected: |
    JSON output with runs, each showing:
    - train/loss with latest, min, max values
    - _convergence: "converging" or "insufficient_data" (not "diverging")
  delay_after: 120
  status: UNTESTED

- id: train_monitor_tb_2
  element: "classifier-lab CLI: tb-summary"
  action: "cd .pi/skills/classifier-lab && ./run.sh tb-summary --json"
  expected: "Loss decreasing from monitor_tb_1. Convergence: converging."
  delay_after: 120
  status: UNTESTED

- id: train_monitor_tb_3
  element: "classifier-lab CLI: tb-summary"
  action: "cd .pi/skills/classifier-lab && ./run.sh tb-summary --json"
  expected: "Loss continues decreasing or plateaued. NOT diverging."
  delay_after: 120
  status: UNTESTED

- id: train_check_status
  element: "classifier-lab CLI: status"
  action: "cd .pi/skills/classifier-lab && ./run.sh status --json"
  expected: |
    JSON with:
    - running: [] (empty if all done) or active PIDs
    - completed: [{pid, output, macro_f1, accuracy, backbone}] with real values
  status: UNTESTED

- id: train_read_results
  element: "output JSON"
  action: "cat /tmp/classifier-lab-e2e-benchmark.json | python3 -m json.tool"
  expected: |
    Valid JSON with:
    - status: "ok"
    - selected_backbone: one of the 3 candidates
    - selected_metrics.macro_f1: > 0.0 (any positive value on real data)
    - results: array of 3 entries, each with macro_f1, accuracy, wilson_score_lower
    - memory_store.status: "ok"
  status: UNTESTED

- id: train_send_leaderboard_to_bus
  element: "WebSocket: agent-bus"
  action: "Send training-update message with rows from benchmark results"
  expected: "Leaderboard table in Train tab updates with real F1/accuracy/latency values"
  status: UNTESTED

- id: train_screenshot
  element: "CDP: Page.captureScreenshot"
  action: "screenshot to captures/classifier-lab/e2e-test/03-train.png"
  expected: "Train tab shows populated leaderboard with real metrics, PASS/FAIL badges, GPU picker"
  status: UNTESTED

