- id: evaluate_run_eval
  element: "classifier-lab CLI: evaluate"
  action: |
    cd .pi/skills/classifier-lab && ./run.sh evaluate \
      --model /mnt/storage12tb/media/agents/shared/classifier-lab/models/{{winner}} \
      --data-dir /mnt/storage12tb/media/agents/shared/classifier-lab/data/pubtables-1m \
      --output-json /tmp/classifier-lab-e2e-eval.json
  expected: |
    Evaluation JSON with:
    - confusion_matrix: NxN array
    - per_class: array of {name, precision, recall, f1, support}
