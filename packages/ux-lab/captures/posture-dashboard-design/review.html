<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostureDashboard — 3 Variations</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0b0d; color: #e8eaed; font-family: 'SF Mono', 'Fira Code', monospace; }
.tabs {
  display: flex; gap: 0; position: sticky; top: 0; z-index: 100;
  background: #0a0b0d; border-bottom: 1px solid #1e2128; padding: 0 16px;
}
.tab {
  padding: 12px 24px; cursor: pointer; font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em; color: #6b7280;
  border-bottom: 2px solid transparent; transition: all 0.2s;
  background: none; border-top: none; border-left: none; border-right: none;
}
.tab:hover { color: #e8eaed; }
.tab.active { color: #00ff88; border-bottom-color: #00ff88; }
.tab-content { display: none; }
.tab-content.active { display: block; }
iframe {
  width: 100%; height: calc(100vh - 48px); border: none; background: #0d0f12;
}
</style>
</head>
<body>
<div class="tabs">
  <button class="tab active" onclick="switchTab(0)">Variation 1</button>
  <button class="tab" onclick="switchTab(1)">Variation 2</button>
  <button class="tab" onclick="switchTab(2)">Variation 3</button>
</div>
<div class="tab-content active" id="tab-0">
  <iframe src="variation_1.html"></iframe>
</div>
<div class="tab-content" id="tab-1">
  <iframe src="variation_2.html"></iframe>
</div>
<div class="tab-content" id="tab-2">
  <iframe src="variation_3.html"></iframe>
</div>
<script>
function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));
}
</script>
</body>
</html>
