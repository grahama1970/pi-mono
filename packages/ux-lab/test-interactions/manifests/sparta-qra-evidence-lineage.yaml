version: 1
kind: test-interactions-manifest
metadata:
  title: "Sparta QRA evidence lineage workflow"
  persona: "Aerospace Cybersecurity Evidence Reviewer"
  route: "http://localhost:3002/#sparta-explorer/qras"
  seed_data:
    requirement: "QRA corpus with grounded, failed, adversarial, self-corrected-needs-case, and human-reviewed examples"
    minimum_rows: 100
    minimum_cases: 1
  expected_visual_outcome: "QRA list and detail states distinguish corpus evidence status from loaded rows and from human review state."
surface:
  name: "sparta-qras"
  wait_for_data_qid: "qras:search"
  min_loaded_rows: 100
  min_evidence_cases: 1
interactions:
  - name: "filter QRA search"
    action: "type"
    data_qid: "qras:search"
    value: "CAPEC-649"
    expected_result: "QRA list filters to rows matching CAPEC-649."
    screenshot_artifact: "sparta-qra-evidence-lineage-01-search.png"
  - name: "filter grounded"
    action: "click"
    data_qid: "qras:filter:evidence:grounded"
    expected_result: "List shows QRAs with current evidence-case lineage."
    screenshot_artifact: "sparta-qra-evidence-lineage-02-grounded.png"
  - name: "filter review"
    action: "click"
    data_qid: "qras:filter:evidence:review"
    expected_result: "List shows QRAs requiring review without implying human approval."
    screenshot_artifact: "sparta-qra-evidence-lineage-03-review.png"
  - name: "filter adversarial"
    action: "click"
    data_qid: "qras:filter:evidence:adversarial"
    expected_result: "Adversarial negative examples remain classified and excluded from repair-in-place."
    screenshot_artifact: "sparta-qra-evidence-lineage-04-adversarial.png"
  - name: "filter missing"
    action: "click"
    data_qid: "qras:filter:evidence:missing"
    expected_result: "Missing evidence-case QRAs are shown as queued for grounding, not failed review."
    screenshot_artifact: "sparta-qra-evidence-lineage-05-missing.png"
  - name: "filter failed"
    action: "click"
    data_qid: "qras:filter:evidence:failed"
    expected_result: "Failed evidence-case QRAs are shown separately from adversarial and human-reviewed states."
    screenshot_artifact: "sparta-qra-evidence-lineage-06-failed.png"
  - name: "open QRA detail"
    action: "click"
    data_qid: "qras:item:latest"
    fallback_data_qid: "qras:item:0"
    expected_result: "QRA detail opens with question, source, evidence status, and lineage controls."
    screenshot_artifact: "sparta-qra-evidence-lineage-07-detail.png"
  - name: "toggle evidence"
    action: "click"
    data_qid: "qras:action:toggle_evidence"
    expected_result: "Evidence section opens with version and gate trace context."
    screenshot_artifact: "sparta-qra-evidence-lineage-08-toggle-evidence.png"
  - name: "run case"
    action: "click"
    data_qid: "sparta:evidence-workspace:rerun"
    expected_result: "Rerun queues a new evidence case while retaining predecessor version references."
    screenshot_artifact: "sparta-qra-evidence-lineage-09-rerun.png"
  - name: "send to human review"
    action: "click"
    data_qid: "sparta:evidence-workspace:defer"
    expected_result: "QRA is routed to human review without changing advisory or evidence lineage state."
    screenshot_artifact: "sparta-qra-evidence-lineage-10-human-review.png"
  - name: "blocked deep-link recovery diagnostics"
    action: "click"
    route: "http://localhost:3002/#sparta-explorer/qras?qra=000a5d68cbd446e5"
    data_qid: "qras:recovery:open-diagnostics"
    expected_result: "When the deep-linked QRA document is unavailable, the center pane shows a recovery trace and a diagnostics JSON export instead of document review actions."
    screenshot_artifact: "sparta-qra-evidence-lineage-11-recovery-diagnostics.png"
  - name: "copy blocked deep-link diagnostics"
    action: "click"
    data_qid: "qras:recovery:copy-diagnostics"
    expected_result: "Diagnostics export includes requested key, source, filters, queue state, detail state, and status-count state."
    screenshot_artifact: "sparta-qra-evidence-lineage-12-copy-diagnostics.png"
  - name: "blocked approve rationale"
    action: "click"
    data_qid: "qras:action:accept"
    expected_result: "Approve is disabled or blocked with an explicit rationale unless the QRA is loaded and evidence gates allow approval."
    screenshot_artifact: "sparta-qra-evidence-lineage-13-approve-blocked.png"
  - name: "open source-grounded evidence flow node"
    action: "click"
    data_qid: "qras:evidence-flow:claims"
    expected_result: "Clicking Answer Claims opens the matching source-grounded evidence trace section."
    screenshot_artifact: "sparta-qra-evidence-lineage-14-evidence-flow-claims.png"
  - name: "inspect advisory repair branch"
    action: "click"
    data_qid: "qras:evidence-flow:failed-gate"
    expected_result: "Advisory repair branch is dashed, labeled not evidence, and visually separate from source-grounded evidence."
    screenshot_artifact: "sparta-qra-evidence-lineage-15-advisory-branch.png"
assertions:
  - data_qid: "qras:filter:evidence:grounded"
    action: "assert_title"
    expected_result: "Grounded filter has a title tooltip."
    screenshot_artifact: "sparta-qra-evidence-lineage-assert-grounded-title.png"
  - data_qid: "qras:filter:evidence:adversarial"
    action: "assert_title"
    expected_result: "Adversarial filter has a title tooltip."
    screenshot_artifact: "sparta-qra-evidence-lineage-assert-adversarial-title.png"
  - data_qid: "qras:display:entity-help"
    action: "assert_visible"
    expected_result: "QRA detail retains entity/readiness context."
    screenshot_artifact: "sparta-qra-evidence-lineage-assert-detail-context.png"
  - data_qid: "qras:evidence-flow"
    action: "assert_visible"
    expected_result: "Evidence flow mini-map is visible and does not replace the textual evidence trace."
    screenshot_artifact: "sparta-qra-evidence-lineage-assert-flow-visible.png"
  - data_qid: "qras:action:decision-error"
    action: "assert_conditional_visible"
    expected_result: "Decision write failures or blocked approval reasons are visible and do not auto-advance the queue."
    screenshot_artifact: "sparta-qra-evidence-lineage-assert-decision-error.png"
