version: 1
kind: test-interactions-manifest
metadata:
  title: "Sparta Chat CAE gap workflow"
  persona: "Aerospace Cybersecurity Evidence Reviewer"
  route: "http://localhost:3002/#sparta-explorer/chat"
  seed_data:
    requirement: "Question that fails or returns inconclusive from /create-evidence-case"
    minimum_cases: 1
    minimum_persona_reviews: 3
  expected_visual_outcome: "Trace separates source-grounded evidence case state, advisory persona diagnosis, proposed correction, and human actions."
surface:
  name: "sparta-chat"
  wait_for_data_qid: "chat:composer"
  min_loaded_rows: 0
  min_evidence_cases: 1
interactions:
  - name: "focus chat input"
    action: "focus"
    data_qid: "chat:input"
    expected_result: "Chat input is ready for an evidence-case question."
    screenshot_artifact: "sparta-chat-cae-gap-01-input.png"
  - name: "enter failing evidence-case question"
    action: "type"
    data_qid: "chat:input"
    value: "Why is CAPEC-649 relevant to T100?"
    expected_result: "Question text is present in the composer."
    screenshot_artifact: "sparta-chat-cae-gap-02-question.png"
  - name: "send question"
    action: "click"
    data_qid: "chat:send"
    expected_result: "Chat message is submitted and evidence actions become available."
    screenshot_artifact: "sparta-chat-cae-gap-03-sent.png"
  - name: "run evidence case"
    action: "click"
    data_qid: "chat:evidence-case:latest"
    fallback_data_qid: "chat:evidence-case:0"
    expected_result: "Evidence trace starts with gate, retrieval, verdict, and diagnostic events."
    screenshot_artifact: "sparta-chat-cae-gap-04-run-case.png"
  - name: "open gap analysis"
    action: "click"
    data_qid: "sparta:evidence-workspace:tab-gap"
    expected_result: "Advisory gap diagnosis panel is visible and labeled as advisory."
    screenshot_artifact: "sparta-chat-cae-gap-05-gap-analysis.png"
  - name: "inspect Brandon review"
    action: "assert_visible"
    data_qid: "sparta:evidence-workspace:persona-brandon"
    expected_result: "Brandon Bailey review card shows missing policy or sufficiency evidence."
    screenshot_artifact: "sparta-chat-cae-gap-06-brandon.png"
  - name: "inspect Margaret review"
    action: "assert_visible"
    data_qid: "sparta:evidence-workspace:persona-margaret"
    expected_result: "Margaret Chen review card shows technical enforcement evidence gaps."
    screenshot_artifact: "sparta-chat-cae-gap-07-margaret.png"
  - name: "inspect Jennifer review"
    action: "assert_visible"
    data_qid: "sparta:evidence-workspace:persona-jennifer"
    expected_result: "Jennifer Park review card shows mapping or relationship evidence gaps."
    screenshot_artifact: "sparta-chat-cae-gap-08-jennifer.png"
  - name: "inspect judge routing"
    action: "assert_visible"
    data_qid: "sparta:evidence-workspace:persona-judge"
    expected_result: "Judge route names one persona or human review queue for the next gap."
    screenshot_artifact: "sparta-chat-cae-gap-09-judge.png"
  - name: "interrupt course correction"
    action: "click"
    data_qid: "sparta:evidence-workspace:pause"
    expected_result: "Human interruption state is visible and does not mark the QRA as human-reviewed."
    screenshot_artifact: "sparta-chat-cae-gap-10-interrupt.png"
  - name: "rerun evidence case"
    action: "click"
    data_qid: "sparta:evidence-workspace:rerun"
    expected_result: "A new evidence-case run is queued from the proposed correction with prior version references retained."
    screenshot_artifact: "sparta-chat-cae-gap-11-rerun.png"
  - name: "defer to human review"
    action: "click"
    data_qid: "sparta:evidence-workspace:defer"
    expected_result: "Case is deferred for human review without using approved or verified language."
    screenshot_artifact: "sparta-chat-cae-gap-12-defer.png"
assertions:
  - data_qid: "chat:composer"
    action: "assert_visible"
    expected_result: "Chat composer remains available."
    screenshot_artifact: "sparta-chat-cae-gap-assert-composer.png"
  - data_qid: "sparta:evidence-workspace"
    action: "assert_visible"
    expected_result: "Evidence workspace renders trace/readiness context and action affordances."
    screenshot_artifact: "sparta-chat-cae-gap-assert-workspace.png"
  - data_qid: "sparta:evidence-workspace:rerun"
    action: "assert_title"
    expected_result: "Rerun control has a title tooltip."
    screenshot_artifact: "sparta-chat-cae-gap-assert-rerun-title.png"
