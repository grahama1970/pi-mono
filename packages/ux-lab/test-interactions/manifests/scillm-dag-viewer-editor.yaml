version: 1
kind: test-interactions-manifest
metadata:
  title: "SCILLM DAG viewer-editor source-backed workflow"
  persona: "Project agent and human operator debugging a real SCILLM DAG run"
  route: "http://localhost:3002/#scillm/dag-planner"
  expected_visual_outcome: "The operator can inspect a source graph, edit graph/node contract fields, run the draft through SCILLM, and see node runtime evidence without dashboard-only status claims."
surface:
  name: "scillm-dag-planner"
  wait_for_data_qid: "scillm:dag-contract-editor"
interactions:
  - name: "open dag planner"
    action: "assert_visible"
    data_qid: "scillm:dag-contract-editor"
    expected_result: "Developer-friendly DAG contract editor is visible."
    screenshot_artifact: "scillm-dag-01-editor.png"
  - name: "edit graph goal"
    action: "type"
    data_qid: "scillm:dag-graph-goal"
    value: " - interaction proof"
    expected_result: "Graph goal field accepts editable text."
    screenshot_artifact: "scillm-dag-02-graph-goal.png"
  - name: "apply graph metadata"
    action: "click"
    data_qid: "scillm:dag-apply-graph"
    expected_result: "Graph metadata is saved to the current draft or cloned source draft."
    screenshot_artifact: "scillm-dag-03-graph-apply.png"
  - name: "inspect dependency picker"
    action: "assert_visible"
    data_qid: "scillm:dag-dependency-picker"
    expected_result: "Dependencies are selected from existing upstream nodes rather than free-text edges."
    screenshot_artifact: "scillm-dag-04-dependency-picker.png"
  - name: "validate selected node"
    action: "click"
    data_qid: "scillm:dag-validate-node"
    expected_result: "Selected node contract validates or reports a concrete schema error."
    screenshot_artifact: "scillm-dag-05-node-validate.png"
  - name: "run draft"
    action: "click"
    data_qid: "scillm:dag-run-draft"
    expected_result: "Run is submitted to SCILLM and visible node status comes from runtime state."
    screenshot_artifact: "scillm-dag-06-run.png"
  - name: "inspect runtime evidence"
    action: "assert_visible"
    data_qid: "scillm:dag-node-runtime-evidence"
    expected_result: "Selected node evidence pane shows emitted result/hash/artifact fields when a node completes."
    screenshot_artifact: "scillm-dag-07-runtime-evidence.png"
assertions:
  - data_qid: "scillm:dag-contract-editor"
    action: "assert_visible"
    expected_result: "Primary editor remains source-backed."
    screenshot_artifact: "scillm-dag-assert-editor.png"
  - data_qid: "scillm:dag-node-runtime-evidence"
    action: "assert_visible"
    expected_result: "Runtime evidence pane is present for the selected node."
    screenshot_artifact: "scillm-dag-assert-evidence.png"
