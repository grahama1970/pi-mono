    depends_on: ["10"]
    skills:
      - "test-interactions"
    allowlist:
      - "packages/ux-lab/test-manifests/posture-dashboard.json"
    implementation:
      - "Use /test-interactions generate to create manifest from live DOM"
      - "Navigate to Posture tab in running browser via CDP"
      - "Query document.querySelectorAll('[data-qid]') to enumerate all interactive elements"
      - "Generate manifest JSON with: qid, tag, visible, clickable, hasTitle, hasQsAction"
      - "Validate: every data-qid has a matching data-qs-action and title"
      - "Test interactions: click each family bar (verify flyout opens), click each donut, click risk row"
      - "Save manifest to packages/ux-lab/test-manifests/posture-dashboard.json"
    tests:
      - "test -f packages/ux-lab/test-manifests/posture-dashboard.json && python3 -c \"import json; m=json.load(open('packages/ux-lab/test-manifests/posture-dashboard.json')); assert len(m.get('elements',[])) >= 20\""
    definition_of_done:
      command: "python3 -c \"import json; m=json.load(open('packages/ux-lab/test-manifests/posture-dashboard.json')); assert len(m.get('elements',m.get('interactions',[]))) >= 20; print(f'PASS: {len(m.get(\"elements\",m.get(\"interactions\",[])))} elements')\""
      assertion: "exit_code == 0"
    gate: "CDP manifest has 20+ interactive elements from live DOM, all with data-qid + data-qs-action + title"
    visual: true

  - id: "12"
    title: "VLM review — compare implementation screenshots to approved V1 mockup"
    lane: "3"
    runner: "code-runner"
    backend: "gemini"
    mode: "one_shot"
    depends_on: ["11"]
    skills:
      - "review-design"
    allowlist:
      - "packages/ux-lab/captures/posture-dashboard-design/"
    implementation:
      - "Capture CDP screenshots of PostureDashboard in running browser"
      - "Per-pane crops: hero-row, family-bars, gap-analysis, drift-alerts, top-risks"
      - "Compare each crop against approved V1 mockup (variation_1.html rendered)"
      - "Per-pane VLM scoring: layout match, color match, data presence, typography"
      - "Each pane match score >= 80 → PASS"
    tests:
      - "test $(ls packages/ux-lab/captures/posture-dashboard-design/implementation-*.png 2>/dev/null | wc -l) -ge 3"
    definition_of_done:
      command: "test $(ls packages/ux-lab/captures/posture-dashboard-design/implementation-*.png 2>/dev/null | wc -l) -ge 3 && test -f packages/ux-lab/test-manifests/posture-dashboard.json"
      assertion: "exit_code == 0"
    gate: "VLM captured 3+ per-pane implementation screenshots and manifest exists"
    visual: true

test_manifest:
  - view: PostureDashboard
    collection: sparta_controls
    min_rows: 100
    endpoints:
      - "GET /api/posture/frameworks"
      - "GET /api/posture/families/NIST"
      - "GET /api/posture/gaps"
      - "GET /api/posture/risks"
      - "GET /api/posture/alerts"
      - "GET /api/posture/overview"
    interactions:
      - click_framework_donut
      - click_family_bar
      - open_family_flyout
      - close_family_flyout
      - click_gap_badge
      - click_risk_row
      - click_alert_row
      - click_overview_well
    data_qid_coverage: "100%"
    visual: "Dashboard shows posture score with delta, 8 framework donut rings, 15 NIST family stacked bars, gap analysis with 5 stat rows, drift alerts with glow-dots, top 10 risks table. All rendering real data from 11.6K controls via dedicated Express endpoints."
