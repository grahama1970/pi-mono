  goal: "Compliance officer ATO decision screen: dedicated Express API endpoints querying ArangoDB, PostureDashboard React component (3ft), 5ft landing page, Gauge nav icon, 100% data-qid coverage, CDP live DOM test manifest"
  plan_type: hybrid
  device: desktop
  created: "2026-04-03"
  primary_persona:
    name: "Brandon Bailey"
    role: "Compliance Officer / Authorizing Official"
    source: ".pi/agents/brandon-bailey/AGENTS.md"

execution:
  max_concurrency: 3

capability_overlap:
  - "/memory recall: usePostureData.ts hook DONE (349 lines, committed). PostureDashboard.tsx is 7-line stub."
  - "useSpartaCollections.ts hooks (useCollectionCounts, useRawFrameworkCounts) — CALL"
  - "EmbryStyle.ts (EMBRY colors, card, heading, label, body, fwBadge, glowDot) — CALL"
  - "Express /api/memory/* generic proxy — EXISTS but posture needs dedicated typed endpoints"
  - "verify-data-qid.py — CALL (packages/ux-lab/scripts/verify-data-qid.py)"
  - "/mockup-lab — SKIP (V1 mockup already approved at captures/posture-dashboard-design/)"
  - "/code-runner — CALL (Codex implementation)"
  - "/test-interactions — CALL (CDP live DOM manifest generation)"
  - "/best-practices-react — COMPLY (data-qid, data-qs-action, title, useRegisterAction on ALL interactive elements)"
  - "d3-shape (d3.arc, d3.pie), d3-scale — CALL (already in package.json)"
  - "CREATE justification: (1) No posture API endpoints exist — generic /api/memory/list requires client-side aggregation. Dedicated endpoints push aggregation server-side. (2) No PostureDashboard component. (3) No 5ft landing page. (4) No Gauge in nav."

design_constraints:
  embry_style:
    source: "packages/ux-lab/src/components/common/EmbryStyle.ts"
    rule: "ALL colors, backgrounds, borders, typography, and spacing MUST use EmbryStyle tokens — NEVER hardcoded hex values"
    tokens_required:
      - "EMBRY.bg, EMBRY.bgCard, EMBRY.bgPanel, EMBRY.bgDeep — backgrounds"
      - "EMBRY.border, EMBRY.borderHover — borders"
      - "EMBRY.green, EMBRY.red, EMBRY.amber, EMBRY.blue, EMBRY.accent — semantic colors"
      - "EMBRY.white, EMBRY.dim, EMBRY.muted — text"
      - "EMBRY.fw[framework] — framework-specific ring/badge colors"
      - "card, panel, label, heading, body — layout primitives"
      - "glowDot(color) — status indicators"
      - "fwBadge(framework) — framework badges"

  nvis_palette:
    standard: "MIL-STD-3009 (NVIS-compatible night vision)"
    rule: "NVIS compliance is built into EmbryStyle tokens. Using EmbryStyle = NVIS compliant. Hardcoded colors = NVIS violation."
    colors:
      green: "#00ff88 — operational/pass"
      red: "#ff4444 — critical/fail"
      amber: "#ffaa00 — warning/partial"
      blue: "#4a9eff — informational/NIST"
    enforcement: "grep for hardcoded hex in TSX (excluding EmbryStyle imports) = FAIL"

  cots_interaction:
    standard: "MIL-STD-1472H (Human Engineering)"
    rules:
      - "title attribute on ALL interactive elements (tooltips for touch/hover)"
      - "EMBRY.muted text must maintain ≥4.5:1 contrast ratio on dark backgrounds"
      - "Focus-visible outlines on all clickable elements (keyboard navigation)"
      - "No color-only signaling — every status uses color + shape/text (colorblind-safe)"
      - "Minimum touch target 44x44px for clickable elements"
      - "Error states use EMBRY.red + icon + text (never color alone)"
    colorblind_safe: "EmbryStyle graph palette is deuteranopia/protanopia verified. Donut rings use EMBRY.fw[] which differs by hue AND luminance."

  review_plan_gate:
    rule: "/review-plan MUST FAIL any task that:"
    failures:
      - "Uses hardcoded hex colors instead of EmbryStyle tokens"
      - "Missing title attribute on interactive elements"
      - "Color-only status signaling without text/icon fallback"
      - "Missing focus-visible styles on clickable elements"
      - "Imports CSS colors directly instead of from EmbryStyle"

questions_blockers: []

lanes:
  - id: "0"
    label: "Wave 0: Express API endpoints (backend-first)"
  - id: "1"
    label: "Wave 1: React components (PostureDashboard + OverviewLanding)"
  - id: "2"
    label: "Wave 2: Nav integration + QuerySpec instrumentation"
  - id: "3"
    label: "Wave 3: CDP live DOM test manifest + visual verification"

tasks:
  # ── Wave 0: Pre-flight + Express API endpoints ────────────────────────────
  # Pre-flight: verify dev servers are running before any task executes.
  # Backend-first: all data must be queryable before React touches it.
  # Each endpoint queries ArangoDB via memory daemon Unix socket.
  # No mock data. No hardcoded values. 502 on daemon failure.

  - id: "0"
    title: "Pre-flight: verify Express + Vite + memory daemon are running"
    lane: "0"
    runner: "local"
    backend: ""
    mode: ""
    depends_on: []
    command: |
      echo "=== Express server ===" &&
      curl -sf http://localhost:3001/api/health | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Express: OK')" &&
      echo "=== Vite dev server ===" &&
      curl -sf http://localhost:3002/ -o /dev/null && echo "Vite: OK" &&
      echo "=== Memory daemon ===" &&
      curl -sf --unix-socket /run/user/1000/embry/memory.sock http://localhost/recall -X POST -H 'Content-Type: application/json' -d '{"q":"test","k":1}' | python3 -c "import json,sys; json.load(sys.stdin); print('Memory daemon: OK')" &&
      echo "=== ALL PRE-FLIGHT PASS ==="
    definition_of_done:
      command: "curl -sf http://localhost:3001/api/health > /dev/null && curl -sf http://localhost:3002/ -o /dev/null"
      assertion: "exit_code == 0"
    gate: "Express (3001), Vite (3002), and memory daemon are all reachable"

  - id: "1"
    title: "Express endpoints: all /api/posture/* routes (frameworks, families, gaps, risks, alerts, overview)"
    lane: "0"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["0"]
    skills:
      - "best-practices-react"
    allowlist:
      - "packages/ux-lab/server/index.ts"
    read_context:
      - "packages/ux-lab/src/hooks/usePostureData.ts"
    implementation:
      - "Add all posture endpoints to server/index.ts (edits working directory directly — NOT worktree):"
      - ""
      - "GET /api/posture/frameworks:"
      - "  Query memory daemon via Unix socket /run/user/1000/embry/memory.sock:"
      - "  POST /list {collection: 'sparta_controls', return_fields: ['control_id','source_framework','nrs_score','weaknesses'], limit: 0}"
      - "  POST /list {collection: 'sparta_qra', return_fields: ['control_id'], group_by: 'control_id', limit: 0}"
      - "  Server-side aggregation: group by source_framework → { name, total, withQRAs, pct }"
      - "  Derive overallScore as weighted average of framework pcts"
      - "  Return JSON: { overallScore, delta: 0, frameworks: [...] }"
      - ""
      - "GET /api/posture/families/:framework:"
      - "  Query sparta_controls filtered by source_framework, group by NIST family prefix"
      - "  Per family: { family, total, pass: NRS>=0.8, partial: 0.6<=NRS<0.8, fail: NRS<0.6 }"
      - "  Return JSON: { framework, families: [...] }"
      - ""
      - "GET /api/posture/gaps:"
      - "  Query sparta_controls + sparta_qra + sparta_relationships"
      - "  Return: { missingQRAs, noRelationships, unmappedPolicies, expiredEvidence, manualReview, details: [...top 20] }"
      - ""
      - "GET /api/posture/risks?limit=10:"
      - "  Query sparta_controls sorted by weaknesses DESC, nrs_score ASC"
      - "  Return: { risks: [{ control_id, name, framework, weaknesses, nrs_score }] }"
      - ""
      - "GET /api/posture/alerts?limit=20:"
      - "  Query sparta_controls where NRS < 0.4 or weaknesses > 3"
      - "  Return: { alerts: [{ control_id, name, severity, message, timestamp }] }"
      - ""
      - "GET /api/posture/overview:"
      - "  Aggregates 4 wells: data_quality, threat_matrix, posture, proof_graph"
      - "  Single endpoint, single response — no waterfalls on client"
      - "  Return JSON: { wells: { data_quality, threat_matrix, posture, proof_graph } }"
      - ""
      - "ALL endpoints: res.status(502).json({error: 'Memory daemon unavailable'}) on connection failure"
    tests:
      - "grep -c 'posture' packages/ux-lab/server/index.ts | python3 -c \"import sys; assert int(sys.stdin.read().strip()) >= 6\""
    definition_of_done:
      command: "grep -q '/api/posture/frameworks' packages/ux-lab/server/index.ts && grep -q '/api/posture/overview' packages/ux-lab/server/index.ts && grep -q '/api/posture/gaps' packages/ux-lab/server/index.ts && grep -q '/api/posture/risks' packages/ux-lab/server/index.ts && grep -q '/api/posture/alerts' packages/ux-lab/server/index.ts && grep -q '/api/posture/families' packages/ux-lab/server/index.ts"
      assertion: "exit_code == 0"
    gate: "All 6 posture endpoints written to server/index.ts (file-based DoD — live server verification in Task 2)"

  - id: "2"
    title: "Verify posture endpoints exist in server/index.ts and Express serves them"
    lane: "0"
    runner: "local"
    backend: ""
    mode: ""
    depends_on: ["1"]
    command: |
      echo "=== File verification ===" &&
      grep -q '/api/posture/frameworks' packages/ux-lab/server/index.ts &&
      grep -q '/api/posture/families' packages/ux-lab/server/index.ts &&
      grep -q '/api/posture/gaps' packages/ux-lab/server/index.ts &&
      grep -q '/api/posture/risks' packages/ux-lab/server/index.ts &&
      grep -q '/api/posture/alerts' packages/ux-lab/server/index.ts &&
      grep -q '/api/posture/overview' packages/ux-lab/server/index.ts &&
      echo "=== All 6 posture endpoints present in server/index.ts ===" &&
      echo "=== PASS (live endpoint verification deferred to Wave 3 gate) ==="
    definition_of_done:
      command: "grep -q '/api/posture/frameworks' packages/ux-lab/server/index.ts && grep -q '/api/posture/overview' packages/ux-lab/server/index.ts"
      assertion: "exit_code == 0"
    gate: "All 6 posture endpoints exist in server/index.ts. Live verification requires Express restart (manual or hot-reload)."

  # ── Wave 1: React components ───────────────────────────────────────────────
  # Approved mockup: captures/posture-dashboard-design/variation_1.html
