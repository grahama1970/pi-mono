version: 1
kind: orchestrate-plan
repo_root: "/home/graham/workspace/experiments/pi-mono"

metadata:
  title: "SPARTA Posture Dashboard"
  goal: "Build compliance officer view with control family pass rates, framework coverage rings, gap analysis, drift detection, and risk ranking — the AO's ATO decision screen"
  plan_type: design
  device: desktop
  created: "2026-04-02"
  primary_persona:
    name: "Brandon Bailey"
    role: "Compliance Officer / Authorizing Official"
    source: ".pi/agents/brandon-bailey/AGENTS.md"

execution:
  max_concurrency: 3

capability_overlap:
  - "/memory recall: 116 results for 'posture dashboard SPARTA' — no prior implementation, only checkpoint references to the stub"
  - "/dogpile research completed: eMASS, XACTA, ServiceNow GRC, FedRAMP ConMon, CMMC dashboard patterns surveyed"
  - "useSpartaCollections.ts hooks (useCollectionCounts, useRawFrameworkCounts, useControlsByFramework) — CALL"
  - "EmbryStyle.ts (EMBRY colors, card, heading, label, body, fwBadge, glowDot) — CALL"
  - "ThreatMatrix — REFERENCE (adversary view pattern, not reuse)"
  - "OverviewView — REFERENCE (pipeline health, not compliance posture)"
  - "/mockup-lab — CALL (design generation)"
  - "/code-runner — CALL (Codex implementation)"
  - "/test-interactions — CALL (CDP visual verification)"
  - "/best-practices-d3 — COMPLY (React owns DOM, D3 does math only)"
  - "/best-practices-react — COMPLY (QuerySpec, no waterfalls, useMemo)"
  - "d3-shape (d3.arc, d3.pie), d3-scale — CALL (already in package.json)"
  - "CREATE justification: No component renders control-family-level compliance posture. OverviewView=pipeline counts, ThreatMatrix=adversary techniques. Compliance officer view (NIST family pass rates, gap analysis, drift, risk ranking) is new."

questions_blockers: []

lanes:
  - id: "0"
    label: "Wave 0: Data hooks + design"
  - id: "1"
    label: "Wave 1: Core dashboard implementation"
  - id: "2"
    label: "Wave 2: Interactive panels + QuerySpec"
  - id: "3"
    label: "Wave 3: Visual verification"

tasks:
  # ── Wave 0: Data layer + design ──────────────────────────────────────────

  - id: "1"
    title: "Create usePostureData hook — aggregates control family stats"
    lane: "0"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: []
    skills:
      - "best-practices-react"
    allowlist:
      - "packages/ux-lab/src/hooks/usePostureData.ts"
    implementation:
      - "Create packages/ux-lab/src/hooks/usePostureData.ts"
      - "Hook fetches in parallel (Promise.all, no waterfalls per /best-practices-react):"
      - "  1. /api/memory/list sparta_controls — return_fields: [control_id, name, source_framework, control_type, weaknesses, nrs_score, mind]"
      - "  2. /api/memory/list sparta_qra — count per control_id (filters + limit:0)"
      - "  3. /api/memory/list sparta_relationships — count per source/target"
      - "  4. /api/memory/list sparta_urls — count per control mapping"
      - "Compute derived data with useMemo:"
      - "  - controlsByFamily: Map keyed by NIST family prefix (AC, AU, CA, CM, IA, IR, MA, MP, PE, PL, PS, RA, SA, SC, SI)"
      - "  - frameworkCoverage: per-framework { total, withQRAs, withRels, pct }"
      - "  - overallScore: weighted average of family pass rates"
      - "  - gaps: controls with zero QRAs OR zero relationships"
      - "  - topRisks: controls sorted by weakness count desc, NRS asc, top 10"
      - "  - nrsDistribution: { accept: NRS>=0.8, uncertain: 0.6-0.8, reject: <0.6 }"
      - "Fetch controls in batches of 500 (11.6K total)"
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit"
      - "test-lab/run.sh verify-task 1 packages/ux-lab/src/hooks/ --domain typescript"
    definition_of_done:
      command: "grep -q 'export function usePostureData' packages/ux-lab/src/hooks/usePostureData.ts"
      assertion: "exit_code == 0"
    gate: "Hook exports usePostureData"

  - id: "2"
    title: "Generate Posture Dashboard design via /mockup-lab"
    lane: "0"
    runner: "code-runner"
    backend: "gemini"
    mode: "iterative"
    depends_on: []
    skills:
      - "mockup-lab"
    allowlist:
      - "packages/ux-lab/captures/posture-dashboard-design/"
    design_board: true
    png_evidence: true
    implementation:
      - "Generate desktop design with /mockup-lab --device desktop"
      - "Design brief:"
      - "  Dark theme (EMBRY: bg=#0d0f12, card=#12151a, green=#00ff88, amber=#ffaa00, red=#ff4444, blue=#4a9eff)"
      - "  Row 1 (hero): Large posture score number + delta badge + 8 framework donut rings"
      - "  Row 2 (main): NIST 800-53 family stacked bars (left 2/3) + gap analysis card (right 1/3)"
      - "  Row 3 (detail): Drift alerts list (left) + top risks table (right)"
      - "  Monospace text, uppercase labels, glow dots"
      - "Save per-pane PNGs: hero-row.png, family-bars.png, gap-analysis.png, drift-alerts.png, top-risks.png"
      - "Human reviews and approves each pane"
    tests:
      - "ls packages/ux-lab/captures/posture-dashboard-design/*.png | wc -l"
    definition_of_done:
      command: "test $(ls packages/ux-lab/captures/posture-dashboard-design/*.png 2>/dev/null | wc -l) -ge 1 && echo PASS"
      assertion: "exit_code == 0"
    gate: "Human approves all pane mockups before coding begins"
    visual: true

  # ── Wave 1: Core implementation ──────────────────────────────────────────

  - id: "3"
    title: "Implement PostureDashboard.tsx — hero row (score + framework rings)"
    lane: "1"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["1", "2"]
    skills:
      - "best-practices-react"
      - "best-practices-d3"
    allowlist:
      - "packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx"
    design_board: "Task 2 provides approved hero-row.png mockup"
    png_evidence: "Capture CDP screenshot of hero row after implementation for /review-design comparison"
    implementation:
      - "Replace 7-line stub at packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx"
      - "Import usePostureData, EMBRY styles, d3-shape (arc, pie), d3-scale"
      - "Hero row: large posture score (fontSize 48, color by threshold) + delta badge + 8 SVG donut charts"
      - "D3 per /best-practices-d3: React renders SVG declaratively, d3.pie() and d3.arc() compute paths in useMemo"
      - "SVG uses viewBox, not fixed pixels. No d3.select() on DOM"
      - "Color: EMBRY.fw[framework] per ring. Colorblind-safe d3-scale-chromatic"
      - "Keep existing useRegisterAction call"
      - "data-qid + data-qs-action + title on all interactive elements per /best-practices-react"
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit"
      - "test-lab/run.sh verify-task 3 packages/ux-lab/src/components/sparta/dashboard/ --domain typescript"
    definition_of_done:
      command: "test $(wc -l < packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx) -gt 100"
      assertion: "exit_code == 0"
    gate: "PostureDashboard > 100 lines with hero row"

  - id: "4"
    title: "Implement PostureDashboard — main row (family bars + gap analysis)"
    lane: "1"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["3"]
    skills:
      - "best-practices-react"
      - "best-practices-d3"
    allowlist:
      - "packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx"
    design_board: "Task 2 provides approved family-bars.png and gap-analysis.png mockups"
    png_evidence: "Capture CDP screenshot of main row for /review-design comparison"
    implementation:
      - "ControlFamilyBars: horizontal stacked bars per NIST family (pass=green, partial=amber, fail=red)"
      - "D3: d3.scaleLinear for bar widths, React renders div bars"
      - "Clickable bars: onClick sets selectedFamily state"
      - "GapAnalysis: three stat cards (Missing QRAs, Missing Rels, Missing URLs) with glowDot + count"
      - "Clickable gap cards: navigate to filtered tab"
      - "data-qid + data-qs-action + title on all elements"
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit"
      - "test-lab/run.sh verify-task 4 packages/ux-lab/src/components/sparta/dashboard/ --domain typescript"
    definition_of_done:
      command: "grep -q 'ControlFamilyBars' packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx && grep -q 'GapAnalysis' packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx"
      assertion: "exit_code == 0"
    gate: "Family bars and gap analysis render with real data matching mockup"

  - id: "5"
    title: "Implement PostureDashboard — detail row (drift + risks)"
    lane: "1"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["3"]
    skills:
      - "best-practices-react"
    allowlist:
      - "packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx"
    design_board: "Task 2 provides approved drift-alerts.png and top-risks.png mockups"
    png_evidence: "Capture CDP screenshot of detail row for /review-design comparison"
    implementation:
      - "DriftAlerts: controls with NRS < 0.4 or weaknesses > 0, sorted by NRS ascending"
      - "TopRisks: table (control_id, name, framework, NRS, weaknesses), top 10, clickable rows"
      - "Use magneticRow/magneticRowSelected from TableStyles"
      - "data-qid + data-qs-action + title on all elements"
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit"
      - "test-lab/run.sh verify-task 5 packages/ux-lab/src/components/sparta/dashboard/ --domain typescript"
    definition_of_done:
      command: "grep -q 'DriftAlerts' packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx && grep -q 'TopRisks' packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx"
      assertion: "exit_code == 0"
    gate: "Drift alerts and risk table render matching mockup"

  # ── Wave 2: QuerySpec + interactions ─────────────────────────────────────

  - id: "6"
    title: "QuerySpec instrumentation + verify-data-qid gate"
    lane: "2"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["4", "5"]
    skills:
      - "best-practices-react"
    allowlist:
      - "packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx"
    design_board: "N/A — instrumentation task, not visual"
    png_evidence: "N/A"
    implementation:
      - "Ensure every interactive element has: data-qid, data-qs-action, title, useRegisterAction"
      - "Register actions: SELECT_FAMILY, NAVIGATE_GAP, SELECT_RISK_CONTROL, SELECT_DRIFT_CONTROL, SELECT_FRAMEWORK_RING"
      - "Run verify-data-qid.py to confirm 100% coverage"
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit"
      - "cd packages/ux-lab && python3 scripts/verify-data-qid.py src/components/sparta/dashboard/PostureDashboard.tsx"
    definition_of_done:
      command: "grep -c 'data-qid' packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx | grep -qv '^0$'"
      assertion: "exit_code == 0"
    gate: "PostureDashboard has data-qid attributes"

  - id: "7"
    title: "Add family flyout — drill into controls for selected family"
    lane: "2"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["6"]
    skills:
      - "best-practices-react"
    allowlist:
      - "packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx"
    implementation:
      - "Slide-over panel (same pattern as ControlsView detail flyout)"
      - "Shows: family name, total controls, pass/partial/fail breakdown"
      - "Control table: control_id, name, NRS, QRA count, rel count"
      - "Click control calls onNavigateToControl(id)"
      - "Close button + Escape key"
      - "data-qid + data-qs-action + title on all elements"
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit"
      - "cd packages/ux-lab && python3 scripts/verify-data-qid.py src/components/sparta/dashboard/PostureDashboard.tsx"
    definition_of_done:
      command: "grep -q 'selectedFamily' packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx"
      assertion: "exit_code == 0"
    gate: "Family flyout renders control list"

  # ── Wave 3: Visual verification ──────────────────────────────────────────

  - id: "8"
    title: "Visual QA via /test-interactions"
    lane: "3"
    runner: "local"
    backend: ""
    mode: ""
    depends_on: ["7"]
    command: |
      cd packages/ux-lab &&
      npx tsc --noEmit &&
      curl -s http://localhost:3001/api/health | python3 -c "import json,sys; d=json.load(sys.stdin); assert d.get('memory_daemon')=='connected'" &&
      python3 scripts/verify-data-qid.py src/components/sparta/dashboard/PostureDashboard.tsx
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit"
    definition_of_done:
      command: "grep -c 'data-qid' packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx | grep -qv '^0$'"
      assertion: "exit_code == 0"
    gate: "CDP screenshot shows all dashboard panes with real data"
    visual: true

  - id: "9"
    title: "VLM review — compare implementation to approved design"
    lane: "3"
    runner: "code-runner"
    backend: "gemini"
    mode: "one_shot"
    depends_on: ["8"]
    skills:
      - "mockup-lab"
    allowlist:
      - "packages/ux-lab/captures/posture-dashboard-design/"
    implementation:
      - "Capture CDP screenshot of PostureDashboard in running browser"
      - "Use /mockup-lab review to compare against approved pane PNGs from Task 2"
      - "Per-pane VLM scoring: hero-row, family-bars, gap-analysis, drift-alerts, top-risks"
      - "Each pane match score >= 80 → PASS"
    tests:
      - "echo 'VLM review — visual task'"
    definition_of_done:
      command: "echo PASS"
      assertion: "exit_code == 0"
    gate: "Gemini VLM confirms per-pane visual match >= 80%"
    visual: true

test_manifest:
  - view: PostureDashboard
    collection: sparta_controls
    min_rows: 100
    interactions:
      - click_family_bar
      - click_gap_badge
      - click_risk_row
      - click_framework_ring
      - close_family_flyout
    visual: "Dashboard shows posture score with delta, 8 framework donut rings, 15 NIST family stacked bars, gap analysis with 3 count badges, drift alerts list, top 10 risks table. All with real data from 11.6K controls."
