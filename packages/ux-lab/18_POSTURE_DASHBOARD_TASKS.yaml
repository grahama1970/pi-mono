  # ── Wave 3: CDP live DOM test manifest + visual verification ───────────────

  - id: "10"
    title: "Generate CDP live DOM interaction manifest for PostureDashboard"
    lane: "3"
    runner: "local"
    backend: ""
    mode: ""
    depends_on: ["8", "9"]
    command: |
      cd packages/ux-lab &&
      echo "=== Vite compile check ===" &&
      curl -sf http://localhost:3002/src/components/sparta/dashboard/PostureDashboard.tsx -o /dev/null &&
