    lane: "1"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["2"]
    skills:
      - "best-practices-react"
      - "best-practices-plan"
    allowlist:
      - "packages/ux-lab/src/hooks/usePostureData.ts"
    read_context:
      - "packages/ux-lab/server/index.ts"
    implementation:
      - "Refactor usePostureData.ts to fetch from dedicated endpoints instead of generic /api/memory/list:"
      - "  /api/posture/frameworks → frameworkCoverage, overallScore"
      - "  /api/posture/families/NIST → controlsByFamily"
      - "  /api/posture/gaps → gaps"
      - "  /api/posture/risks → topRisks"
      - "  /api/posture/alerts → driftAlerts (new export)"
      - "Keep Promise.all parallel fetch (no waterfalls)"
      - "Remove client-side aggregation (server does it now)"
      - "Export types: PostureData, FrameworkScore, FamilyBreakdown, GapAnalysis, RiskControl, DriftAlert"
    tests:
      - "cd packages/ux-lab && npx vite build --mode development 2>&1 | tail -5"
      - "curl -sf http://localhost:3002/src/hooks/usePostureData.ts -o /dev/null -w '%{http_code}' | grep -q 200"
    definition_of_done:
      command: "cd packages/ux-lab && curl -sf http://localhost:3002/src/hooks/usePostureData.ts -o /dev/null -w '%{http_code}' | grep -q 200"
      assertion: "exit_code == 0"
    gate: "Hook compiles in Vite dev server and fetches from dedicated endpoints"

  - id: "6"
    title: "Implement PostureDashboard.tsx — full 3ft compliance view from V1 mockup"
    lane: "1"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["5"]
    skills:
      - "best-practices-react"
      - "best-practices-d3"
    allowlist:
      - "packages/ux-lab/src/components/sparta/dashboard/PostureDashboard.tsx"
    read_context:
      - "packages/ux-lab/captures/posture-dashboard-design/variation_1.html"
      - "packages/ux-lab/src/hooks/usePostureData.ts"
      - "packages/ux-lab/src/components/sparta/common/EmbryStyle.ts"
    design_board: "APPROVED: packages/ux-lab/captures/posture-dashboard-design/variation_1.html + variation_1.png (V1 approved 2026-04-03)"
    png_evidence: "Capture headless Chrome screenshot → captures/posture-dashboard-design/implementation-dashboard.png for /review-design comparison"
    implementation:
      - "Replace 7-line stub with full implementation matching approved V1 mockup"
      - "Layout: 3-row grid per mockup"
      - "  Row 1 (hero): Large posture score (glow, delta badge) + 8 framework SVG donut rings"
      - "  Row 2 (main): NIST 800-53 family stacked bars (15 families) + Gap Analysis card (5 stat rows)"
      - "  Row 3 (detail): Drift Alerts list (glow-dot severity) + Top 10 Risk Controls table"
      - "D3 per /best-practices-d3: React renders SVG declaratively, d3.pie()/d3.arc() compute paths in useMemo"
      - "Styling: ALL via EmbryStyle tokens — EMBRY.bgCard for cards, EMBRY.bg for background, label/heading/body for text"
      - "  NEVER hardcode hex values — import { EMBRY, card, label, heading, glowDot, fwBadge } from common/EmbryStyle"
      - "  NVIS MIL-STD-3009: green=#00ff88 pass, red=#ff4444 fail, amber=#ffaa00 partial (all via EMBRY.green/red/amber)"
      - "  COTS MIL-STD-1472H: title on every interactive element, ≥4.5:1 contrast, focus-visible outlines, no color-only signaling"
      - "  Colorblind-safe: donut rings use EMBRY.fw[framework] which differs by hue AND luminance"
      - "ALL interactive elements get: data-qid, data-qs-action, title"
      - "  Donuts: data-qid='posture:donut:{framework}' data-qs-action='POSTURE_SELECT_FRAMEWORK_{FW}'"
      - "  Family bars: data-qid='posture:family:{family}' data-qs-action='POSTURE_SELECT_FAMILY_{FAM}'"
      - "  Gap items: data-qid='posture:gap:{type}' data-qs-action='POSTURE_VIEW_GAP_{TYPE}'"
      - "  Alert rows: data-qid='posture:alert:{control_id}' data-qs-action='POSTURE_VIEW_ALERT_{ID}'"
      - "  Risk rows: data-qid='posture:risk:{control_id}' data-qs-action='POSTURE_VIEW_RISK_{ID}'"
      - "useRegisterAction at top of component for each action class"
      - "No early returns that hide chrome — empty state renders inside content area"
      - "Clickable bars: onClick sets selectedFamily state → family flyout panel"
      - "Clickable risk rows: onClick navigates to control detail"
    tests:
      - "cd packages/ux-lab && curl -sf http://localhost:3002/src/components/sparta/dashboard/PostureDashboard.tsx -o /dev/null -w '%{http_code}' | grep -q 200"
      - "cd packages/ux-lab && python3 scripts/verify-data-qid.py src/components/sparta/dashboard/PostureDashboard.tsx"
    definition_of_done:
      command: "cd packages/ux-lab && python3 scripts/verify-data-qid.py src/components/sparta/dashboard/PostureDashboard.tsx"
      assertion: "exit_code == 0"
    gate: "PostureDashboard renders all 3 rows with real data, 100% data-qid coverage"

  - id: "7"
    title: "Implement OverviewLanding.tsx — 5ft landing page with 4 live content wells"
    lane: "1"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["2", "5"]
    skills:
      - "best-practices-react"
    allowlist:
      - "packages/ux-lab/src/components/sparta/explorer/OverviewLanding.tsx"
    read_context:
      - "packages/ux-lab/src/components/sparta/explorer/OverviewView.tsx"
      - "packages/ux-lab/src/hooks/usePostureData.ts"
      - "packages/ux-lab/src/components/sparta/common/EmbryStyle.ts"
    design_board: "APPROVED: 5ft landing follows same EMBRY dark theme as PostureDashboard. 4 content wells in 2x2 grid. No separate mockup — derived from V1 posture dashboard design language."
    png_evidence: "Capture headless Chrome screenshot → captures/posture-dashboard-design/implementation-overview.png for /review-design comparison"
    implementation:
      - "Create OverviewLanding.tsx — replaces or enhances OverviewView as the 5ft landing"
      - "4 content wells in 2x2 grid:"
      - "  Data Quality: big number (QRA coverage %), sparkline trend, 'N controls assessed'"
      - "  Threat Matrix: big number (technique coverage %), top 3 uncovered techniques"
      - "  Posture: big number (overall score %), framework mini-bars, delta badge"
      - "  Proof Graph: big number (relationship density), avg NRS, strong/weak edge counts"
      - "Each well is a clickable card that navigates to its detail view"
      - "Fetch from single GET /api/posture/overview (no waterfalls)"
      - "ALL wells: data-qid='overview:well:{name}' data-qs-action='OVERVIEW_NAVIGATE_{NAME}' title='View {name} details'"
      - "useRegisterAction for each well navigation"
    tests:
      - "cd packages/ux-lab && curl -sf http://localhost:3002/src/components/sparta/explorer/OverviewLanding.tsx -o /dev/null -w '%{http_code}' | grep -q 200"
      - "cd packages/ux-lab && python3 scripts/verify-data-qid.py src/components/sparta/explorer/OverviewLanding.tsx"
    definition_of_done:
      command: "cd packages/ux-lab && python3 scripts/verify-data-qid.py src/components/sparta/explorer/OverviewLanding.tsx"
      assertion: "exit_code == 0"
    gate: "OverviewLanding renders 4 wells with real data, 100% data-qid coverage"

  # ── Wave 2: Nav integration + QuerySpec ────────────────────────────────────

