version: 1
kind: orchestrate-plan
repo_root: "/home/graham/workspace/experiments/pi-mono"

metadata:
  title: "SPARTA Threat Matrix: Traceability + Delta Reports + Critical Path"
  goal: "Wire F-36 typed datalake chunks into threat matrix for evidence lineage, discrepancy detection, delta reports, and critical path visualization"
  plan_type: hybrid
  created: "2026-03-31"
  primary_persona:
    name: "Brandon Chen"
    role: "Compliance Analyst"
    source: ".pi/agents/brandon-chen/AGENTS.md"

execution:
  max_concurrency: 3

capability_overlap:
  - "/memory recall: no prior traceability or discrepancy solution"
  - "skills: /create-evidence-case (CALL), /scillm (CALL), /memory (CALL), /prompt-lab (CALL)"
  - "/learn-datalake (EXTEND — post-hook for delta)"
  - "LemmaGraph.tsx 792 lines (EXTEND — critical path filter)"
  - "ThreatMatrix.tsx Detail flyout (EXTEND — traceability + discrepancy)"
  - "CREATE: sparta/tools/discrepancy_analysis.py — no skill cross-refs requirement vs table chunks"
  - "CREATE: sparta/tools/compute_threat_delta.py — no skill compares verdicts across runs"

questions_blockers: []

lanes:
  - id: "0"
    label: "Wave 0: Backend endpoints"
  - id: "1"
    label: "Wave 1: Traceability + Evidence lineage"
  - id: "2"
    label: "Wave 2: Cleanup + Critical Path"
  - id: "3"
    label: "Wave 3: Discrepancy + Delta"

tasks:
  - id: "1"
    title: "Add /api/memory/traceability endpoint"
    lane: "0"
    runner: "code-runner"
    backend: "sonnet"
    mode: "iterative"
    depends_on: []
    implementation:
      - "Add POST /api/memory/traceability to server/index.ts"
      - "Input: { control_id: string }"
      - "Use proxyPost to daemon /query: traverse chunk_control_edges where _to == sparta_controls/ctrl__{id}"
      - "Fetch source datalake_chunk documents via _from"
      - "Group by asset_type (Requirement, Table, Figure, Text, Equation)"
      - "Sort within group by edge confidence descending"
      - "Return: { control_id, groups: {...}, total_chunks: N }"
      - "AQL in memory project only — use daemon /query endpoint"
    tests:
      - "curl -sf http://localhost:3001/api/memory/traceability -H 'Content-Type: application/json' -d '{\"control_id\":\"REC-0001\"}' | python3 -c \"import json,sys; d=json.load(sys.stdin); assert d.get('total_chunks',0)>0\""
      - "curl -sf http://localhost:3001/api/memory/traceability -H 'Content-Type: application/json' -d '{\"control_id\":\"NONEXISTENT\"}' | python3 -c \"import json,sys; d=json.load(sys.stdin); assert d.get('total_chunks',0)==0\""
    definition_of_done:
      command: "curl -s http://localhost:3001/api/memory/traceability -H 'Content-Type: application/json' -d '{\"control_id\":\"IA-0002\"}' | python3 -c \"import json,sys; d=json.load(sys.stdin); assert len(d.get('groups',{})) > 0\""
      assertion: "Returns grouped chunks with at least one asset_type group"

  - id: "1b"
    title: "Add /api/evidence-case/trace endpoint"
    lane: "0"
    runner: "code-runner"
    backend: "sonnet"
    mode: "iterative"
    depends_on: []
    implementation:
      - "Add POST /api/evidence-case/trace to server/index.ts"
      - "Input: { control_id: string }"
      - "Query daemon /recall for lessons with sensai-cascade-label tag matching control_id"
      - "Parse solution JSON for gate_trace, verdict, grade, control_ids"
      - "Return: { control_id, cases: [{ verdict, grade, question, gates: [...] }] }"
    tests:
      - "curl -sf http://localhost:3001/api/evidence-case/trace -H 'Content-Type: application/json' -d '{\"control_id\":\"DE-0007\"}' | python3 -c \"import json,sys; d=json.load(sys.stdin); assert 'cases' in d\""
    definition_of_done:
      command: "curl -s http://localhost:3001/api/evidence-case/trace -H 'Content-Type: application/json' -d '{\"control_id\":\"IA-0001\"}' | python3 -c \"import json,sys; d=json.load(sys.stdin); print(f'Cases: {len(d.get(\\\"cases\\\",[]))}')\""
      assertion: "Returns evidence case trace with gates"

  - id: "1c"
    title: "Add /api/critical-path endpoint"
    lane: "0"
    runner: "code-runner"
    backend: "sonnet"
    mode: "iterative"
    depends_on: []
    implementation:
      - "Add POST /api/critical-path to server/index.ts"
      - "Input: { control_id?: string }"
      - "Fetch sparta_relationships via daemon, join with evidence verdicts"
      - "Filter to edges where at least one endpoint has verdict != satisfied"
      - "Build subgraph of connected failing nodes, rank by severity"
      - "Return top 3 chains: { chains: [{ nodes: [...], edges: [...], severity: N }] }"
    tests:
      - "curl -sf http://localhost:3001/api/critical-path -H 'Content-Type: application/json' -d '{}' | python3 -c \"import json,sys; d=json.load(sys.stdin); assert 'chains' in d\""
    definition_of_done:
      command: "curl -s http://localhost:3001/api/critical-path -H 'Content-Type: application/json' -d '{}' | python3 -c \"import json,sys; d=json.load(sys.stdin); print(f'Chains: {len(d.get(\\\"chains\\\",[]))}')\""
      assertion: "Returns at least 1 critical path chain"

  - id: "2"
    title: "Render traceability links in ThreatMatrix Detail flyout"
    lane: "1"
    runner: "code-runner"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    implementation:
      - "Update ThreatMatrix.tsx Detail component"
      - "Call /api/memory/traceability when selectedDetail loads"
      - "Add 'Source Evidence' section grouped by asset_type"
      - "Each chunk: asset_type badge, doc_id, page, text excerpt (200 chars)"
      - "Collapsible per group"
    tests:
      - "npx tsc --noEmit"
      - "grep -q 'traceability' packages/ux-lab/src/components/sparta/shared/ThreatMatrix.tsx"
    definition_of_done:
      command: "npx tsc --noEmit && google-chrome --headless --disable-gpu --screenshot=/tmp/test-trace.png --window-size=1920,1080 --virtual-time-budget=10000 'http://localhost:3002/#sparta-explorer'"
      assertion: "TypeScript compiles. Screenshot captured."

  - id: "3"
    title: "Add Why button with GateChain + source chunks in flyout"
    lane: "1"
    runner: "code-runner"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1b", "2"]
    implementation:
      - "Add Show Evidence button next to grade badge in ThreatMatrix Grid"
      - "On click: call /api/evidence-case/trace, open Detail flyout with GateChain"
      - "Import GateChain from ../query/GateChain"
    tests:
      - "npx tsc --noEmit"
      - "grep -q 'GateChain' packages/ux-lab/src/components/sparta/shared/ThreatMatrix.tsx"
      - "grep -q 'evidence-case/trace' packages/ux-lab/src/components/sparta/shared/ThreatMatrix.tsx"
    definition_of_done:
      command: "npx tsc --noEmit"
      assertion: "TypeScript compiles. GateChain imported and wired."

  - id: "4"
    title: "Hide developer metrics from RecallCard default view"
    lane: "2"
    runner: "code-runner"
    backend: "sonnet"
    mode: "iterative"
    depends_on: []
    implementation:
      - "Update RecallCard.tsx"
      - "Remove confidence % from collapsed summary"
      - "Move score bars into <details> element"
      - "Default: source badge + item label only"
    tests:
      - "npx tsc --noEmit"
      - "grep -q 'details' packages/ux-lab/src/components/sparta/query/RecallCard.tsx"
    definition_of_done:
      command: "npx tsc --noEmit"
      assertion: "Score bars inside details element."

  - id: "5"
    title: "Critical path filter mode in LemmaGraph"
    lane: "2"
    runner: "code-runner"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1c"]
    implementation:
      - "EXTEND existing LemmaGraph.tsx — do NOT rewrite"
      - "Add prop: mode?: 'full' | 'critical-path'"
      - "In critical-path mode: red/amber node colors by verdict, thick red edges"
      - "Update ChatTab.tsx: detect critical path intent, call /api/critical-path"
    tests:
      - "npx tsc --noEmit"
      - "grep -q 'critical-path' packages/ux-lab/src/components/sparta/explorer/ChatTab.tsx"
      - "grep -q 'critical' packages/ux-lab/src/components/sparta/lemma-graph/LemmaGraph.tsx"
    definition_of_done:
      command: "npx tsc --noEmit"
      assertion: "LemmaGraph accepts mode prop. ChatTab detects critical path intent."

  - id: "6"
    title: "Discrepancy analysis script + prompt"
    lane: "3"
    runner: "code-runner"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    implementation:
      - "Create sparta/tools/discrepancy_analysis.py"
      - "Design prompt via /prompt-lab (NOT hand-written)"
      - "Query daemon: find controls with both Requirement AND Table chunks via chunk_control_edges"
      - "For top 50 controls: call /scillm to compare requirement vs table"
      - "Store findings via /memory learn with tags: [discrepancy, control:{id}]"
      - "Add Discrepancies section to ThreatMatrix Detail flyout"
      - "Use httpx, loguru, typer"
    tests:
      - "cd /home/graham/workspace/experiments/sparta && uv run python tools/discrepancy_analysis.py --help"
      - "cd /home/graham/workspace/experiments/sparta && uv run python tools/discrepancy_analysis.py --dry-run --limit 2"
    definition_of_done:
      command: "cd /home/graham/workspace/experiments/sparta && uv run python tools/discrepancy_analysis.py --dry-run --limit 5"
      assertion: "Dry run prints 5 controls with both types. No errors."

  - id: "7"
    title: "Threat delta computation script + learn-datalake post-hook"
    lane: "3"
    runner: "code-runner"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1b"]
    implementation:
      - "Create sparta/tools/compute_threat_delta.py"
      - "Input: --control-ids OR --since (find recently changed)"
      - "For each: fetch latest evidence verdict, compare with re-run"
      - "Store deltas via /memory learn with tags: [threat-delta, control:{id}]"
      - "Add delta notification cards to ChatTab.tsx on mount"
      - "Use httpx, loguru, typer"
    tests:
      - "cd /home/graham/workspace/experiments/sparta && uv run python tools/compute_threat_delta.py --help"
      - "cd /home/graham/workspace/experiments/sparta && uv run python tools/compute_threat_delta.py --dry-run --control-ids IA-0001 --limit 1"
    definition_of_done:
      command: "cd /home/graham/workspace/experiments/sparta && uv run python tools/compute_threat_delta.py --dry-run --control-ids IA-0001,IA-0002 --limit 2"
      assertion: "Dry run shows 2 controls with verdict lookup. No errors."
