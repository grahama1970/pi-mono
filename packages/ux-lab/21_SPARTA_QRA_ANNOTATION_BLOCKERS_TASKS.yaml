      - "Collapsed trace summary shows verdict, anchors, unsupported IDs, gate state, and recommended action."
      - "Advisory branch uses dashed styling and explicit non-authoritative labeling."
      - "Evidence-flow nodes are keyboard reachable and click/focus opens the matching trace row."
      - "Clean pass cases may show the graph collapsed or compact; failed/review cases show failure location."
      - "**Gate**: source-grounded evidence and advisory persona repair flow are visually and semantically distinct."
