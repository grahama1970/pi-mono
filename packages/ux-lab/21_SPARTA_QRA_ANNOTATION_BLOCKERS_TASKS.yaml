      a diagnostics/export payload that includes requested key, source, filters,
      endpoint statuses, timestamps, loaded row count, corpus total/count state,
      and last detail/count error.
    implementation:
      - "Expose count error/stale metadata from useQRAStatusCounts."
      - "Add or extend server diagnostics endpoint if existing route data is insufficient."
