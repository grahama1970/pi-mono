version: 1
kind: orchestrate-plan
repo_root: /home/graham/workspace/experiments/pi-mono

metadata:
  title: "SPARTA QRA Annotation: blocker fixes before React page update"
  created: "2026-05-03"
  plan_type: hybrid
  goal: >
    Make the SPARTA QRA page safe and usable as a high-throughput annotation
    surface by fixing keyboard accessibility, recovery diagnostics, source-vs-
    advisory evidence separation, stale corpus counts, and blocked approval
    affordances before broader redesign implementation.
  primary_surface: "http://localhost:3002/#sparta-explorer/qras"
  governance_report: "/mnt/storage12tb/skills/governance/reports/e0813c5823270a6e/20260503T143711Z/report.json"
  primary_persona:
    name: Brandon Bailey
    role: Aerospace cybersecurity and compliance assessment reviewer
    concern: >
      Needs to evaluate LLM-generated QRAs quickly without confusing source-
      grounded evidence, advisory persona repair reasoning, pipeline failures,
      and human approval state.

questions_blockers:
  - none

compliance_governance:
  principle: "Annotation workbench, not truth engine"
  verdict_authority: >
    Source-grounded evidence-case gates, cited controls, deterministic fetch
    status, and explicit human review decisions are authoritative. Persona
    recommendations and gap-review prose are advisory repair guidance only.
  default_review_state: "NOT_HUMAN_APPROVED until a reviewer explicitly approves after evidence gates allow it"
  prohibited_claims:
    - "Do not show failed or unavailable corpus counts as true zeroes."
    - "Do not enable Approve when the QRA body is missing, evidence is failed, or gates are blocked."
    - "Do not visually merge persona gap-review recommendations with source-grounded evidence."
    - "Do not advance to the next QRA after a review write fails."
  reviewer_checkpoints:
    - "Before approval is persisted."
    - "Before an adversarial fixture is retained as training data."
    - "Before a corrected QRA is treated as a new candidate for blessing."
    - "Before evidence-case failure is escalated as a corpus/data issue."

capability_overlap:
  - >
    /memory recall found the existing /create-evidence-case CAE architecture:
    question/control ID -> /extract-entities -> graph traversal -> crosswalk
    chains -> gates -> optional Lean4 and GSN/SACM outputs. The QRA page must
    CALL that evidence model and must not reimplement evidence authority in UI.
  - >
    /memory recall found qra-review as the human-in-the-loop review capability.
    The page should EXTEND the QRA review workflow, not create a parallel approval
    vocabulary.
  - >
    EXTEND packages/ux-lab/src/components/sparta/explorer/QRAsView.tsx for
    queue state, deep-link recovery, keyboard behavior, evidence filters, action
    gating, and review-write feedback.
  - >
    EXTEND packages/ux-lab/src/hooks/useSpartaCollections.ts for status-count
    error/staleness metadata and filtered query support if server-side evidence
    filtering is added.
  - >
    EXTEND packages/ux-lab/server/index.ts for explicit QRA diagnostics/export
    and any status-count metadata required to distinguish stale, failed, and true
    zero states.
  - >
    EXTEND packages/ux-lab/src/components/sparta/explorer/EvidenceView.tsx and
    packages/ux-lab/src/components/sparta/shared/EvidenceCaseTrace.tsx for
    source-grounded vs advisory separation, blocked rationale, and the compact
    evidence-flow DAG.
  - >
    CALL /review-design after implementation because the page is an operator
    annotation surface with nontrivial visual hierarchy and action safety risks.
  - >
    CALL /test-interactions and the repository CDP hook for rendered route
    verification before claiming completion.

execution:
  max_concurrency: 1
  scheduling_policy: dependency_only
  wave_barrier: false
  dirty_worktree_notice: >
    Governance observed existing local modifications in QRAsView.tsx and
    useSpartaCollections.ts. Implementers must read current file contents and
    preserve unrelated user changes; do not revert the dirty worktree.
  notes:
    - "Run /review-plan before /orchestrate."
    - "Do not start React implementation until this plan validates."
    - "For any task that is expected to run longer than 5 minutes, set up watchdog monitoring per SPARTA AGENTS.md."

lanes:
  - id: baseline
    label: "Baseline and contracts"
  - id: code
    label: "Bounded implementation"
  - id: qa
    label: "Validation and design review"

test_manifest:
  surface: "SPARTA QRA Annotation"
  url: "http://localhost:3002/#sparta-explorer/qras?qra=000a5d68cbd446e5"
  required_states:
    - id: blocked-deeplink
      visual: "Center pane shows recovery trace, not passive empty evidence UI."
      interactions:
        - "Retry hydrate"
        - "Clear filters"
        - "Try all sources"
        - "Copy QRA key"
        - "Open diagnostics"
        - "Escalate missing/deep-link failure"
    - id: loaded-evidence-failed
      visual: "QRA body is visible; Approve is disabled with an explicit gate rationale; Reject/Correct/Escalate remain available as appropriate."
      interactions:
        - "Open failed gate"
        - "Correct & rerun"
        - "Keyboard shortcut does not approve blocked QRA"
    - id: stale-counts
      visual: "Corpus count failures or queue/count conflicts show stale/ERR/unknown states, never true zeroes."
      interactions:
        - "Retry counts"
        - "Open diagnostics/export"
    - id: evidence-advisory-separation
      visual: "Source-grounded trace and dashed advisory persona repair branch are visually and semantically distinct."
      interactions:
        - "Click evidence-flow nodes to open matching trace sections"
    - id: keyboard-focus
      visual: "All actionable buttons, rows, chips, and trace nodes expose a visible focus ring."
      interactions:
        - "Tab through queue, trace, evidence-flow, and footer actions"

