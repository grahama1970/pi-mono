    prompt: >
      Implement safe QRA action semantics. Hide Approve, Reject, Correct & rerun,
      and evidence-case actions when the QRA document is not loaded. When the QRA
      is loaded but evidence is pending/failed/blocked/adversarial, show document
      actions with explicit disabled reasons and promote Correct & rerun,
      Reject, Retain as adversarial fixture, or Escalate as appropriate. Block
      approval in both buttons and keyboard shortcuts until the QRA body is loaded
      and evidence gates allow approval. Persist review decisions through an
      explicit success/failure path and do not auto-advance if persistence fails.
    implementation:
      - "Create a single action eligibility model used by footer buttons and shortcuts."
      - "Render blocked-Approve rationale in the footer and header/action area."
      - "Make review write success/failure visible; no silent catch with auto-advance."
      - "Treat adversarial/ambiguous QRA state as repair/quarantine workflow, not normal approval."
