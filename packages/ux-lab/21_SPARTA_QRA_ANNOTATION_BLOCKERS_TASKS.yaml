    dirty_worktree_policy: isolated_worktree
    max_rounds: 4
    allowlist:
      - packages/ux-lab/src/components/sparta/explorer/QRAsView.tsx
      - packages/ux-lab/src/components/sparta/explorer/EvidenceView.tsx
      - packages/ux-lab/src/components/sparta/shared/EvidenceCaseTrace.tsx
      - packages/ux-lab/src/index.css
      - packages/ux-lab/src/App.css
    read_context:
      - packages/ux-lab/src/components/sparta/explorer/QRAsView.tsx
      - packages/ux-lab/src/components/sparta/explorer/EvidenceView.tsx
      - packages/ux-lab/src/components/sparta/shared/EvidenceCaseTrace.tsx
      - packages/ux-lab/src/index.css
      - packages/ux-lab/src/App.css
    context_boundary: >
      Own focus visibility, ARIA semantics, row/button keyboard behavior, and
      safe shortcut routing. Do not change backend contracts or review-write
      persistence in this task.
    prompt: >
      Implement a QRA-page accessibility foundation. Add global visible
      :focus-visible treatment that is not hidden by dark theme styling. Ensure
      queue rows, status filters, trace rows, evidence-flow nodes, and footer
      actions have keyboard semantics, labels, and stable focus order. Route
      keyboard shortcuts through the same action eligibility checks used by
      buttons, so blocked approval cannot be triggered from the keyboard.
    implementation:
      - "Add consistent visible focus styles for dark UI controls."
      - "Make row and trace interactions keyboard reachable with clear accessible labels."
      - "Centralize shortcut handling behind action eligibility predicates."
      - "**Gate**: keyboard focus is visible and blocked approval cannot be triggered by shortcut."
    skills:
      - best-practices-react
      - web-design-guidelines
      - test-interactions
    tests:
      - "npm run build"
      - "Keyboard blind check: Tab reaches queue, trace, evidence-flow, and footer actions in sensible order."
    blind_tests:
      - "Run a Playwright keyboard-only traversal of #sparta-explorer/qras and assert focused elements remain visible."
      - "Attempt approve shortcut on a blocked evidence case and assert no approval write is issued."
    definition_of_done:
      command: "cd /home/graham/workspace/experiments/pi-mono/packages/ux-lab && npm run build"
      assertion: "exit_code == 0"

