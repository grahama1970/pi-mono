version: 1
kind: orchestrate-plan
repo_root: "/home/graham/workspace/experiments/pi-mono"

metadata:
  title: "Shared Chat Convergence — Embry Terminal + SPARTA Explorer"
  goal: "Extract shared chat components so both SPARTA Explorer and Embry Terminal have: entity highlighting, skill invocation, markdown rendering, recall cards, gate chains, threat matrix cards, and feedback thumbs. Eliminate duplication. scratch.md vision alignment."
  plan_type: hybrid
  created: "2026-03-31"
  repo_root: "/home/graham/workspace/experiments/pi-mono"
  primary_persona:
    name: "Brandon Bailey"
    role: "Principal Director of Cyber Assessments"
    source: ".pi/agents/brandon-bailey/AGENTS.md"

execution:
  max_concurrency: 2

capability_overlap:
  - "/memory recall returned: Unified Lab UX convergence tab + chat well (checkpoint from prior session)"
  - "Checked sparta/query/ — RecallCard, GateChain, ThreatMatrixCard, ChatWell already extracted"
  - "Checked embry-terminal/ — highlightEntities, SkillPaletteDropdown, MarkdownRenderer are Embry-only"
  - "ChatFab.tsx wraps ChatWell with cascade pipeline (recall → intent → LLM fallback)"
  - "Decision matrix: CALL ChatWell/RecallCard/GateChain/ThreatMatrixCard (existing). EXTEND with entity highlighting + skills + markdown. CREATE shared-chat/ directory for extracted components."

questions_blockers: []

lanes:
  - id: "0"
    label: "Wave 0: Extract shared utilities"
  - id: "1"
    label: "Wave 1: Shared component library"
  - id: "2"
    label: "Wave 2: Wire into Embry Terminal"
  - id: "3"
    label: "Wave 3: Wire into SPARTA Explorer"
  - id: "4"
    label: "Wave 4: Validation + persona review"

tasks:
  # ── Wave 0: Extract shared utilities ──────────────────────────────────

  - id: "1"
    title: "Extract highlightEntities to shared utility"
    lane: "0"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: []
    implementation:
      - "Create packages/ux-lab/src/components/shared-chat/highlightEntities.tsx"
      - "Move ENTITY_PATTERN, ENTITY_STYLES, classifyEntity, highlightEntities from EmbryTerminalView.tsx"
      - "Export as named exports"
      - "Add theme param (dark/nvis) so both SPARTA and Embry can use their color systems"
      - "Update EmbryTerminalView.tsx to import from shared-chat/"
      - "Verify no broken imports"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Zero TypeScript errors"

  - id: "2"
    title: "Extract SkillPaletteDropdown to shared component"
    lane: "0"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: []
    implementation:
      - "Create packages/ux-lab/src/components/shared-chat/SkillPalette.tsx"
      - "Move SkillPaletteDropdown from EmbryTerminalView.tsx"
      - "Include Fuse.js dedup logic, keyboard nav (onKeyNav pattern), scroll-into-view"
      - "Props: { filter, skills, onSelect, onClose, onKeyNav }"
      - "Update EmbryTerminalView.tsx to import from shared-chat/"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Zero TypeScript errors"

  - id: "3"
    title: "Extract MarkdownRenderer to shared component"
    lane: "0"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    implementation:
      - "Create packages/ux-lab/src/components/shared-chat/MarkdownRenderer.tsx"
      - "Move ReactMarkdown + remarkGfm + hljs config from EmbryTerminalView.tsx"
      - "Include custom components: p (entity highlighting), strong, li, code (syntax highlighting), table, th, td"
      - "Import highlightEntities from shared-chat/"
      - "DOMPurify sanitization on all dangerouslySetInnerHTML"
      - "Props: { content: string, onEntityClick?: (entity: string, type: string) => void }"
      - "Update EmbryTerminalView.tsx to use <MarkdownRenderer>"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Zero TypeScript errors"

  # ── Wave 1: Unify shared component library ────────────────────────────

  - id: "4"
    title: "Unify RecallCard — single component, both interfaces"
    lane: "1"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    implementation:
      - "Read sparta/query/RecallCard.tsx (98 lines) and embry-terminal RecallCard (lines 215-277)"
      - "Merge into packages/ux-lab/src/components/shared-chat/RecallCard.tsx"
      - "Accept both RecallItem[] (SPARTA) and RecallResult (Embry) via union type or adapter"
      - "Confidence normalization: raw ArangoDB score >1 → clamp to 100%"
      - "Score bars: BM25, Graph, Dense, Freshness"
      - "Collapsible with item expansion"
      - "onItemClick callback for entity navigation"
      - "Delete RecallCard from EmbryTerminalView.tsx"
      - "Update sparta/query/ChatWell.tsx to import from shared-chat/"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Zero TypeScript errors, RecallCard renders in both contexts"

  - id: "5"
    title: "Unify message types — shared ChatMessage interface"
    lane: "1"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    implementation:
      - "Create packages/ux-lab/src/components/shared-chat/types.ts"
      - "Merge ChatMessage (ChatWell) and Message (EmbryTerminal) into unified type"
      - "Fields: id, role, content, timestamp, skillUsed?, recall?, reasoningSteps?, chainTitle?, artifact?, verdict?, gates?, matrixSummary?, entities?, feedback?, cascadeLayer?"
      - "Export RecallItem, RecallResult, EntityRef, EvidenceGate, CascadeLayer, ThreatMatrixSummary, Skill, Agent types"
      - "Update both ChatWell.tsx and EmbryTerminalView.tsx to import from shared-chat/types"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Zero TypeScript errors"

  - id: "6"
    title: "Create shared-chat index barrel export"
    lane: "1"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1", "2", "3", "4", "5"]
    implementation:
      - "Create packages/ux-lab/src/components/shared-chat/index.ts"
      - "Re-export all: highlightEntities, SkillPalette, MarkdownRenderer, RecallCard, types"
      - "Re-export GateChain and ThreatMatrixCard from sparta/query/ (no move needed — just re-export)"
      - "Verify all downstream imports resolve"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "All shared-chat exports accessible via barrel"

  # ── Wave 2: Wire into Embry Terminal ──────────────────────────────────

  - id: "7"
    title: "Embry Terminal — import shared components, delete duplicates"
    lane: "2"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["6"]
    implementation:
      - "Replace local RecallCard, ScoreBar, highlightEntities, SkillPaletteDropdown with imports from shared-chat/"
      - "Replace inline ReactMarkdown config with <MarkdownRenderer>"
      - "Import GateChain for evidence case display (render when msg.verdict exists)"
      - "Import ThreatMatrixCard for threat matrix display (render when msg.matrixSummary exists)"
      - "Add thumbs feedback buttons to agent messages (up/down → POST /api/memory/learn)"
      - "Wire onEntityClick: clicking AC-17 → setInput('/memory recall AC-17') + send"
      - "Verify EmbryTerminalView.tsx line count decreased (removed duplicate code)"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Zero TypeScript errors, EmbryTerminalView.tsx uses only shared components"

  - id: "8"
    title: "Embry Terminal — add ThreatMatrix rendering in chat"
    lane: "2"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["7"]
    implementation:
      - "When agent response from /assess or SPARTA-related query returns matrix data, render ThreatMatrixCard inline"
      - "Detect matrix-triggering queries: 'threat matrix', 'coverage', 'posture', 'show matrix'"
      - "Fetch matrix summary from /api/memory/recall with collections=['sparta_controls'] and aggregate counts"
      - "ThreatMatrixCard onNavigate → switch to SPARTA Explorer project in sidebar"
      - "Add to MessageItem rendering: if msg.matrixSummary → <ThreatMatrixCard>"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "ThreatMatrixCard renders in Embry Terminal when matrix data present"

  # ── Wave 3: Wire into SPARTA Explorer ─────────────────────────────────

  - id: "9"
    title: "SPARTA ChatWell — add entity highlighting to messages"
    lane: "3"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["6"]
    implementation:
      - "Import highlightEntities from shared-chat/ into ChatWell.tsx"
      - "Replace plain text message rendering with highlightEntities() on system message content"
      - "Import MarkdownRenderer for system messages that contain markdown (code blocks, tables, lists)"
      - "Existing entity pills stay as supplemental data (EntityRef[]) — highlightEntities adds inline coloring"
      - "Verify entity highlighting appears on SPARTA chat responses"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "SPARTA chat shows colored NIST/CWE/ATT&CK entities in messages"

  - id: "10"
    title: "SPARTA ChatWell — add /skill-name invocation + palette"
    lane: "3"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["6", "9"]
    implementation:
      - "Import SkillPalette from shared-chat/ into ChatWell.tsx"
      - "Add skill detection to ChatWell input: typing / triggers palette"
      - "Load skills list from /api/skills endpoint (same as Embry Terminal)"
      - "When skill selected, insert /skill-name into input"
      - "On send: detect /skill-name prefix → route to skill backend instead of recall cascade"
      - "Display ToolAction line for skill invocations (Ran /skill-name)"
      - "Add input highlight overlay for entity coloring while typing"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "SPARTA chat can invoke /assess, /dogpile, /create-evidence-case with palette"

  - id: "11"
    title: "SPARTA ChatWell — markdown rendering for agent responses"
    lane: "3"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["9"]
    implementation:
      - "Import MarkdownRenderer from shared-chat/ into ChatWell.tsx"
      - "Replace plain text system message rendering with <MarkdownRenderer content={msg.content} />"
      - "Verify code blocks, tables, lists, bold text all render correctly"
      - "Entity highlighting works within markdown (via MarkdownRenderer's custom p/strong/li components)"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "SPARTA chat renders markdown with syntax highlighting and entity chips"

  - id: "12"
    title: "SPARTA ChatTab — integrate scratch.md vision features"
    lane: "3"
    runner: "subagent-service"
    backend: "opus"
    mode: "iterative"
    depends_on: ["9", "10", "11"]
    implementation:
      - "Read local/docs/scratch.md for the Delta Report and Evidence Lineage patterns"
      - "When entity is clicked in chat → /memory recall on that entity → show results inline"
      - "When evidence case completes → render GateChain with verdict + link to source requirement/table/figure"
      - "Add 'Show Evidence' deep-link on entity chips → navigates to SPARTA Explorer Sources tab with that control selected"
      - "Delta Report card: when a recall finds status changes, render as structured alert (scratch.md pattern)"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Entity clicks trigger recall, evidence cases show GateChain with source links"

  # ── Wave 4: Validation ────────────────────────────────────────────────

  - id: "13"
    title: "Update Brandon Bailey test manifest for shared components"
    lane: "4"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["7", "8"]
    implementation:
      - "Update brandon-bailey-embry-terminal.test.json"
      - "Add test group: entity-interaction — click AC-17 chip → verify recall fires"
      - "Add test group: threat-matrix — type 'show threat matrix' → verify ThreatMatrixCard renders"
      - "Add test group: gate-chain — verify GateChain renders for evidence case messages"
      - "Add test group: shared-components — verify RecallCard, MarkdownRenderer imported (not duplicated)"
      - "Update persona_review criteria to evaluate entity interactivity"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Updated manifest loads via test-runner API"

  - id: "14"
    title: "Run VLM persona review — Brandon Bailey on converged chat"
    lane: "4"
    runner: "local"
    backend: "sonnet"
    mode: "one_shot"
    depends_on: ["13"]
    command: "curl -s -X POST http://localhost:3001/api/test-runner/run -H 'Content-Type: application/json' -d '{\"file\": \"brandon-bailey-embry-terminal.test.json\"}'"
    tests:
      - "ls packages/ux-lab/test-results/*/screenshots/persona_brandon-bailey_*.png | wc -l"
    definition_of_done:
      command: "ls packages/ux-lab/test-results/*/screenshots/persona_brandon-bailey_*.png 2>/dev/null | wc -l"
      assertion: "At least 9 VLM screenshots captured with scores"

  - id: "15"
    title: "Verify SPARTA Explorer chat has parity"
    lane: "4"
    runner: "local"
    backend: "sonnet"
    mode: "one_shot"
    depends_on: ["9", "10", "11", "12"]
    command: "cd packages/ux-lab && npx tsc --noEmit && echo 'SPARTA chat parity verified'"
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "SPARTA Explorer chat has: entity highlighting, /skill palette, markdown rendering, clickable entities"
