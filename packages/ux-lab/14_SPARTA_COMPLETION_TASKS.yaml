version: 1
kind: orchestrate-plan
repo_root: "/home/graham/workspace/experiments/pi-mono"

metadata:
  title: "SPARTA Traceability Completion"
  goal: "Store discrepancy findings, backfill Requirement/Table edges, create threat delta script, visual QA of Detail flyout"
  plan_type: code
  created: "2026-03-31"
  primary_persona:
    name: "Brandon Bailey"
    role: "SPARTA cybersecurity analyst"
    source: ".pi/agents/brandon-bailey/AGENTS.md"

execution:
  max_concurrency: 3

capability_overlap:
  - "/memory recall returned: 2 prior checkpoints for SPARTA traceability (Wave 0 endpoints, Wave 1-2 frontend)"
  - "/learn-datalake SKILL.md documents s12_framework_mapper and backfill_chunk_control_edges.py"
  - "memory/scripts/backfill_chunk_control_edges.py exists — CALL, not CREATE"
  - "/create-evidence-case run.sh create <question> --json — CALL for delta comparison"
  - "/surf skill exists for CDP browser automation — CALL for visual QA"
  - "tools/discrepancy_analysis.py already written and tested (dry-run found 2 discrepancies) — CALL, not CREATE"
  - "scillm model must be 'text' (cascade alias) — learned from failed gemini/gemini-2.5-flash attempt"

questions_blockers: []

lanes:
  - id: "0"
    label: "Wave 0: Store + Backfill (parallel)"
  - id: "1"
    label: "Wave 1: Threat Delta Script"
  - id: "2"
    label: "Wave 2: Visual QA"

tasks:
  - id: "1"
    title: "Store discrepancy findings (production run)"
    lane: "0"
    runner: "local"
    mode: "one_shot"
    depends_on: []
    command: >
      cd /home/graham/workspace/experiments/pi-mono/.pi/skills/create-evidence-case &&
      uv run python tools/discrepancy_analysis.py --limit 50 --delay 1.0
    definition_of_done:
      command: >
        python3 -c "
        import httpx;
        t=httpx.HTTPTransport(uds='/run/user/1000/embry/memory.sock');
        c=httpx.Client(transport=t,base_url='http://localhost',timeout=10);
        r=c.post('/list',json={'collection':'evidence_cases','limit':1,'filters':{'type':'discrepancy'}});
        d=r.json();
        count=len([x for x in (d.get('documents') or []) if x.get('type')=='discrepancy']);
        total=d.get('total',0);
        print(f'discrepancy docs: {count} (total evidence_cases: {total})');
        assert count >= 1, f'Expected >=1 discrepancy docs, got {count}'
        "
      assertion: "At least 1 discrepancy finding stored in evidence_cases collection"

  - id: "2"
    title: "Backfill chunk_control_edges for Requirement + Table chunks"
    lane: "0"
    runner: "local"
    mode: "one_shot"
    depends_on: []
    command: >
      cd /home/graham/workspace/experiments/memory &&
      uv run python scripts/backfill_chunk_control_edges.py --batch-size 2000 --edge-batch-size 2000
    definition_of_done:
      command: >
        python3 -c "
        import httpx;
        t=httpx.HTTPTransport(uds='/run/user/1000/embry/memory.sock');
        c=httpx.Client(transport=t,base_url='http://localhost',timeout=60);
        r=c.post('/query',json={'aql':'FOR e IN chunk_control_edges LIMIT 500 LET ch=DOCUMENT(e._from) FILTER ch!=null AND ch.asset_type==\"Requirement\" COLLECT WITH COUNT INTO cnt RETURN cnt'});
        d=r.json();
        cnt=d.get('documents',[0])[0] or 0;
        print(f'Requirement chunk edges (sample 500): {cnt}');
        assert cnt > 0, f'Expected >0 Requirement chunk edges, got {cnt}'
        "
      assertion: "chunk_control_edges now includes Requirement asset_type chunks"

  - id: "3"
    title: "Create threat delta computation script"
    lane: "1"
    runner: "subagent-service"
    backend: "codex"
    mode: "iterative"
    agent: "general-purpose"
    depends_on: ["1"]
    implementation:
      - "Create .pi/skills/create-evidence-case/tools/compute_threat_delta.py"
      - "CLI: uv run python tools/compute_threat_delta.py [--control-ids ID1,ID2] [--all-recent] [--dry-run]"
      - "Step 1: Query evidence_cases collection for existing verdicts (via httpx to memory daemon Unix socket /run/user/1000/embry/memory.sock, POST /list with collection=evidence_cases)"
      - "Step 2: For each control, run /create-evidence-case via subprocess: .pi/skills/create-evidence-case/run.sh create <question> --json"
      - "Step 3: Compare old verdict vs new verdict. If changed, create delta record."
      - "Step 4: Store deltas in evidence_cases collection via POST /upsert with type='threat-delta', containing: control_id, old_verdict, new_verdict, reason, timestamp"
      - "Step 5: Print delta report summary to stdout"
      - "Use typer for CLI (NOT argparse), loguru for logging (NOT logging module), httpx for HTTP (NOT requests)"
      - "scillm model alias is 'text' (cascade) — NEVER use 'gemini/gemini-2.5-flash'"
      - "Memory daemon socket: /run/user/1000/embry/memory.sock"
      - "Evidence cases have _key as sha256 hash, control_ids list, verdict string, grade string"
      - "The question for re-evaluation: use the original question from the stored evidence case"
    tests:
      - "python3 -c \"import ast; ast.parse(open('.pi/skills/create-evidence-case/tools/compute_threat_delta.py').read()); print('syntax OK')\""
      - "cd .pi/skills/create-evidence-case && uv run python tools/compute_threat_delta.py --dry-run --control-ids DE-0007 2>&1 | grep -q 'old_verdict\\|no previous'"
    definition_of_done:
      command: >
        cd /home/graham/workspace/experiments/pi-mono/.pi/skills/create-evidence-case &&
        uv run python tools/compute_threat_delta.py --dry-run --control-ids DE-0007 2>&1 |
        tail -5
      assertion: "Script runs without error and reports verdict comparison for DE-0007"

  - id: "4"
    title: "Visual QA: headless screenshot of SPARTA Explorer"
    lane: "2"
    runner: "local"
    mode: "one_shot"
    depends_on: []
    command: >
      timeout 20 google-chrome --headless --disable-gpu
      --screenshot=/tmp/sparta-flyout-qa.png --window-size=1920,1080
      --virtual-time-budget=10000 'http://localhost:3002/#sparta-explorer' 2>/dev/null &&
      ls -la /tmp/sparta-flyout-qa.png
    definition_of_done:
      command: "test -f /tmp/sparta-flyout-qa.png && echo 'Screenshot exists'"
      assertion: "Screenshot file exists showing SPARTA Explorer rendered"
