    backend: "sonnet"
    mode: "iterative"
    agent: "general-purpose"
    executor: "Project agent — small component"
    depends_on: ["8"]
    implementation:
      - "Read shared-chat types, EmbryTerminalView sidebar"
      - "Create shared-chat/PresenceBar.tsx"
      - "Avatar circles (max 8, +N): active=green, idle=yellow, agents=robot icon. Hover tooltip."
      - "Props: { entries: PresenceEntry[], compact? }. Export from index.ts."
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit 2>&1 | grep -c 'error' || echo 0"
