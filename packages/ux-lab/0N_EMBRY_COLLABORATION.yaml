version: 1
kind: orchestrate-plan

metadata:
  title: "Embry Terminal: Cohesive Reasoning UX + Real-Time Collaboration (Level 3 GRC)"
  goal: "Fix message rendering order (reasoning→evidence→answer), add nested collapsible skill calls, inline interactive artifacts (D3, React tables), then build WebSocket activity feed, presence indicators, agent suggestion accept/reject, and optional Slack webhook"
  plan_type: hybrid
  created: "2026-04-01"
  primary_persona:
    name: "Brandon Bailey"
    role: "CMMC Lead Assessor"
    source: ".pi/agents/brandon-bailey/AGENTS.md"

repo_root: "/home/graham/workspace/experiments/pi-mono"

execution:
  max_concurrency: 3

capability_overlap:
  - "/memory recall: No prior WebSocket collaboration solutions in pi-mono"
  - "EXISTING: shared-chat/ barrel (7 components) — EXTEND with ActivityFeed + PresenceBar + SuggestionCard + InlineArtifact"
  - "EXISTING: embry-terminal server (pty-server.ts) has ws + Express — EXTEND with /api/activity"
  - "EXISTING: ReasoningChain.tsx — EXTEND with nested children + rendering order fix"
  - "EXISTING: ArtifactPanel in EmbryTerminalView — EXTEND to work with inline artifacts"
  - "CREATE: InlineArtifact with D3 graph + React table renderers (no existing inline artifact)"
  - "CREATE: Slack webhook integration, ActivityFeed, PresenceBar (no existing skills)"

questions_blockers: []

lanes:
  - id: "0"
    label: "Wave 0: Cohesive Reasoning UX (foundational)"
  - id: "1"
    label: "Wave 1: Backend WebSocket + Webhook"
  - id: "2"
    label: "Wave 2: Shared UI Components"
  - id: "3"
    label: "Wave 3: Integration"
  - id: "4"
    label: "Wave 4: Visual Verification + Persona Review"

tasks:
  # ═══════════════════════════════════════════════════════════════════════
  # WAVE 0: Fix Message Rendering Order + Nested Reasoning + Inline Artifacts
  # ═══════════════════════════════════════════════════════════════════════

  - id: "1"
    title: "Fix MessageItem rendering order: reasoning → evidence → answer → cards"
    lane: "0"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    agent: "general-purpose"
    executor: "Project agent — small JSX reorder, no new logic"
    depends_on: []
    implementation:
      - "Read packages/ux-lab/src/components/embry-terminal/EmbryTerminalView.tsx — find MessageItem (~line 129-191)"
      - "CURRENT broken order: ToolAction → MarkdownRenderer → RecallCard → GateChain → ThreatMatrixCard → DeltaReportCard → ReasoningChain"
      - "CORRECT order — reorder JSX inside agent message div:"
      - "  1. ReasoningChain (collapsed by default) — 'here is what I did'"
      - "  2. RecallCard — 'here is the evidence I found'"
      - "  3. Visual separator: 1px dashed rgba(255,255,255,0.08), margin 12px 0"
      - "  4. MarkdownRenderer content — 'here is my answer'"
      - "  5. Inline artifacts (charts, tables, graphs) — part of the answer"
      - "  6. GateChain / ThreatMatrixCard / DeltaReportCard — structured cards"
      - "  7. ToolAction lines move INTO ReasoningChain (not standalone above content)"
      - "Do NOT change user message bubble (right-aligned, works fine)"
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit 2>&1 | grep -c 'error' || echo 0"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit --pretty false 2>&1 | tail -1"
      assertion: "TypeScript compiles, reasoning renders before content"

  - id: "2"
    title: "Add nested children to ReasoningStep type and ReasoningChain component"
    lane: "0"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    agent: "general-purpose"
    executor: "Project agent — 1 type field + ~30 lines recursive render"
    depends_on: []
    implementation:
      - "Read packages/ux-lab/src/components/shared-chat/types.ts for ReasoningStep type"
      - "Read packages/ux-lab/src/components/embry-terminal/ReasoningChain.tsx (full file)"
      - "STEP 1 — Extend ReasoningStep in shared-chat/types.ts: add children?: ReasoningStep[]"
      - "STEP 2 — Update StepContent in ReasoningChain.tsx:"
      - "  When step.children exists, render nested indented list: smaller status dots (16px), skill badges, summaries"
      - "  Children collapsible independently — collapsed by default, '▸ 3 sub-steps' toggle"
      - "  Nested indent: 24px left, thinner connector (0.5px dashed)"
      - "  Staggered fade-in animation (50ms each)"
      - "STEP 3 — Update seed data: add children to /dogpile step"
      - "Keep component under 400 lines. memo() on sub-components."
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit 2>&1 | grep -c 'error' || echo 0"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit --pretty false 2>&1 | tail -1"
      assertion: "TypeScript compiles, nested steps render"

  - id: "3"
    title: "Add answer separator and 'Thinking' label to ReasoningChain header"
    lane: "0"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    agent: "general-purpose"
    executor: "Project agent — string change + 3 JSX lines"
    depends_on: ["1", "2"]
    implementation:
      - "Read EmbryTerminalView.tsx MessageItem and ReasoningChain.tsx summary header"
      - "CHANGE 1 — ReasoningChain header: collapsed='▸ Thinking · 6 steps · 12s', running='● Thinking... · 3/6'"
      - "CHANGE 2 — Answer separator in MessageItem after ReasoningChain+RecallCard, before MarkdownRenderer"
      - "CHANGE 3 — ToolAction dedup: suppress if msg.reasoningSteps exists (skill visible in steps)"
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit 2>&1 | grep -c 'error' || echo 0"
    definition_of_done:
      command: "cd packages/ux-lab && npm run build 2>&1 | tail -3"
      assertion: "Build succeeds"

  - id: "4"
    title: "Add inline interactive artifact rendering + right-pane expand"
    lane: "0"
    runner: "subagent-service"
    backend: "codex"
    mode: "iterative"
    agent: "general-purpose"
    executor: "/code-runner → Codex 5.3 — large component with 6 renderers including interactive D3 + React tables. Project agent reviews."
    depends_on: ["1"]
    implementation:
      - "Read EmbryTerminalView.tsx (MessageItem + ArtifactPanel), shared-chat/types.ts"
      - "Read .pi/skills/best-practices-react/SKILL.md before implementing"
      - "STEP 1 — Create shared-chat/InlineArtifact.tsx:"
      - "  Props: { artifact: Artifact, onExpand?, onEntityClick? }"
      - "  Renders by artifact.type:"
      - "    'svg': DOMPurify.sanitize + dangerouslySetInnerHTML"
      - "    'html': sandboxed iframe (srcdoc) for /create-figure HTML+JS"
      - "    'code': syntax-highlighted pre block"
      - "    'markdown': MarkdownRenderer"
      - "    'react-table': interactive table — sortable columns (click header), filterable (search input), zebra rows, sticky header, row hover, entity highlighting on cell values. Data: { columns: {key,label,sortable?}[], rows: Record<string,any>[] }"
      - "    'graph': interactive D3 force-directed — zoom/pan (wheel+drag), node hover tooltip, node click fires onEntityClick, edge labels on hover. Data: { nodes: {id,label,type?,group?}[], edges: {source,target,label?}[] }. NVIS colors by group."
      - "  NVIS card container, top bar with title + Expand + Copy buttons"
      - "  Max inline height 400px with scroll. Skeleton shimmer loading state."
      - "  Entrance animation: fade-in + translateY(8px→0) 300ms ease-out"
      - "STEP 2 — Wire into MessageItem after MarkdownRenderer, before GateChain"
      - "STEP 3 — onExpand wires to setActiveArtifact → opens ArtifactPanel right pane"
      - "STEP 4 — Extend Artifact type: add 'react-table' | 'graph', add data?: any field"
      - "STEP 5 — Support artifacts?: Artifact[] for multiple per message"
      - "STEP 6 — Seed data with SVG chart + react-table artifacts"
      - "Export InlineArtifact from shared-chat/index.ts"
      - "Must comply with /best-practices-react: memo(), useCallback, DOMPurify, cleanup D3 on unmount"
    tests:
      - "cd packages/ux-lab && npx tsc --noEmit 2>&1 | grep -c 'error' || echo 0"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit --pretty false 2>&1 | tail -1"
      assertion: "TypeScript compiles, inline artifacts render, expand opens right pane"

  # ═══════════════════════════════════════════════════════════════════════
  # WAVE 1: Backend WebSocket Activity Channel
  # ═══════════════════════════════════════════════════════════════════════

  - id: "5"
    title: "Add WebSocket activity channel to embry-terminal server"
    lane: "1"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    agent: "general-purpose"
    executor: "Project agent — familiar Express+ws codebase, extending existing patterns"
    depends_on: ["3"]
    implementation:
      - "Read ~/workspace/experiments/embry-terminal/server/src/pty-server.ts"
      - "Add /api/activity WebSocket endpoint (separate from /api/terminal/:id)"
      - "Broadcast events: agent_started, agent_completed, agent_finding, presence_update, suggestion"
      - "Set<WebSocket> for activity subscribers, broadcastActivity() helper"
      - "Hook into agent/message: broadcast agent_completed after scillm response"
      - "Hook into memory/recall: broadcast agent_finding on findings"
      - "Presence heartbeat: client sends every 30s, stale after 90s"
      - "Bearer token auth on upgrade"
    tests:
      - "curl -sf http://127.0.0.1:8640/api/health | jq -e '.status == \"ok\"'"
    definition_of_done:
      command: "curl -sf http://127.0.0.1:8640/api/health | jq -e '.status == \"ok\"'"
      assertion: "Health ok, activity WebSocket accepts connections"

  - id: "6"
    title: "Add suggestion accept/reject REST endpoints"
    lane: "1"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    agent: "general-purpose"
    executor: "Project agent — small REST endpoints on existing Express server"
    depends_on: ["5"]
    implementation:
      - "Read pty-server.ts"
      - "In-memory Map<string, Suggestion> store"
      - "GET /api/suggestions, POST /api/suggestions/:id/accept, POST /api/suggestions/:id/reject"
      - "Auto-create suggestion on agent_finding with confidence > 0.5"
      - "Accept persists to /api/memory/learn, 24h expiry"
    tests:
      - "curl -sf http://127.0.0.1:8640/api/suggestions | jq -e '.suggestions != null'"
    definition_of_done:
      command: "curl -sf http://127.0.0.1:8640/api/suggestions | jq -e '.suggestions != null'"
      assertion: "Suggestions endpoint returns array"

  - id: "7"
    title: "Add optional Slack/Teams webhook integration"
    lane: "1"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    agent: "general-purpose"
    executor: "Project agent — small fire-and-forget webhook, ~40 lines"
    depends_on: ["5"]
    implementation:
      - "Read pty-server.ts"
      - "Env: EMBRY_WEBHOOK_URL, EMBRY_WEBHOOK_EVENTS, EMBRY_WEBHOOK_CHANNEL"
      - "webhookNotify(): check URL → check filter → Slack Block Kit format → fetch POST 5s timeout"
      - "Hook into broadcastActivity, GET /api/webhook/test"
      - "Never throws — log only on failure"
    tests:
      - "curl -sf http://127.0.0.1:8640/api/health | jq -e '.status == \"ok\"'"
    definition_of_done:
      command: "curl -sf http://127.0.0.1:8640/api/health | jq -e '.status == \"ok\"'"
      assertion: "Health ok, no crash without webhook configured"

  # ═══════════════════════════════════════════════════════════════════════
