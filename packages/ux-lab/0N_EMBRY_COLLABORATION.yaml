      - "VERIFY: ReasoningChain ABOVE response, 'Thinking' label, nested children expand"
      - "VERIFY: Inline SVG chart + react-table render, Expand opens right pane"
      - "VERIFY: PresenceBar in top area, ActivityFeed in sidebar"
      - "Screenshot → packages/ux-lab/captures/embry-collaboration-v1.png"
      - "Check console for errors"
    tests:
      - "test -f packages/ux-lab/captures/embry-collaboration-v1.png && echo PASS"
    definition_of_done:
      command: "test -f packages/ux-lab/captures/embry-collaboration-v1.png && echo PASS"
      assertion: "Screenshot proves correct rendering"

  - id: "16"
    title: "Brandon Bailey persona review — reasoning + artifacts + collaboration"
