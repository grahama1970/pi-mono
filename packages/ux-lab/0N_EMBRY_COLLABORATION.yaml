    definition_of_done:
      command: "curl -sf http://localhost:3002/ | grep -c 'html'"
      assertion: "Dev server returns HTML"

  - id: "15"
    title: "Visual verification — reasoning + artifacts + activity + presence"
    lane: "4"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    agent: "general-purpose"
    executor: "Project agent — CDP screenshots + visual checks, no code writing"
    depends_on: ["14"]
    implementation:
