  # ═══════════════════════════════════════════════════════════════════════

  - id: "8"
    title: "Create useActivityFeed hook in shared-chat"
    lane: "2"
    runner: "subagent-service"
    backend: "sonnet"
    mode: "iterative"
    agent: "general-purpose"
    executor: "Project agent — hook follows useEmbryFeatures.ts pattern"
    depends_on: ["5"]
    implementation:
