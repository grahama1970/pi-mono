test_manifest:
  - tab: "Embry Terminal — Reasoning UX"
    collection: null
    min_rows: 0
    interactions: ["expand_reasoning", "expand_nested_step", "collapse_reasoning", "verify_separator"]
    visual: "ReasoningChain above response. Thinking label. Nested children. Separator."
  - tab: "Embry Terminal — Inline Artifacts"
    collection: null
    min_rows: 0
    interactions: ["verify_inline_svg", "sort_table", "filter_table", "zoom_d3_graph", "click_expand", "click_graph_node"]
    visual: "SVG inline with animation. Table sortable+filterable. D3 zoomable. Expand → right pane."
  - tab: "Embry Terminal — Collaboration"
    collection: null
    min_rows: 0
    interactions: ["verify_presence", "verify_activity", "verify_suggestion", "accept_suggestion"]
    visual: "Presence bar. Activity feed. SuggestionCard accept/reject."
  - tab: "SPARTA Explorer Chat"
    collection: sparta_controls
    min_rows: 10
    interactions: ["verify_suggestion_inline"]
    visual: "SuggestionCard inline for matrix controls."
