version: 1
kind: orchestrate-plan
repo_root: /home/graham/workspace/experiments/pi-mono
metadata:
  title: "SPARTA Explorer Refinement — worksheets.yaml-driven Sources, QRA cross-nav, extract-entities fix"
  goal: "Replace hardcoded Sources with worksheets.yaml, add cross-tab navigation, fix /extract-entities delimiter, polish NVIS design"

capability_overlap:
  memory_recall: |
    - "ISO controls missing descriptions" → enriched via Brave Search + /upsert (this session)
    - "worksheets.yaml audit" → planned as 04_WORKSHEETS_YAML_AUDIT_TASKS.yaml
    - "ControlIdPills" → created this session, uses /extract-entities
    - "Shared StatusBar" → exists at src/components/common/StatusBar.tsx
  decision_matrix: |
    worksheets.yaml API = CREATE (Express endpoint, ux-lab internal)
    useWorksheets hook = CREATE (React hook, ux-lab internal)
    SpartaNavContext = CREATE (React context, ux-lab internal)
    /extract-entities delimiter = EXTEND (skill exists, add parameter)
    SourcesView refactor = EXTEND | QRAsView filter = EXTEND
    Flyout panes = GLUE | Magnetic hover = GLUE | StatusBar = CALL | UtilityBar = CALL

execution:
  max_concurrency: 1
  backend: codex

lanes:
  - id: "ws1"
    label: "Workstream 1: worksheets.yaml Sources"
  - id: "ws2"
    label: "Workstream 2: Cross-tab navigation"
  - id: "ws3"
    label: "Workstream 3: extract-entities"
  - id: "ws4"
    label: "Workstream 4: Polish + Verify"

pre_tasks:
  - id: T0
    title: "Dev server launch + data verification"
    description: "Kill existing Vite, start Express + Vite, verify data endpoints, open browser"

test_manifest:
  - tab: Sources
    collection: sparta_controls
    min_rows: 10
    interactions: [click_worksheet, click_control_row, view_detail_pane]
    visual: "Sidebar from YAML, correct counts, ISO inferred badge, flyout detail, colored pills"
  - tab: Controls
    collection: sparta_controls
    min_rows: 100
    interactions: [click_row, filter_framework, hover_row]
    visual: "Magnetic hover, status badges, flyout with UtilityBar, ControlIdPills"
  - tab: QRAs
    collection: sparta_qra
    min_rows: 5
    interactions: [keyboard_A, navigate_from_sources]
    visual: "Card-stack, filter badge with X to clear"
  - tab: Relationships
    collection: sparta_relationships
    min_rows: 10
    interactions: [click_row, hover_row]
    visual: "Magnetic hover, detail flyout with shadow"

tasks:
  - id: T1
    title: "Serve worksheets.yaml via Express API"
    lane: "ws1"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: []
    implementation:
      - "Install js-yaml: npm install js-yaml && npm install -D @types/js-yaml"
      - "Add GET /api/worksheets to packages/ux-lab/server/index.ts"
      - "Read and parse /home/graham/workspace/experiments/sparta/config/worksheets.yaml"
      - "Return { worksheets: Record<string, WorksheetConfig> }, cache 60s"
    definition_of_done:
      command: "curl -s http://localhost:3001/api/worksheets | python3 -c \"import json,sys; d=json.load(sys.stdin); assert len(d['worksheets'])>10; assert d['worksheets']['ISO 27001 References']['description_source']=='inferred'; print('PASS')\""
      assertion: "Endpoint returns all worksheets with ISO description_source=inferred"
    tests:
      - "npx tsc --noEmit"
      - "curl -s http://localhost:3001/api/worksheets | jq '.worksheets | keys | length'"

  - id: T2
    title: "Create useWorksheets hook"
    lane: "ws1"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: [T1]
    implementation:
      - "Create packages/ux-lab/src/hooks/useWorksheets.ts"
      - "React hook fetches /api/worksheets, returns { worksheets, loading, error }"
      - "Export worksheetToSourceDef(name, config) → SourceDef interface"
    definition_of_done:
      command: "npx tsc --noEmit"
      assertion: "Hook compiles, exports worksheetToSourceDef"
    tests:
      - "npx tsc --noEmit"

  - id: T3
    title: "Refactor SourcesView to use useWorksheets"
    lane: "ws1"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: [T2]
    implementation:
      - "Replace hardcoded SOURCES array in SourcesView.tsx with useWorksheets() data"
      - "Render worksheets dynamically from YAML config"
      - "Preserve grouping, health dots, type-specific counts, detail pane"
      - "Show description_source=inferred with amber badge"
      - "Loading state while fetching"
    definition_of_done:
      command: "npx tsc --noEmit"
      assertion: "SourcesView renders from YAML, ISO shows inferred badge, counts correct"
    tests:
      - "npx tsc --noEmit"
      - "Verify via test_manifest Sources tab entry (T11)"

  - id: T4
    title: "Add SpartaNavContext for cross-tab navigation"
    lane: "ws2"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: []
    implementation:
      - "Create SpartaNavContext in SpartaExplorer.tsx"
      - "Provides navigateToTab(tab) and navigateToTabWithFilter(tab, {controlId})"
      - "Wrap tab content area with context provider"
      - "Export useSpartaNav() hook"
    definition_of_done:
      command: "npx tsc --noEmit"
      assertion: "Context created, hook exported, tab content wrapped"
    tests:
      - "npx tsc --noEmit"

  - id: T5
    title: "Replace inline QRAs in SourcesView with cross-tab link"
    lane: "ws2"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: [T4]
    implementation:
      - "In SourcesView ControlDetail, replace inline QRA cards with clickable count"
      - "N > 0: green count, click → navigateToTabWithFilter('QRAs', {controlId})"
      - "N = 0: dim 'No QRAs generated'"
      - "Remove QRA fetch logic, keep only count query"
      - "Same for Relationships: count + clickable link"
    definition_of_done:
      command: "npx tsc --noEmit"
      assertion: "QRA count clickable, navigates to QRAs tab, no inline cards"
    tests:
      - "npx tsc --noEmit"
      - "Verify via test_manifest Sources + QRAs entries (T11)"

  - id: T6
    title: "QRAsView accepts filter from navigation"
    lane: "ws2"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: [T5]
    implementation:
      - "QRAsView reads controlId filter from SpartaNavContext"
      - "Pre-filter QRAs for that control"
      - "Show 'Filtered: {id}' badge with X to clear"
      - "Empty state: 'No QRAs for control {id}'"
    definition_of_done:
      command: "npx tsc --noEmit"
      assertion: "Filter badge shown, clear works, pre-filtered results"
    tests:
      - "npx tsc --noEmit"
      - "Verify via test_manifest QRAs entry (T11)"

  - id: T7
    title: "Update /extract-entities skill with delimiter support"
    lane: "ws3"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: []
    implementation:
      - "Add delimiter parameter to .pi/skills/extract-entities/extract_entities.py"
      - "delimiter='auto' splits on commas/semicolons/whitespace"
      - "Each token looked up in collection via /list"
      - "Returns entities with id, name, label, framework, exists"
      - "Update SKILL.md, create sanity.sh"
    definition_of_done:
      command: "cd .pi/skills/extract-entities && bash sanity.sh"
      assertion: "sanity.sh passes, both delimiter and NLP modes work"
    tests:
      - "cd .pi/skills/extract-entities && bash sanity.sh"
      - "npx tsc --noEmit"

  - id: T8
    title: "Wire ControlIdPills to use delimiter mode"
    lane: "ws3"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: [T7]
    implementation:
      - "ControlIdPills passes delimiter='auto' when using text prop"
      - "Verify ISO cross-references render as colored pills"
    definition_of_done:
      command: "npx tsc --noEmit"
      assertion: "Pills render for ISO cross-references with correct colors"
    tests:
      - "npx tsc --noEmit"
      - "Verify via test_manifest Sources entry (T11)"

  - id: T9
    title: "SourcesView flyout + UtilityBar + Toast"
    lane: "ws4"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: [T3, T5]
    implementation:
      - "Convert ControlDetail to flyout overlay (position absolute, shadow, zIndex 100)"
      - "Add UtilityBar (Copy Link + Export CSV) to detail header"
      - "Add useToast() + {toast} for feedback"
      - "Parent container position: relative"
      - "Same for URL detail pane"
    definition_of_done:
      command: "npx tsc --noEmit"
      assertion: "Flyout overlays with shadow, UtilityBar renders, Toast works"
    tests:
      - "npx tsc --noEmit"

  - id: T10
    title: "Magnetic hover + status badges for SourcesView"
    lane: "ws4"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: [T9]
    implementation:
      - "Import applyMagneticHover, magneticRow, magneticRowSelected from TableStyles"
      - "Replace onMouseEnter/onMouseLeave with magnetic hover"
      - "Add status badge column (NRS for controls, pipeline status for URLs)"
    definition_of_done:
      command: "npx tsc --noEmit"
      assertion: "Green border-left glow on hover, status badges visible"
    tests:
      - "npx tsc --noEmit"

  - id: T11
    title: "Full verification + blind testing"
    lane: "ws4"
    runner: subagent-service
    backend: codex
    mode: iterative
    depends_on: [T1, T2, T3, T4, T5, T6, T7, T8, T9, T10]
    implementation:
      - "npx tsc --noEmit — zero errors"
      - "Headless Chrome screenshots for each test_manifest tab"
      - "Verify min_rows, visual elements, zero console errors"
      - "Save to packages/ux-lab/captures/sparta-explorer/"
    definition_of_done:
      command: "npx tsc --noEmit && echo 'PASS'"
      assertion: "Zero type errors, screenshots captured, no console errors"
    tests:
      - "npx tsc --noEmit"
      - "Screenshots saved to packages/ux-lab/captures/sparta-explorer/"
