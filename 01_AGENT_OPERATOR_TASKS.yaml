version: 1
kind: orchestrate-plan
repo_root: "/home/graham/workspace/experiments/agent-operator"

metadata:
  title: "Agent Operator V1"
  goal: "Create a Tailscale-private operator console for delegated agent runs, artifacts, and code-runner-backed patch execution."
  plan_type: hybrid
  created: "2026-05-05"
  target_project_path: "/home/graham/workspace/experiments/agent-operator"
  source_archive: "/home/graham/Downloads/subagent-control-plane-v1.zip"
  primary_persona:
    name: "Graham"
    role: "iPad-based operator reviewing and dispatching delegated workstation agent runs over Tailscale"
    source: "User conversation, 2026-05-05"
  product_name: "agent-operator"
  v1_contract:
    patch_worker: "code-runner only"
    review_worker: "codex_exec for read-only review and task-spec generation"
    ui_pattern: "chat command surface plus run cards and artifact inspector"
    exposure: "localhost-bound FastAPI exposed through Tailscale Serve; no Funnel"
  compliance_governance:
    principle: "Analyst workbench, not truth engine"
    verdicts: "All SPARTA/compliance claims default to NEEDS_VERIFICATION"
    human_gate: "Human reviews before any compliance status change"

execution:
  max_concurrency: 1
  wave_barrier: true
  scheduling_policy: wave_then_dependency

capability_overlap:
  - "Memory hook found background project knowledge for /code-runner: use it only with tight allowlists, explicit DoD, blind tests, and complete-task flags for source mutation."
  - "Scanned skills manifest for relevant capabilities: /code-runner, /memory, /assess, /ops-workstation, /test-interactions, /review-plan, /skills-ci, /scillm, /best-practices-chat-ux, /best-practices-python."
  - "CALL /ops-workstation for Tailscale/network readiness instead of writing custom workstation diagnostics."
  - "CALL /memory as advisory recall/write path; do not implement a parallel memory database."
  - "CALL /code-runner for patch execution; do not duplicate patch worktrees, allowlist enforcement, cleanup, DoD, patch artifacts, or optional apply/commit."
  - "CREATE only the thin agent-operator control plane: routing, same-origin web app, run persistence, skill snapshots, WorkerAdapter glue, artifact UI, and Tailscale scripts."
  - "EXTEND the supplied subagent-control-plane scaffold only as source material; rename and reshape it into agent-operator."

questions_blockers: []

test_manifest:
  - surface: "Operator home"
    route: "/"
    device: "tablet"
    expected_data:
      projects_min: 2
      subagents_min: 3
    interactions:
      - "select project agent-skills"
      - "select mode review"
      - "submit a dry-run review request"
      - "open generated run card"
    visual: "Chat command surface remains primary; run card shows project, worker, mode, selected skills, status, and open-details control."
  - surface: "Run inspector"
    route: "/"
    device: "tablet"
    expected_data:
      artifacts_min: 5
    interactions:
      - "open report.md"
      - "open result.json"
      - "open events.jsonl"
      - "open code-runner task-spec.json when present"
    visual: "Inspector prioritizes report, result, diff/task spec, logs, prompt, events, memory, and skill snapshots with wrapped paths and collapsed logs."
  - surface: "Failure and memory warning state"
    route: "/"
    device: "tablet"
    expected_data:
      warnings_min: 1
    interactions:
      - "load a run with memory recall unavailable"
      - "open warning details"
    visual: "Memory degradation is visible as a warning event and badge; the run is not shown as failed only because advisory memory was unavailable."
  - surface: "Patch mode risk review"
    route: "/"
    device: "tablet"
    expected_data:
      code_runner_artifacts_min: 3
    interactions:
      - "toggle patch mode"
      - "review dry-run risk artifact"
      - "open code-runner output directory listing"
    visual: "Patch mode clearly identifies code-runner as the sole patch worker and exposes dry-run risk before any run."

lanes:
  - id: "0"
    label: "Wave 0: Bootstrap and Discovery"
  - id: "1"
    label: "Wave 1: Backend Core"
  - id: "2"
    label: "Wave 2: Worker and Skill Composition"
  - id: "3"
    label: "Wave 3: Operator Chat UX"
  - id: "4"
    label: "Wave 4: Deployment and Validation"

