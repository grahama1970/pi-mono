    runner: "local"
    backend: ""
    mode: ""
    agent: "general-purpose"
    cwd: "/home/graham/workspace/experiments"
    depends_on: []
    implementation:
      - "Create `/home/graham/workspace/experiments/agent-operator` from `/home/graham/Downloads/subagent-control-plane-v1.zip`."
      - "Remove generated `__pycache__` files from the extracted scaffold."
      - "Rename human-facing references from Subagent Control Plane to Agent Operator."
      - "Add `.gitignore` for Python, Node, run artifacts, caches, and generated UI verification."
      - "Initialize a new git repository and create a baseline commit so subsequent /code-runner complete-task tasks have a clean source repo."
    tests:
      - "Blind: `python3 -m zipfile --test /home/graham/Downloads/subagent-control-plane-v1.zip` exits 0 before extraction."
      - "Blind: `find /home/graham/workspace/experiments/agent-operator -path '*/__pycache__/*' | wc -l` returns 0 after cleanup."
      - "Blind: `git -C /home/graham/workspace/experiments/agent-operator status --short` is empty after the baseline commit."
    command: "python3 -m zipfile --test /home/graham/Downloads/subagent-control-plane-v1.zip && rm -rf /home/graham/workspace/experiments/agent-operator && python3 - <<'PY'\nfrom pathlib import Path\nfrom zipfile import ZipFile\nsrc = Path('/home/graham/Downloads/subagent-control-plane-v1.zip')\ntmp = Path('/home/graham/workspace/experiments/agent-operator')\nwith ZipFile(src) as z:\n    z.extractall(tmp.parent)\nextracted = tmp.parent / 'subagent-control-plane'\nif extracted.exists():\n    extracted.rename(tmp)\nfor p in sorted(tmp.rglob('__pycache__'), reverse=True):\n    for child in p.rglob('*'):\n        if child.is_file():\n            child.unlink()\n    p.rmdir()\nPY\ncd /home/graham/workspace/experiments/agent-operator\ngit init\ngit config user.name \"Agent Operator Bootstrap\"\ngit config user.email \"agent-operator@local\"\ncat > .gitignore <<'EOF'\n.venv/\nnode_modules/\n__pycache__/\n*.pyc\n.DS_Store\n.codex/ui-verification/\n.local/\nruns/\ndist/\nbuild/\nEOF\ngit add README.md TODO.md config backend frontend scripts systemd .gitignore\ngit commit -m \"bootstrap agent-operator scaffold\""
    definition_of_done:
      command: "test -d /home/graham/workspace/experiments/agent-operator && test -f /home/graham/workspace/experiments/agent-operator/README.md && test \"$(find /home/graham/workspace/experiments/agent-operator -path '*/__pycache__/*' | wc -l)\" = \"0\" && test -z \"$(git -C /home/graham/workspace/experiments/agent-operator status --short)\""
