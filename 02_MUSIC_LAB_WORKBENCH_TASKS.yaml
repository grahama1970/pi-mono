version: 1
kind: orchestrate-plan
metadata:
  title: "Music Lab Workbench — ux-lab Components"
  goal: "Build 5 music-lab React components in ux-lab with design review"
  plan_type: design
  created: "2026-03-19"
  context: >
    Phase 0-2 of 01_MUSIC_LAB_TASKS.md are complete (YuE, schemas, converge.py).
    Phase 3 needs 5 React components in packages/ux-lab/src/components/music-lab/.
    The task plan says T3.1 design gate MUST happen first, but given the existing
    SPARTA Explorer pattern to follow, we can build components that match the
    established EMBRY dark theme and review them retroactively.
  primary_persona:
    name: nico-bailon
    role: Senior Embry OS Developer
    source: .pi/agents/nico-bailon/AGENTS.md

execution:
  max_concurrency: 1

capability_overlap:
  - "SPARTA Explorer (SpartaExplorer.tsx) provides the tab shell pattern"
  - "EmbryStyle.ts provides EMBRY dark theme tokens"
  - "recharts already installed for chart components"
  - "Existing views (OverviewView, QRAsView) show the data-fetching pattern"
  - "Whisperheads fixtures exist at .pi/skills/create-music/fixtures/whisperheads/"
  - "piano-roll-spec.schema.json and annotated-lyrics.schema.json define data shapes"

lanes:
  - id: "0"
    label: "Wave 0: Types + Sample Data"
  - id: "1"
    label: "Wave 1: Core Components"
  - id: "2"
    label: "Wave 2: Dashboard + Integration"
  - id: "3"
    label: "Wave 3: Design Review"

tasks:
  - id: T1
    title: "Music Lab TypeScript types + sample data"
    lane: "0"
    runner: subagent-service
    backend: sonnet
    mode: one_shot
    agent: nico-bailon
    depends_on: []
    implementation:
      - "Create packages/ux-lab/src/components/music-lab/types.ts with interfaces matching piano-roll-spec.schema.json and annotated-lyrics.schema.json"
      - "Interfaces: PianoRollSpec, PianoRollNote, PianoRollSection, AnnotatedLyrics, LyricsPhrase, Syllable, ConvergenceRound, MusicLabState"
      - "Create packages/ux-lab/src/components/music-lab/sampleData.ts with Whisperheads fixture data typed to interfaces"
      - "Read the JSON schemas at .pi/skills/create-music/schemas/ to match field names exactly"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit src/components/music-lab/types.ts"
      assertion: "TypeScript compiles with no errors"

  - id: T2
    title: "PianoRollView component"
    lane: "1"
    runner: subagent-service
    backend: sonnet
    mode: iterative
    agent: nico-bailon
    depends_on: [T1]
    implementation:
      - "Create packages/ux-lab/src/components/music-lab/PianoRollView.tsx"
      - "Horizontal time x pitch grid using SVG or Canvas"
      - "Color-coded by instrument (vocal=EMBRY.accent, drums=EMBRY.red, bass=EMBRY.blue)"
      - "Velocity as opacity, section markers as labeled regions"
      - "Use EMBRY dark theme tokens from EmbryStyle.ts"
      - "Import from types.ts, render sampleData for dev mode"
      - "Follow existing SPARTA component patterns (no external state management)"
    tests:
      - "npx tsc --noEmit"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Compiles, component exports PianoRollView"

  - id: T3
    title: "WaveformView component"
    lane: "1"
    runner: subagent-service
    backend: sonnet
    mode: iterative
    agent: nico-bailon
    depends_on: [T1]
    implementation:
      - "Create packages/ux-lab/src/components/music-lab/WaveformView.tsx"
      - "Canvas-based waveform from pre-computed peaks array"
      - "Beat position overlay from piano-roll-spec (expected vs actual)"
      - "Red highlights where timing drift > threshold"
      - "Lyrics text aligned at beat positions below waveform"
      - "EMBRY dark theme"
    tests:
      - "npx tsc --noEmit"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Compiles, component exports WaveformView"

  - id: T4
    title: "ConvergenceChart component"
    lane: "1"
    runner: subagent-service
    backend: sonnet
    mode: one_shot
    agent: nico-bailon
    depends_on: [T1]
    implementation:
      - "Create packages/ux-lab/src/components/music-lab/ConvergenceChart.tsx"
      - "Use recharts (already installed) for line chart"
      - "Per-dimension lines: tempo, key, chords, dynamics, timing + aggregate"
      - "Convergence threshold as horizontal dashed reference line"
      - "Round markers on x-axis"
      - "EMBRY dark theme colors"
    tests:
      - "npx tsc --noEmit"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Compiles, component exports ConvergenceChart"

  - id: T5
    title: "LyricsEditor component"
    lane: "1"
    runner: subagent-service
    backend: sonnet
    mode: iterative
    agent: nico-bailon
    depends_on: [T1]
    implementation:
      - "Create packages/ux-lab/src/components/music-lab/LyricsEditor.tsx"
      - "Phrase-level editing of annotated-lyrics.json"
      - "Per-syllable beat position display (read-only for now)"
      - "Emotion dropdown per phrase (anger/fear/joy/neutral/sadness/trust)"
      - "Dynamics selector (pp/p/mp/mf/f/ff)"
      - "Vocal direction selector (whisper/belt/falsetto/growl/speak)"
      - "EMBRY dark theme"
    tests:
      - "npx tsc --noEmit"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Compiles, component exports LyricsEditor"

  - id: T6
    title: "MusicLabWorkbench dashboard + App.tsx integration"
    lane: "2"
    runner: subagent-service
    backend: sonnet
    mode: iterative
    agent: nico-bailon
    depends_on: [T2, T3, T4, T5]
    implementation:
      - "Create packages/ux-lab/src/components/music-lab/MusicLabWorkbench.tsx"
      - "Layout: PianoRoll top, Waveform middle, ConvergenceChart bottom-left, LyricsEditor bottom-right"
      - "Use CSS Grid for the 4-pane layout"
      - "Add 'Music Lab' tab to SpartaExplorer views in App.tsx"
      - "Import MusicLabWorkbench and add to the views object"
      - "Use sampleData for dev mode rendering"
    tests:
      - "npx tsc --noEmit"
      - "cd packages/ux-lab && npx vite build --mode development 2>&1 | tail -5"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit && npx vite build --mode development"
      assertion: "Full build succeeds with music-lab tab integrated"

  - id: T7
    title: "Design review of music-lab components"
    lane: "3"
    runner: subagent-service
    backend: sonnet
    mode: review
    agent: steve-schoger
    depends_on: [T6]
    implementation:
      - "Launch ux-lab dev server: cd packages/ux-lab && npx vite dev"
      - "Navigate to Music Lab tab"
      - "Screenshot each component pane"
      - "Review against EMBRY design tokens (dark theme, NVIS colors, data density)"
      - "Check: hierarchy, spacing, color usage, readability at full song scale"
      - "Report findings as PASS/WARN/FAIL per component"
    definition_of_done:
      command: "cd packages/ux-lab && npx tsc --noEmit"
      assertion: "Design review completed with findings documented"
