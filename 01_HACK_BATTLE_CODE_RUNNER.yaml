version: 1
kind: orchestrate-plan

repo_root: "/home/graham/workspace/experiments/pi-mono"

metadata:
  title: "Integrate /code-runner into /hack and /battle"
  goal: "Replace broken codex exec and claude -p with code-runner self-improvement loop for exploit and patch writing"
  plan_type: code
  created: "2026-04-01"
  primary_persona:
    name: "Tim Blazytko"
    role: "Security Researcher"
    source: ".pi/agents/tim-blazytko/AGENTS.md"

execution:
  max_concurrency: 1

capability_overlap:
  - "code-runner: self-improvement loop for code tasks — CALL, not recreate"
  - "hack: scanning + Docker isolation — EXTEND with code-runner for exploit writing"
  - "battle: red vs blue orchestrator — EXTEND with code-runner for both teams"
  - "anvil: debugging/hardening orchestrator — KEEP as-is, blue team replaces anvil remediate with code-runner"
  - "thunderdome: competitive eval — KEEP as-is, already dispatches to code-runner"
  - "common file_bundler: shared file bundling — CALL for exploit context"
  - "No prior solution found in memory recall"

questions_blockers: []

lanes:
  - id: "0"
    label: "Wave 0: Remove broken CLI paths"
  - id: "1"
    label: "Wave 1: Build exploit/patch runners"
  - id: "2"
    label: "Wave 2: Wire into hack and battle"
  - id: "3"
    label: "Wave 3: Validation"

tasks:
  # ── Wave 0: Remove broken CLI paths ──────────────────────────────

  - id: "1"
    title: "Replace codex exec in hack chaos.py with scillm API"
    lane: "0"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: []
    allowlist:
      - ".pi/skills/hack/chaos.py"
    read_context:
      - ".pi/skills/hack/config.py"
      - ".pi/skills/hack/utils.py"
    implementation:
      - "Replace subprocess.Popen codex exec with httpx.post to scillm chat endpoint"
      - "Use SCILLM_URL http://localhost:4001 chat endpoint"
      - "Model mapping: gpt-5.2-codex becomes gpt-5.3-codex"
      - "Keep brainstorm_chaos_exploits() signature and return format (JSON list)"
      - "Keep generate_assembly_payload() signature and return format (asm string)"
      - "Keep baseline_chaos_ideas() fallback on scillm failure"
    tests:
      - "python3 -c \"compile(open('.pi/skills/hack/chaos.py').read(), 'chaos.py', 'exec')\""
      - "! grep -q 'codex.*exec' .pi/skills/hack/chaos.py"
    gate:
      command: "grep -q 'httpx' .pi/skills/hack/chaos.py && ! grep -q 'codex.*exec' .pi/skills/hack/chaos.py"
      assertion: "exit_code == 0"
    definition_of_done:
      command: "cd .pi/skills/hack && python3 -c \"compile(open('chaos.py').read(), 'chaos.py', 'exec')\" && ! grep -q 'codex.*exec' chaos.py && grep -q 'httpx' chaos.py"
      assertion: "exit_code == 0"

  - id: "2"
    title: "Remove codex exec from create-icon creator.py (flip scillm to primary)"
    lane: "0"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: []
    allowlist:
      - ".pi/skills/create-icon/creator.py"
    read_context:
      - ".pi/skills/create-icon/SKILL.md"
    implementation:
      - "creator.py already has scillm fallback — make scillm the PRIMARY path"
      - "Remove claude -p and gemini -p subprocess calls"
      - "Keep the httpx scillm call that already exists (lines 104-127)"
      - "Remove subprocess import if no longer needed"
    tests:
      - "python3 -c \"compile(open('.pi/skills/create-icon/creator.py').read(), 'creator.py', 'exec')\""
      - "! grep -q 'claude.*-p' .pi/skills/create-icon/creator.py"
    gate:
      command: "! grep -q 'claude.*-p' .pi/skills/create-icon/creator.py"
      assertion: "exit_code == 0"
    definition_of_done:
      command: "cd .pi/skills/create-icon && python3 -c \"compile(open('creator.py').read(), 'creator.py', 'exec')\" && ! grep -q 'claude.*-p' creator.py"
      assertion: "exit_code == 0"

  # ── Wave 1: Build exploit/patch runners ──────────────────────────

  - id: "3"
    title: "Create hack exploit_writer.py — code-runner wrapper for exploit generation"
    lane: "1"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["1"]
    allowlist:
      - ".pi/skills/hack/exploit_writer.py"
    read_context:
      - ".pi/skills/code-runner/models.py"
      - ".pi/skills/code-runner/run.sh"
      - ".pi/skills/hack/commands.py"
      - ".pi/skills/hack/container_manager.py"
      - ".pi/skills/hack/config.py"
      - ".pi/skills/common/file_bundler.py"
    implementation:
      - "Create exploit_writer.py with write_exploit(target_path, finding, prior_context, docker_target, max_rounds=5) returning ExploitResult"
      - "Builds a code-runner TaskSpec JSON: task_id, prompt, allowlist for exploits dir, read_context for target files, backend codex, dod"
      - "DoD command: docker exec container python3 exploit_file with assertion exit_code == 0"
      - "Calls code-runner via subprocess: run.sh run spec.json --max-rounds N"
      - "Parses code-runner result.json to return ExploitResult(success, rounds, exploit_code, score)"
      - "Uses common.file_bundler.bundle_for_review() to read target binary context for the prompt"
      - "Includes memory recall of prior exploits in the prompt context"
      - "Uses loguru for logging, httpx for memory calls, pydantic for ExploitResult"
      - "Max 300 lines"
    tests:
      - "python3 -c \"compile(open('.pi/skills/hack/exploit_writer.py').read(), 'ew.py', 'exec')\""
      - "python3 -c \"import ast; t=ast.parse(open('.pi/skills/hack/exploit_writer.py').read()); assert any(n.name=='write_exploit' for n in ast.walk(t) if isinstance(n, ast.FunctionDef))\""
    gate:
      command: "python3 -c \"compile(open('.pi/skills/hack/exploit_writer.py').read(), 'ew.py', 'exec')\""
      assertion: "exit_code == 0"
    definition_of_done:
      command: "cd .pi/skills/hack && python3 -c \"compile(open('exploit_writer.py').read(), 'exploit_writer.py', 'exec')\" && python3 -c \"import ast; t=ast.parse(open('exploit_writer.py').read()); funcs=[n.name for n in ast.walk(t) if isinstance(n, ast.FunctionDef)]; assert 'write_exploit' in funcs, f'Missing write_exploit, found: {funcs}'\""
      assertion: "exit_code == 0"

  - id: "4"
    title: "Create battle patch_writer.py — code-runner wrapper for patch generation"
    lane: "1"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: []
    allowlist:
      - ".pi/skills/battle/patch_writer.py"
    read_context:
      - ".pi/skills/code-runner/models.py"
      - ".pi/skills/code-runner/run.sh"
      - ".pi/skills/battle/blue_team.py"
      - ".pi/skills/battle/config.py"
      - ".pi/skills/battle/scoring.py"
      - ".pi/skills/common/file_bundler.py"
    implementation:
      - "Create patch_writer.py with write_patch(target_path, finding, exploit_proof, test_command, max_rounds=5) returning PatchResult"
      - "Builds a code-runner TaskSpec JSON: task_id, prompt, allowlist for finding file, read_context for test files and exploit, backend codex, dod"
      - "DoD command: test_command AND docker exec arena exploit must fail (inverted exit code)"
      - "Assertion: exit_code == 0 — tests pass AND exploit FAILS"
      - "Calls code-runner via subprocess: run.sh run spec.json --max-rounds N"
      - "Parses code-runner result.json to return PatchResult(success, rounds, patch_diff, score, functionality_preserved)"
      - "Uses common.file_bundler.bundle_for_review() for target file context"
      - "Includes memory recall of prior patches in prompt"
      - "Uses loguru, httpx, pydantic"
      - "Max 300 lines"
    tests:
      - "python3 -c \"compile(open('.pi/skills/battle/patch_writer.py').read(), 'pw.py', 'exec')\""
      - "python3 -c \"import ast; t=ast.parse(open('.pi/skills/battle/patch_writer.py').read()); assert any(n.name=='write_patch' for n in ast.walk(t) if isinstance(n, ast.FunctionDef))\""
    gate:
      command: "python3 -c \"compile(open('.pi/skills/battle/patch_writer.py').read(), 'pw.py', 'exec')\""
      assertion: "exit_code == 0"
    definition_of_done:
      command: "cd .pi/skills/battle && python3 -c \"compile(open('patch_writer.py').read(), 'patch_writer.py', 'exec')\" && python3 -c \"import ast; t=ast.parse(open('patch_writer.py').read()); funcs=[n.name for n in ast.walk(t) if isinstance(n, ast.FunctionDef)]; assert 'write_patch' in funcs, f'Missing write_patch, found: {funcs}'\""
      assertion: "exit_code == 0"

  # ── Wave 2: Wire into hack and battle ────────────────────────────

  - id: "5"
    title: "Wire exploit_writer into hack commands.py exploit command"
    lane: "2"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["3"]
    allowlist:
      - ".pi/skills/hack/commands.py"
    read_context:
      - ".pi/skills/hack/exploit_writer.py"
      - ".pi/skills/hack/chaos.py"
      - ".pi/skills/hack/container_manager.py"
    implementation:
      - "In create_exploit_command(), replace the Docker compose retry loop (lines ~300-370) with exploit_writer.write_exploit() call"
      - "Keep the research phase (dogpile) before exploit writing — feed results into exploit_writer prompt context"
      - "Keep chaos brainstorming as context input (chaos.py brainstorm_chaos_exploits returns ideas, feed as prompt context)"
      - "Keep task monitor integration (start_task_session, end_task_session)"
      - "Keep Docker container setup for the TARGET — exploit_writer runs code-runner which writes exploit code, then DoD tests it in Docker"
      - "Replace returncode==0 check with exploit_result.success"
      - "Store exploit_result.exploit_code in finding.exploit_proof"
    tests:
      - "python3 -c \"compile(open('.pi/skills/hack/commands.py').read(), 'commands.py', 'exec')\""
      - "grep -q 'exploit_writer' .pi/skills/hack/commands.py"
    gate:
      command: "grep -q 'exploit_writer' .pi/skills/hack/commands.py"
      assertion: "exit_code == 0"
    definition_of_done:
      command: "cd .pi/skills/hack && python3 -c \"compile(open('commands.py').read(), 'commands.py', 'exec')\" && grep -q 'exploit_writer' commands.py && ! grep -q 'docker.*compose.*run.*exploiter' commands.py"
      assertion: "exit_code == 0"

  - id: "6"
    title: "Wire exploit_writer into battle red_team.py attack_phase"
    lane: "2"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["3"]
    allowlist:
      - ".pi/skills/battle/red_team.py"
    read_context:
      - ".pi/skills/hack/exploit_writer.py"
      - ".pi/skills/battle/orchestrator.py"
      - ".pi/skills/battle/config.py"
    implementation:
      - "In attack_phase(), after scanning (hack audit), use exploit_writer.write_exploit() for CHAOS exploitation"
      - "Replace subprocess.run hack_script exploit --chaos with exploit_writer.write_exploit(target_path, finding, prior_context, docker_target)"
      - "Keep the recall_phase() and research_phase() — their output feeds into exploit_writer prompt context"
      - "Store exploit_result in finding.exploit_proof as before"
      - "Keep reflect_phase() and store_phase() — they operate on Finding objects unchanged"
      - "Import exploit_writer at top of file"
    tests:
      - "python3 -c \"compile(open('.pi/skills/battle/red_team.py').read(), 'rt.py', 'exec')\""
      - "grep -q 'exploit_writer' .pi/skills/battle/red_team.py"
    gate:
      command: "grep -q 'exploit_writer' .pi/skills/battle/red_team.py"
      assertion: "exit_code == 0"
    definition_of_done:
      command: "cd .pi/skills/battle && python3 -c \"compile(open('red_team.py').read(), 'red_team.py', 'exec')\" && grep -q 'exploit_writer' red_team.py"
      assertion: "exit_code == 0"

  - id: "7"
    title: "Wire patch_writer into battle blue_team.py defend_phase"
    lane: "2"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["4"]
    allowlist:
      - ".pi/skills/battle/blue_team.py"
    read_context:
      - ".pi/skills/battle/patch_writer.py"
      - ".pi/skills/battle/orchestrator.py"
      - ".pi/skills/battle/scoring.py"
    implementation:
      - "In defend_phase(), replace subprocess.run anvil_script remediate with patch_writer.write_patch()"
      - "Build test_command from target existing test suite (Makefile, pytest, etc.)"
      - "Pass finding.exploit_proof so the patch DoD can verify exploit no longer works"
      - "Map patch_result.success to patch.verified, patch_result.patch_diff to patch.diff"
      - "Set patch.functionality_preserved = patch_result.functionality_preserved"
      - "Keep recall_phase() and research_phase() — output feeds into patch_writer prompt"
      - "Keep reflect_phase() and store_phase() unchanged"
      - "Import patch_writer at top of file"
    tests:
      - "python3 -c \"compile(open('.pi/skills/battle/blue_team.py').read(), 'bt.py', 'exec')\""
      - "grep -q 'patch_writer' .pi/skills/battle/blue_team.py"
    gate:
      command: "grep -q 'patch_writer' .pi/skills/battle/blue_team.py"
      assertion: "exit_code == 0"
    definition_of_done:
      command: "cd .pi/skills/battle && python3 -c \"compile(open('blue_team.py').read(), 'blue_team.py', 'exec')\" && grep -q 'patch_writer' blue_team.py && ! grep -q 'anvil.*remediate' blue_team.py"
      assertion: "exit_code == 0"

  - id: "8"
    title: "Update SKILL.md and config for both skills"
    lane: "2"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["5", "6", "7"]
    allowlist:
      - ".pi/skills/hack/SKILL.md"
      - ".pi/skills/hack/config.py"
      - ".pi/skills/battle/SKILL.md"
      - ".pi/skills/battle/config.py"
    read_context:
      - ".pi/skills/hack/exploit_writer.py"
      - ".pi/skills/battle/patch_writer.py"
    implementation:
      - "Add code-runner to composes list in both SKILL.md files"
      - "Add common to composes list in both SKILL.md files"
      - "Update hack config.py DEFAULT_MODEL from gpt-5.2-codex to gpt-5.3-codex"
      - "Update battle config.py DEFAULT_MODEL similarly"
      - "Add CODE_RUNNER_MAX_ROUNDS = 5 to both config.py files"
      - "Add EXPLOIT_ALLOWLIST_DIR = exploits/ to hack config.py"
    tests:
      - "grep -q 'code-runner' .pi/skills/hack/SKILL.md"
      - "grep -q 'code-runner' .pi/skills/battle/SKILL.md"
      - "grep -q 'gpt-5.3' .pi/skills/hack/config.py"
    gate:
      command: "grep -q 'code-runner' .pi/skills/hack/SKILL.md && grep -q 'code-runner' .pi/skills/battle/SKILL.md"
      assertion: "exit_code == 0"
    definition_of_done:
      command: "grep -q 'code-runner' .pi/skills/hack/SKILL.md && grep -q 'code-runner' .pi/skills/battle/SKILL.md && grep -q 'gpt-5.3' .pi/skills/hack/config.py"
      assertion: "exit_code == 0"

  # ── Wave 3: Validation ───────────────────────────────────────────

  - id: "9"
    title: "Compile check all modified files"
    lane: "3"
    runner: "local"
    depends_on: ["5", "6", "7", "8"]
    command: "cd .pi/skills/hack && python3 -c \"import py_compile, sys; [py_compile.compile(f, doraise=True) for f in ['chaos.py','commands.py','exploit_writer.py','config.py','hack.py','utils.py']]; print('hack: 6/6')\" && cd ../battle && python3 -c \"import py_compile, sys; [py_compile.compile(f, doraise=True) for f in ['battle.py','orchestrator.py','red_team.py','blue_team.py','patch_writer.py','config.py']]; print('battle: 6/6')\""
    gate:
      command: "cd .pi/skills/hack && python3 -c \"import py_compile; [py_compile.compile(f, doraise=True) for f in ['chaos.py','commands.py','exploit_writer.py']]\" && cd ../battle && python3 -c \"import py_compile; [py_compile.compile(f, doraise=True) for f in ['red_team.py','blue_team.py','patch_writer.py']]\""
      assertion: "exit_code == 0"
    tests:
      - "python3 -c \"compile(open('.pi/skills/hack/chaos.py').read(), 'c', 'exec')\""
      - "python3 -c \"compile(open('.pi/skills/battle/red_team.py').read(), 'r', 'exec')\""
    definition_of_done:
      command: "cd .pi/skills/hack && python3 -c \"import py_compile; [py_compile.compile(f, doraise=True) for f in ['chaos.py','commands.py','exploit_writer.py']]\" && cd ../battle && python3 -c \"import py_compile; [py_compile.compile(f, doraise=True) for f in ['red_team.py','blue_team.py','patch_writer.py']]\""
      assertion: "exit_code == 0"

  - id: "10"
    title: "Run hack sanity.sh"
    lane: "3"
    runner: "local"
    depends_on: ["9"]
    command: "cd .pi/skills/hack && bash sanity.sh 2>&1 | tail -5"
    tests:
      - "cd .pi/skills/hack && bash sanity.sh"
    definition_of_done:
      command: "cd .pi/skills/hack && bash sanity.sh"
      assertion: "exit_code == 0"

  - id: "11"
    title: "Run battle sanity.sh"
    lane: "3"
    runner: "local"
    depends_on: ["9"]
    command: "cd .pi/skills/battle && bash sanity.sh 2>&1 | tail -5"
    tests:
      - "cd .pi/skills/battle && bash sanity.sh"
    definition_of_done:
      command: "cd .pi/skills/battle && bash sanity.sh"
      assertion: "exit_code == 0"

  - id: "12"
    title: "Run skills-ci scan for hack and battle"
    lane: "3"
    runner: "local"
    depends_on: ["10", "11"]
    command: "cd .pi/skills/skills-ci && .venv/bin/python skills_ci.py --mode scan 2>&1 | tail -10"
    tests:
      - "cd .pi/skills/skills-ci && .venv/bin/python skills_ci.py --mode scan 2>&1 | grep -v ERROR"
    definition_of_done:
      command: "cd .pi/skills/skills-ci && .venv/bin/python skills_ci.py --mode scan 2>&1 | grep -c ERROR"
      assertion: "exit_code == 0"
